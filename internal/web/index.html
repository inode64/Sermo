<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sermo</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; padding: 1.5rem; }
  h1 { font-size: 1.3rem; margin: 0 0 1rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid #8884; }
  th { font-weight: 600; }
  .status { font-weight: 600; }
  .active { color: #1a7f37; }
  .inactive, .unknown { color: #9a6700; }
  .failed, .error { color: #cf222e; }
  .pill { display: inline-block; padding: .05rem .5rem; border-radius: 1rem; font-size: .8rem; border: 1px solid #8886; }
  .actions button { margin-right: .25rem; cursor: pointer; }
  button { font: inherit; padding: .2rem .55rem; border-radius: .35rem; border: 1px solid #8886; background: #8881; }
  button:hover { background: #8883; }
  #err { color: #cf222e; min-height: 1.2rem; }
  .muted { color: #8888; font-size: .85rem; }
  a.name { cursor: pointer; text-decoration: none; border-bottom: 1px dotted #8888; color: inherit; }
  #detail { margin-top: 1.5rem; padding: 1rem; border: 1px solid #8884; border-radius: .5rem; display: none; }
  #detail h2 { font-size: 1.05rem; margin: 0 0 .6rem; }
  #detail table { margin-bottom: 1rem; }
  .ok { color: #1a7f37; } .bad { color: #cf222e; }
  .sla { display: flex; gap: 1.2rem; flex-wrap: wrap; }
  .sla div { text-align: center; }
  .sla .v { font-size: 1.3rem; font-weight: 600; }
  .close { float: right; }
  .events { width: 100%; font-size: .9rem; }
  .events td { vertical-align: top; }
  .events .t { white-space: nowrap; color: #888; }
  .kind { font-weight: 600; }
  .kind-error, .kind-hook-failed, .kind-notify-failed { color: #cf222e; }
  .kind-alert, .kind-suppressed { color: #9a6700; }
  .kind-action, .kind-hook, .kind-notify { color: #1a7f37; }
  .lvl-error { color: #cf222e; font-weight: 600; }
  .lvl-warning { color: #9a6700; font-weight: 600; }
  .lvl-info { color: #888; }
  section { margin-top: 2rem; }
</style>
</head>
<body>
<h1>Sermo &middot; services <span id="me" class="muted" style="font-size:.8rem"></span></h1>
<div id="err"></div>
<table>
  <thead>
    <tr><th>Service</th><th>Status</th><th>Monitoring</th><th>Backend</th><th class="actions">Actions</th></tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
<p class="muted">Auto-refreshes every 5s.</p>

<div id="detail"></div>

<section>
  <h2 style="font-size:1.05rem">Diagnostics <button onclick="loadDiag()">refresh</button></h2>
  <table class="events"><tbody id="diag"></tbody></table>
</section>

<section>
  <h2 style="font-size:1.05rem">Events</h2>
  <table class="events"><tbody id="events"></tbody></table>
</section>

<script>
const $ = (s) => document.querySelector(s);

let me = { can_act: true, role: "admin", auth: false };

async function loadMe() {
  try {
    const res = await fetch("api/whoami");
    if (res.ok) me = await res.json();
  } catch (e) { /* keep defaults */ }
  if (!me.auth) { $("#me").innerHTML = ""; }
  else if (me.role === "admin") { $("#me").textContent = "(admin)"; }
  else { $("#me").innerHTML = 'read-only &middot; <a href="login">log in</a>'; }
}

async function load() {
  try {
    const res = await fetch("api/services");
    if (!res.ok) throw new Error("HTTP " + res.status);
    render(await res.json());
    $("#err").textContent = "";
  } catch (e) {
    $("#err").textContent = "Failed to load services: " + e.message;
  }
  loadEvents();
}

async function loadEvents() {
  try {
    const res = await fetch("api/events?limit=100");
    if (!res.ok) return;
    $("#events").innerHTML = eventRows(await res.json(), true);
  } catch (e) { /* keep the last feed on a transient error */ }
}

async function loadDiag() {
  $("#diag").innerHTML = `<tr><td class="muted">checking…</td></tr>`;
  try {
    const res = await fetch("api/diagnostics");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const findings = await res.json();
    if (!findings || !findings.length) {
      $("#diag").innerHTML = `<tr><td style="color:#1a7f37">ok — no problems found</td></tr>`;
      return;
    }
    $("#diag").innerHTML = findings.map((f) => `<tr>
      <td class="lvl-${esc(f.level)}">${esc(f.level)}</td>
      <td>${esc(f.scope)}</td>
      <td>${esc(f.message)}</td>
    </tr>`).join("");
  } catch (e) {
    $("#diag").innerHTML = `<tr><td class="muted">Failed to run diagnostics: ${esc(e.message)}</td></tr>`;
  }
}

function eventRows(events, withService) {
  if (!events || !events.length) return `<tr><td class="muted">No events yet.</td></tr>`;
  return events.map((e) => {
    const who = e.service || e.watch || "";
    const subject = withService && who ? `<td>${esc(who)}</td>` : "";
    const detail = [e.rule, e.action, e.status].filter(Boolean).map(esc).join(" ");
    return `<tr>
      <td class="t">${esc(fmtTime(e.time))}</td>
      ${subject}
      <td class="kind kind-${esc(e.kind)}">${esc(e.kind)}</td>
      <td>${detail ? `<span class="muted">${detail}</span> ` : ""}${esc(e.message || "")}</td>
    </tr>`;
  }).join("");
}

function render(services) {
  const rows = (services || []).map((s) => {
    const st = (s.status || "unknown").toLowerCase();
    const mon = s.monitored
      ? '<span class="pill">monitored</span>'
      : '<span class="pill">paused</span>';
    const label = s.display_name && s.display_name !== s.name
      ? `${esc(s.name)} <span class="muted">${esc(s.display_name)}</span>`
      : esc(s.name);
    const name = `<a class="name" onclick="detail('${esc(s.name)}')">${label}</a>`;
    const actions = me.can_act ? `
        <button onclick="act('${esc(s.name)}','start')">start</button>
        <button onclick="act('${esc(s.name)}','stop')">stop</button>
        <button onclick="act('${esc(s.name)}','restart')">restart</button>
        ${s.monitored
          ? `<button onclick="act('${esc(s.name)}','unmonitor')">unmonitor</button>`
          : `<button onclick="act('${esc(s.name)}','monitor')">monitor</button>`}`
      : '<span class="muted">read-only</span>';
    return `<tr>
      <td>${name}<div class="muted">${esc(s.unit || "")}</div></td>
      <td class="status ${esc(st)}">${esc(s.status || "unknown")}</td>
      <td>${mon}</td>
      <td>${esc(s.backend || "")}</td>
      <td class="actions">${actions}</td>
    </tr>`;
  });
  $("#rows").innerHTML = rows.join("") || `<tr><td colspan="5" class="muted">No services.</td></tr>`;
}

async function act(name, action) {
  $("#err").textContent = "";
  try {
    const res = await fetch(`api/services/${encodeURIComponent(name)}/${action}`, {
      method: "POST",
      headers: { "X-Sermo-CSRF": "1" },
    });
    const body = await res.json().catch(() => ({}));
    if (!res.ok || body.ok === false) {
      throw new Error(body.message || ("HTTP " + res.status));
    }
  } catch (e) {
    $("#err").textContent = `${action} ${name}: ${e.message}`;
  }
  load();
  if (current) detail(current);
}

let current = null;

async function detail(name) {
  current = name;
  try {
    const res = await fetch(`api/services/${encodeURIComponent(name)}`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    renderDetail(await res.json());
  } catch (e) {
    $("#err").textContent = "Failed to load detail: " + e.message;
  }
}

function renderDetail(d) {
  const checks = (d.checks || []).map((c) => {
    const state = !c.ran ? '<span class="muted">not run yet</span>'
      : c.ok ? '<span class="ok">ok</span>' : '<span class="bad">fail</span>';
    return `<tr><td>${esc(c.name)}</td><td class="muted">${esc(c.type || "")}</td>
      <td>${state}${c.optional ? ' <span class="muted">(optional)</span>' : ''}</td>
      <td class="muted">${esc(c.message || "")}</td></tr>`;
  }).join("") || `<tr><td colspan="4" class="muted">No checks.</td></tr>`;

  const sla = (d.sla || []).map((w) => {
    const v = w.ratio == null ? "n/a" : (w.ratio * 100).toFixed(2) + "%";
    return `<div><div class="v">${v}</div><div class="muted">${esc(w.window)}</div></div>`;
  }).join("") || '<span class="muted">No SLA data.</span>';

  const wins = [["24h", "24h"], ["7d", "168h"], ["30d", "720h"]]
    .map(([label, val]) => `<button onclick="setWin('${val}')"${val === seriesWindow ? ' style="background:#8883"' : ''}>${label}</button>`)
    .join(" ");

  $("#detail").style.display = "block";
  $("#detail").innerHTML = `
    <button class="close" onclick="closeDetail()">close</button>
    <h2>${esc(d.name)} <span class="muted">${esc(d.unit || "")}</span></h2>
    <table><thead><tr><th>Check</th><th>Type</th><th>State</th><th>Message</th></tr></thead>
      <tbody>${checks}</tbody></table>
    <h2>Availability</h2>
    <div class="sla">${sla}</div>
    <h2>History <span class="muted">${wins}</span></h2>
    <div id="chart" class="muted">loading…</div>
    <h2>Recent events</h2>
    <table class="events"><tbody id="svc-events"><tr><td class="muted">loading…</td></tr></tbody></table>`;
  loadSeries(d.name);
  loadServiceEvents(d.name);
}

async function loadServiceEvents(name) {
  try {
    const res = await fetch(`api/services/${encodeURIComponent(name)}/events?limit=50`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    $("#svc-events").innerHTML = eventRows(await res.json(), false);
  } catch (e) {
    $("#svc-events").innerHTML = `<tr><td class="muted">Failed to load events: ${esc(e.message)}</td></tr>`;
  }
}

let seriesWindow = "24h";
const windowMs = { "24h": 864e5, "168h": 6048e5, "720h": 2592e6 };

function setWin(win) { seriesWindow = win; if (current) detail(current); }

async function loadSeries(name) {
  try {
    const res = await fetch(`api/services/${encodeURIComponent(name)}/sla?since=${seriesWindow}`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const body = await res.json();
    $("#chart").innerHTML = drawChart(body.points || []);
    $("#chart").classList.remove("muted");
  } catch (e) {
    $("#chart").textContent = "Failed to load history: " + e.message;
  }
}

function drawChart(points) {
  const W = 640, H = 140, pad = 26, cols = 120;
  const span = windowMs[seriesWindow] || 864e5;
  const startMs = Date.now() - span;
  const buckets = Array.from({ length: cols }, () => ({ up: 0, total: 0 }));
  for (const p of points) {
    const t = Date.parse(p.start);
    if (isNaN(t)) continue;
    const i = Math.floor((t - startMs) / (span / cols));
    if (i >= 0 && i < cols) { buckets[i].up += p.up; buckets[i].total += p.total; }
  }
  const bw = (W - 2 * pad) / cols;
  let bars = "", any = false;
  buckets.forEach((b, i) => {
    if (b.total === 0) return;
    any = true;
    const ratio = b.up / b.total;
    const h = ratio * (H - 2 * pad);
    const x = pad + i * bw, y = H - pad - h;
    const color = ratio >= 0.99 ? "#1a7f37" : ratio >= 0.95 ? "#9a6700" : "#cf222e";
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${Math.max(bw - 0.4, 0.6).toFixed(1)}" height="${h.toFixed(1)}" fill="${color}"></rect>`;
  });
  if (!any) return '<span class="muted">No availability data yet for this window.</span>';
  const axis = `
    <line x1="${pad}" y1="${pad}" x2="${W - pad}" y2="${pad}" stroke="#8884"></line>
    <line x1="${pad}" y1="${H - pad}" x2="${W - pad}" y2="${H - pad}" stroke="#8886"></line>
    <text x="2" y="${pad + 4}" font-size="10" fill="#888">100%</text>
    <text x="${pad}" y="${H - 6}" font-size="10" fill="#888">${new Date(startMs).toLocaleString()}</text>
    <text x="${W - pad}" y="${H - 6}" font-size="10" fill="#888" text-anchor="end">now</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">${axis}${bars}</svg>`;
}

function closeDetail() { current = null; $("#detail").style.display = "none"; }

function fmtTime(t) {
  const d = new Date(t);
  return isNaN(d) ? (t || "") : d.toLocaleString();
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

loadMe().then(load);
loadDiag();
setInterval(() => { load(); if (current) detail(current); }, 5000);
</script>
</body>
</html>
