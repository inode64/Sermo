# systemd-tmpfiles configuration for Sermo. Installed as
# /usr/lib/tmpfiles.d/sermo.conf; applied at boot by systemd-tmpfiles-setup and
# on demand with `systemd-tmpfiles --create`.
#
# Both directories are owner-only (root): 0700 so only root can read or traverse
# them. The runtime dir lives on tmpfs and is recreated each boot; the state dir
# is persistent (its contents — the SQLite state DB — are never cleaned here).
#
# Type Path            Mode UID  GID  Age Argument
d /run/sermo      0700 root root -
d /var/lib/sermo  0700 root root -
