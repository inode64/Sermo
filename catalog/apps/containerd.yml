name: containerd
display_name: "containerd"
category: virtualization
variables:
  binary: ${bindir}/containerd
  shim_binary: ${bindir}/containerd-shim-runc-v2
preflight:
  binary: { type: binary, path: "${binary}" }
  shim: { type: binary, path: "${shim_binary}", optional: true }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
