name: python%n
display_name: "Python ${n} ${current}"
category: runtime
description: "Python interpreter"
variables:
  binary: ${bindir}/python${n}
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  version_short:
    type: command
    command: ["${binary}", "-c", "import platform;print(platform.python_version())"]
    timeout: 10s
