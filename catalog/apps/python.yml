kind: app
name: python
display_name: "Python"
category: runtime
description: "Python interpreter (active slot)"
variables:
  binary: "/usr/bin/python"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
  version_short: { type: command, command: ["${binary}","-c","import platform;print(platform.python_version())"], timeout: 10s }
