kind: app
name: smbd
display_name: "Samba SMB"
category: storage
variables:
  binary: ${bindir}/smbd
  testparm: ${bindir}/testparm
preflight:
  binary: { type: binary, path: "${binary}" }
  testparm: { type: binary, path: "${testparm}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
