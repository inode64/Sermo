kind: app
name: python%n
display_name: "Python ${n}"
category: runtime
description: "Python interpreter"
binary: "/usr/bin/python${n}"
preflight:
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  version_short: { type: command, command: ["${binary}", "-c", "import platform;print(platform.python_version())"], timeout: 10s }
