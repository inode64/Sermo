name: cupsd
display_name: "CUPS"
category: system
variables:
  binary: ${bindir}/cupsd
  cups_config: ${bindir}/cups-config
preflight:
  binary: { type: binary, path: "${binary}" }
  cups-config: { type: binary, path: "${cups_config}", optional: true }
  health: { type: command, command: ["${binary}", "-t"], timeout: 10s }
  version: { type: command, command: ["${cups_config}", "--version"], timeout: 10s, optional: true }
