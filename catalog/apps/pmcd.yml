kind: app
name: pmcd
display_name: "PCP Collector (pmcd)"
category: observability
version_from: pcp
# pmcd ships under PCP's libexec tree; override if your distribution differs.
variables:
  binary: /usr/libexec/pcp/bin/pmcd
preflight:
  binary: { type: binary, path: "${binary}" }
  health: { type: command, command: ["${binary}", "-?"], timeout: 10s }
