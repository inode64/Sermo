name: polkit
display_name: "Polkit"
category: system
variables:
  binary: /usr/lib/polkit-1/polkitd
  pkexec: ${bindir}/pkexec
preflight:
  binary: { type: binary, path: "${binary}" }
  pkexec: { type: binary, path: "${pkexec}" }
  version: { type: command, command: ["${pkexec}", "--version"], timeout: 10s }
