kind: app
name: mysql
display_name: "MySQL"
category: database
version_match: { excludes: MariaDB }
variables:
  binary: ${bindir}/mysqld
  client_binary: ${bindir}/mysql
preflight:
  binary: { type: binary, path: "${binary}" }
  client: { type: binary, path: "${client_binary}", optional: true }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  libraries: { type: libraries, binary: "${binary}" }
