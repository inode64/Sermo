kind: app
name: mysql
display_name: "MySQL"
category: database
variables:
  binary:
    - /usr/sbin/mysqld
    - /usr/bin/mysqld
  mariadbd_binary:
    - /usr/sbin/mariadbd
    - /usr/bin/mariadbd
preflight:
  binary: { type: binary, path: "${binary}" }
  mariadbd: { type: binary, path: "${mariadbd_binary}", optional: true }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  libraries: { type: libraries, binary: "${binary}" }
