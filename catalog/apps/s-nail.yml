name: s-nail
display_name: "S-nail"
category: messaging
description: "Mailx compatible client"
variables:
  binary:
    - ${bindir}/s-nail
    - ${bindir}/mailx
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  config: { type: command, command: ["${binary}", "-v", "-:s", "-e"], timeout: 30s }
