kind: app
name: pmlogger_farm
display_name: "PCP Archive Logger Farm"
category: observability
version_from: pcp
variables:
  binary: /usr/libexec/pcp/bin/pmlogger_farm
preflight:
  binary: { type: binary, path: "${binary}" }
  health: { type: command, command: ["${binary}", "-?"], timeout: 10s, expect_exit: [0, 1] }
