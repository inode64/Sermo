name: rabbitmq
display_name: "RabbitMQ"
category: messaging
variables:
  binary: ${bindir}/rabbitmq-server
  ctl: ${bindir}/rabbitmqctl
preflight:
  binary: { type: binary, path: "${binary}" }
  ctl: { type: binary, path: "${ctl}" }
  version: { type: command, command: ["${ctl}", "version"], timeout: 10s }
