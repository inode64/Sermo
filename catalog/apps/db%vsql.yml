kind: app
name: db%vsql
display_name: "Berkeley DB ${version}"
category: database
description: "Oracle Berkeley DB"
service: db${version}sql
variables:
  binary: "/usr/bin/db${version}sql"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
