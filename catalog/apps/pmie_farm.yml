name: pmie_farm
display_name: "PCP Inference Engine Farm"
category: observability
version_from: pcp
variables:
  binary: /usr/libexec/pcp/bin/pmie_farm
  pmpause_binary:
    - /usr/libexec/pcp/bin/pmpause
    - /usr/lib/pcp/bin/pmpause
    - /usr/lib64/pcp/bin/pmpause
preflight:
  binary: { type: binary, path: "${binary}" }
  pmpause: { type: binary, path: "${pmpause_binary}", optional: true }
  health: { type: command, command: ["${binary}", "-?"], timeout: 10s, expect_exit: [0, 1] }
