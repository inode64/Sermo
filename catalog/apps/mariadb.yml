kind: app
name: mariadb
display_name: "MariaDB"
category: database
version_match: { contains: MariaDB }
variables:
  binary:
    - /usr/sbin/mariadbd
    - /usr/bin/mariadbd
    - /usr/sbin/mysqld
    - /usr/bin/mysqld
  mysqld_binary:
    - /usr/sbin/mysqld
    - /usr/bin/mysqld
preflight:
  binary: { type: binary, path: "${binary}" }
  mysqld: { type: binary, path: "${mysqld_binary}", optional: true }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  libraries: { type: libraries, binary: "${binary}" }
