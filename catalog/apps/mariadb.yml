kind: app
name: mariadb
display_name: "MariaDB"
category: database
version_match: { contains: MariaDB }
variables:
  binary:
    - ${bindir}/mariadbd
    - ${bindir}/mysqld
  client_binary:
    - ${bindir}/mariadb
    - ${bindir}/mysql
preflight:
  binary: { type: binary, path: "${binary}" }
  client: { type: binary, path: "${client_binary}", optional: true }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  libraries: { type: libraries, binary: "${binary}" }
