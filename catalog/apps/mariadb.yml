kind: app
name: mariadb
display_name: "MariaDB"
category: database
variables:
  binary:
    - /usr/sbin/mariadbd
    - /usr/bin/mariadbd
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  libraries: { type: libraries, binary: "${binary}" }
