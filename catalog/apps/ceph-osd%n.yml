kind: app
name: ceph-osd%n
display_name: "Ceph OSD ${n}"
category: storage
description: "Ceph object storage daemon"
versions:
  from: "/var/lib/ceph/osd/ceph-${n}"
variables:
  binary: "/usr/bin/ceph-osd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
