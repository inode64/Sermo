kind: app
name: firewalld
display_name: "firewalld"
category: security
variables:
  binary: ${bindir}/firewalld
  binary_offline: ${bindir}/firewall-offline-cmd
preflight:
  binary: { type: binary, path: "${binary}" }
  binary_offline: { type: binary, path: "${binary_offline}" }
  version: { type: command, command: ["${binary_offline}", "--version"], timeout: 10s }
