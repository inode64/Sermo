name: virtnetworkd
display_name: "libvirt Network Daemon"
category: virtualization
variables:
  binary: ${bindir}/virtnetworkd
  dnsmasq_binary: ${bindir}/dnsmasq
preflight:
  binary: { type: binary, path: "${binary}" }
  dnsmasq: { type: binary, path: "${dnsmasq_binary}", optional: true }
  version: { type: command, command: ["${binary}", "-V"], timeout: 10s }
