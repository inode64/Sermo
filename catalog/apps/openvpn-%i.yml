kind: app
name: openvpn-%i
display_name: "OpenVPN ${instance}"
category: network
versions:
  from: "/etc/init.d/openvpn.${instance}"
variables:
  binary: "/usr/bin/openvpn"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
