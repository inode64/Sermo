kind: app
name: xrdp
display_name: "xrdp"
category: remote
variables:
  binary: ${bindir}/xrdp
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s, optional: true }
  health: { type: command, command: ["${binary}", "--help"], timeout: 10s }
