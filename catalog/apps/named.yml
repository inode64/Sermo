kind: app
name: named
display_name: "BIND (named)"
category: network
variables:
  binary: ${bindir}/named
  checkconf: ${bindir}/named-checkconf
preflight:
  binary: { type: binary, path: "${binary}" }
  checkconf: { type: binary, path: "${checkconf}" }
  version: { type: command, command: ["${binary}", "-v"], timeout: 10s }
