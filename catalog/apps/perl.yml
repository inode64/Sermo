kind: app
name: perl
display_name: "Perl"
category: runtime
variables:
  binary: ${bindir}/perl
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  version_short: { type: command, command: ["${binary}","-e","printf '%vd', $^V"], timeout: 10s }
