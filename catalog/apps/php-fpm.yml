name: php-fpm%v
display_name: "PHP-FPM ${version} ${current}"
category: runtime
description: "PHP-FPM interpreter"
variables:
  binary: ${bindir}/php-fpm${version}
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}", "-v"], timeout: 10s }
  libraries: { type: libraries, binary: "${binary}", optional: true }
