kind: app
name: php
display_name: "PHP"
category: runtime
description: "PHP interpreter (active slot)"
variables:
  binary: "/usr/bin/php"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  version_short: { type: command, command: ["${binary}","-r","echo PHP_VERSION;"], timeout: 10s }
