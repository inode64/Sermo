kind: app
name: mosquitto
display_name: "Eclipse Mosquitto"
category: messaging
variables:
  binary: ${bindir}/mosquitto
preflight:
  binary: { type: binary, path: "${binary}" }
  # mosquitto has no --version flag; -h prints the usage with
  # "mosquitto version 2.0.22" as its first line.
  version: { type: command, command: ["${binary}", "-h"], timeout: 10s }
