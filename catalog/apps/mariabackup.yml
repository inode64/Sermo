kind: app
name: mariadb-backup
display_name: "MariaDB Backup"
category: database
variables:
  binary:
  - "/usr/bin/mariadb-backup"
  - "/usr/bin/mariadbbackup"
preflight:
  binary: { type: binary, path: "${binary}", optional: true }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s, optional: true }
