name: rspamd
display_name: "Rspamd"
category: messaging
variables:
  binary: ${bindir}/rspamd
  rspamadm: ${bindir}/rspamadm
preflight:
  binary: { type: binary, path: "${binary}" }
  libraries: { type: libraries, binary: "${binary}" }
  rspamadm: { type: binary, path: "${rspamadm}" }
  version: { type: command, command: ["${binary}", "-v"], timeout: 10s }
