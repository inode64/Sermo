kind: patterns
name: smartd
display_name: "S.M.A.R.T. disk signals"
description: "Disk-health signals for smartctl/smartd output (see verifica_sistema.py)."
rules:
  # A failing self-assessment with the vendor's data-loss warning is critical.
  - { id: smart-backup-now, match: 'BACK UP DATA NOW',          severity: error }
  - { id: smart-failed,     match: '(?i)FAILED SMART',           severity: error }
  - { id: prefail,          match: '(?i)Pre-fail.*\bFAILING_NOW\b', severity: error }
  # A degraded-but-not-failing assessment is a warning.
  - { id: smart-degraded,   match: '(?i)below threshold',        severity: warning }
