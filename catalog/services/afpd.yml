name: afpd
display_name: Netatalk AFP Daemon
category: storage
service: afpd
apps:
  - afpd
restart_on_change:
  apps:
    - afpd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 548
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
