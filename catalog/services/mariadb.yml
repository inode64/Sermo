name: mariadb
display_name: MariaDB
category: database
type: database
service:
  systemd:
    - mariadb
    - mysql
  openrc:
    - mariadb
    - mysql
apps:
  - mariadb
restart_on_change:
  apps:
    - mariadb
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: mysql
  backup_user: mysql
  host: 127.0.0.1
  port: 3306
  config:
    - /etc/mysql/my.cnf
    - /etc/my.cnf
pidfile:
  - /run/mysqld/mariadb.pid
  - /run/mysqld/mysqld.pid
socket:
  path: /run/mysqld/mysqld.sock
  optional: true
preflight:
  config:
    type: command
    command:
      - ${mariadb_binary}
      - --help
      - --verbose
    timeout: 15s
processes:
  mariadbd:
    exe: ${mariadb_binary}
    user: ${user}
config_files:
  - ${config}
stop_policy:
  graceful_timeout: 120s
  term_timeout: 60s
  kill_only_if:
    users:
      - ${user}
    exe_any:
      - ${mariadb_binary}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  block-restart-during-backup:
    type: guard
    blocks:
      - restart
    if:
      active:
        check: backup
    then:
      action: block
      message: ${display_name} backup is running; restart denied
watches:
  service:
    check:
      type: service
      expect: active
  ping:
    check:
      type: mysql
      host: ${host}
      port: ${port}
      timeout: 5s
      verify: true
  memory:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
  backup:
    check:
      type: process
      optional: true
      exe_any:
        - /usr/bin/mariadb-dump
        - /usr/bin/mysqldump
        - /usr/bin/mariadb-backup
        - /usr/bin/mariadbbackup
        - /usr/bin/xtrabackup
        - /usr/bin/wal-g-mysql
        - /usr/local/bin/wal-g-mysql
        - /usr/bin/wal-g
        - /usr/local/bin/wal-g
      user: ${backup_user}
      state: running
  restart-if-tcp-failed:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 3s
    for:
      cycles: 3
    then:
      action: restart
  restart-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 40%
      optional: true
    within:
      cycles: 15
      min_matches: 5
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
