kind: daemon
name: mariadb
display_name: "MariaDB"
category: database
type: database

service:
  systemd: [mariadb, mysql]
  openrc: [mariadb, mysql]

# Binary + version are owned by linked apps.
apps: [mariadb]

variables:
  user: mysql
  host: 127.0.0.1
  port: 3306

pidfile:
  - /run/mysqld/mariadb.pid
  - /run/mysqld/mysqld.pid

preflight:
  config:
    type: command
    command: ["${mariadb_binary}", "--help", "--verbose"]
    timeout: 15s

processes:
  mariadbd:
    type: command_match
    exe: "${mariadb_binary}"
    user: "${user}"

config_files: [/etc/mysql/my.cnf, /etc/my.cnf]

checks:
  service:
    type: service
    expect: active

  tcp:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 3s

  # Native MySQL-protocol liveness: reads the server's handshake greeting (and
  # version) without authenticating — no external mariadb-admin/mysqladmin. Set
  # user/password here for a deeper authenticated ping instead.
  ping:
    type: mysql
    host: "${host}"
    port: "${port}"
    timeout: 5s

stop_policy:
  graceful_timeout: 120s
  term_timeout: 60s
  kill_only_if:
    users: ["${user}"]
    exe_any:
      - "${mariadb_binary}"

policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h

rules:
  restart-if-tcp-failed:
    type: remediation
    if:
      failed:
        check: tcp
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart

  restart-if-memory-high:
    type: remediation
    if:
      metric:
        scope: service
        name: memory
        op: ">"
        value: 40%
    within:
      cycles: 15
      min_matches: 5
    then:
      action: restart
