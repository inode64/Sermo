name: loki
display_name: Grafana Loki
category: observability
description: Grafana Loki log-aggregation server.
service:
  systemd:
    - loki
  openrc:
    - loki
apps:
  - loki
variables:
  user: loki
  host: 127.0.0.1
  port: 3100
  config: /etc/loki/config.yml
config_files:
  - ${config}
preflight:
  config:
    type: command
    command:
      - ${loki_binary}
      - -verify-config
      - -config.file=${config}
    timeout: 30s
pidfile: { path: /run/loki.pid, optional: true }
processes:
  main:
    exe: ${loki_binary}
    user: ${user}
reload:
  signal: HUP
reload_on_change:
  paths:
    - ${config}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  ready:
    check:
      type: http
      url: http://${host}:${port}/ready
      expect_status: 200
      timeout: 5s
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
