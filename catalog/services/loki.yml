kind: daemon
name: loki
display_name: "Grafana Loki"
category: observability
description: "Grafana Loki log-aggregation server."

service:
  systemd: [loki]
  openrc: [loki]

apps: [loki]
variables:
  user: loki
  host: 127.0.0.1
  port: 3100

pidfile: /run/loki.pid

processes:
  main:
    type: command_match
    exe: "${loki_binary}"
    user: "${user}"

# Loki reloads its config on SIGHUP (and POST /reload when
# -config.expand-env/--config.file reloading is enabled). Its systemd unit
# usually has no ExecReload, so Sermo signals MainPID; the default `when: auto`
# uses the init reload where one exists.
reload:
  signal: HUP

checks:
  service:
    type: service
    expect: active

  port:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 2s

  # /ready returns 200 once Loki has finished starting and can serve queries;
  # before then it answers 503, so it doubles as a startup-complete signal.
  ready:
    type: http
    url: "http://${host}:${port}/ready"
    expect_status: 200
    timeout: 5s
