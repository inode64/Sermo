name: nmbd
display_name: Samba NMB
category: storage
service: nmbd
apps:
  - nmbd
restart_on_change:
  apps:
    - nmbd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
preflight:
  config:
    type: command
    command:
      - ${nmbd_testparm}
      - -s
    timeout: 30s
    analyze:
      use:
        - common
      rules:
        - id: dir-artifact
          match: (?i)(lock|pid) directory .* does not exist
          severity: ok
reload:
  command:
    - ${nmbd_smbcontrol}
    - nmbd
    - reload-config
watches:
  service:
    check:
      type: service
      expect: active
  netbios:
    check:
      type: tcp
      port: 137
      timeout: 3s
      optional: true
      verify: true
  smb:
    check:
      type: smb
      port: 445
      timeout: 3s
      optional: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
