name: cups
display_name: CUPS
category: system
service:
  systemd:
    - cups
  openrc:
    - cupsd
apps:
  - cupsd
restart_on_change:
  apps:
    - cupsd
variables:
  port: 631
pidfile:
  - /run/cupsd.pid
  - /run/cups/cupsd.pid
preflight:
  config:
    type: command
    command:
      - ${cupsd_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  ipp:
    check:
      type: ipp
      port: ${port}
      timeout: 3s
