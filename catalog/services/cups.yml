kind: daemon
name: cups-config
display_name: "CUPS"
description: "CUPSD"
service:
  systemd: [cups]
  openrc: [cupsd, cups-config]
apps: [cups-config]

variables:
  port: 631
preflight:
  config: { type: command, command: ["/usr/sbin/cupsd","-t"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  ipp: { type: ipp, port: "${port}", timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
