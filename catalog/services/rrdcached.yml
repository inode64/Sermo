name: rrdcached
display_name: RRD Cached
category: observability
description: RRDTool data caching daemon.
service: rrdcached
pidfile: /run/rrdcached.pid
socket: /run/rrdcached.sock
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-socket-missing:
    check:
      type: socket
      path: /run/rrdcached.sock
      requires:
        - service
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    clear:
      cycles: 10
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 52850688
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
