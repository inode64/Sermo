name: rrdcached
display_name: RRD Cached
category: observability
description: RRDTool data caching daemon.
service: rrdcached
pidfile: /run/rrdcached.pid
socket: /run/rrdcached.sock
checks:
  service:
    type: service
    expect: active
postflight:
  socket:
    type: socket
    path: /run/rrdcached.sock
rules:
  restart-if-socket-missing:
    type: remediation
    if:
      failed:
        check: socket
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
