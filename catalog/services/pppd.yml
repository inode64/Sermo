name: pppd
display_name: PPP Daemon
category: network
description: PPP daemon — PPPoE/dial-up uplink to an internet provider.
type: tunnel
service: pppd
apps:
  - pppd
variables:
  ppp_iface: ppp0
  probe_host: 1.1.1.1
  probe_name: example.com
pidfile: /run/${ppp_iface}.pid
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
restart_on_change:
  libraries:
    - glibc
checks:
  service:
    type: service
    expect: active
  link:
    type: net
    interface: ${ppp_iface}
    metric: state
    expect: up
  ip:
    type: net
    interface: ${ppp_iface}
    metric: address
    expect: present
  route:
    type: route
    interface: ${ppp_iface}
  internet:
    type: icmp
    host: ${probe_host}
    interface: ${ppp_iface}
    metric: state
    expect: up
    timeout: 5s
  dns:
    type: dns
    resolvconf: true
    query: ${probe_name}
    expect:
      rcode: NOERROR
      answers:
        op: '>'
        value: 0
    timeout: 5s
