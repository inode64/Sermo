name: apache
aliases:
  - apache2
  - httpd
display_name: Apache HTTP Server
category: web
type: webserver
service:
  systemd:
    - apache2
    - httpd
  openrc:
    - apache2
    - apache
apps:
  - apache
restart_on_change:
  apps:
    - apache
variables:
  user: www-data
  host: 127.0.0.1
  port: 80
  tls_port: 443
  health_path: /
preflight:
  config:
    type: command
    command:
      - ${apache_binary}
      - -t
    timeout: 10s
    analyze:
      use:
        - web
processes:
  main:
    exe: ${apache_binary}
    user: root
  workers:
    exe: ${apache_binary}
    user: ${user}
pidfile: /run/apache2.pid
reload:
  command:
    - ${apache_binary}
    - -k
    - graceful
config_files:
  - /etc/apache2/httpd.conf
  - /etc/apache2/apache2.conf
  - /etc/httpd/conf/httpd.conf
stop_policy:
  term_timeout: 10s
  force_kill: true
  kill_only_if:
    users:
      - ${user}
      - root
    exe_any:
      - ${apache_binary}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
reload_on_change:
  paths:
    - /etc/apache2/httpd.conf
    - /etc/apache2/apache2.conf
    - /etc/httpd/conf/httpd.conf
watches:
  service:
    check:
      type: service
      expect: active
  cert:
    check:
      type: cert
      optional: true
      host: ${host}
      port: ${tls_port}
      cert_verify: false
      expires_in_days: 21
      timeout: 5s
  restart-if-http-failed:
    check:
      type: http
      url: http://${host}:${port}${health_path}
      follow_redirects: false
      expect_status:
        op: <
        value: 500
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
