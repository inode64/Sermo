name: apache
aliases:
  - apache2
  - httpd
display_name: Apache HTTP Server
category: web
type: webserver
service:
  systemd:
    - apache2
    - httpd
  openrc:
    - apache2
    - apache
apps:
  - apache
variables:
  user: www-data
  host: 127.0.0.1
  port: 80
  tls_port: 443
  health_path: /
preflight:
  config:
    type: command
    command:
      - ${apache_binary}
      - -t
    timeout: 10s
    analyze:
      use:
        - web
processes:
  main:
    exe: ${apache_binary}
    user: root
  workers:
    exe: ${apache_binary}
    user: ${user}
pidfile: /run/apache2.pid
config_files:
  - /etc/apache2/httpd.conf
  - /etc/apache2/apache2.conf
  - /etc/httpd/conf/httpd.conf
checks:
  service:
    type: service
    expect: active
  http:
    type: http
    url: http://${host}:${port}${health_path}
    expect_status:
      op: <
      value: 500
    timeout: 5s
    verify: true
  cert:
    type: cert
    optional: true
    host: ${host}
    port: ${tls_port}
    cert_verify: false
    expires_in_days: 21
    timeout: 5s
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
stop_policy:
  term_timeout: 10s
  force_kill: true
  kill_only_if:
    users:
      - ${user}
      - root
    exe_any:
      - ${apache_binary}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-http-failed:
    type: remediation
    if:
      failed:
        check: http
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
reload_on_change:
  paths:
    - /etc/apache2/httpd.conf
    - /etc/apache2/apache2.conf
    - /etc/httpd/conf/httpd.conf
