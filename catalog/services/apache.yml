kind: daemon
name: apache
display_name: "Apache HTTP Server"
category: web
type: webserver

service:
  systemd: [apache2, httpd]
  openrc: [apache2, apache]

# Binary + version are owned by the `apache` app (same name) and linked here.
apps: [apache]

variables:
  user: www-data
  host: 127.0.0.1
  port: 80
  tls_port: 443
  health_path: /

preflight:
  config:
    type: command
    command: ["sh", "-c", "if command -v apache2ctl >/dev/null 2>&1; then exec apache2ctl configtest; else exec apachectl configtest; fi"]
    timeout: 10s

processes:
  main:
    type: command_match
    exe: "${apache_binary}"
    user: root

  workers:
    type: command_match
    exe: "${apache_binary}"
    user: "${user}"

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/apache2.pid

config_files: [/etc/apache2/httpd.conf, /etc/apache2/apache2.conf, /etc/httpd/conf/httpd.conf]

checks:
  service:
    type: service
    expect: active

  http:
    type: http
    url: "http://${host}:${port}${health_path}"
    expect_status: { op: "<", value: 500 }
    timeout: 5s

  # HTTPS certificate expiry. verify:false avoids alarms on self-signed certs; a
  # TLS/connection error is not an alert, so a host without 443 stays quiet.
  cert:
    type: cert
    optional: true
    host: "${host}"
    port: "${tls_port}"
    verify: false
    expires_in_days: 21
    timeout: 5s

stop_policy:
  term_timeout: 10s
  force_kill: true
  kill_only_if:
    users: ["${user}", root]
    exe_any:
      - "${apache_binary}"

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed:
        check: config
    then:
      action: block
      message: "${display_name} configuration is invalid"

  restart-if-http-failed:
    type: remediation
    if:
      failed:
        check: http
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart
