kind: daemon
name: syslog-ng
category: observability
service: syslog-ng
apps: [syslog-ng]

variables:
  config: /etc/syslog-ng/syslog-ng.conf

preflight:
  config: { type: command, command: ["${syslog_ng_binary}", "--syntax-only", "--cfgfile=${config}"], timeout: 30s }

config_files: ["${config}", /etc/syslog-ng/conf.d]

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/syslog-ng.pid

socket: /run/syslog-ng.ctl

processes:
  main:
    exe: "${syslog_ng_binary}"
    user: root

checks:
  service: { type: service, expect: active }

  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: ">"
        value: 90%
    # 12 consecutive 30s cycles = 6 minutes.
    for:
      cycles: 12
    then:
      action: restart
