name: syslog-ng
category: observability
service: syslog-ng
apps:
  - syslog-ng
restart_on_change:
  apps:
    - syslog-ng
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  config: /etc/syslog-ng/syslog-ng.conf
preflight:
  config:
    type: command
    command:
      - ${syslog_ng_binary}
      - --syntax-only
      - --cfgfile=${config}
    timeout: 30s
config_files:
  - ${config}
  - /etc/syslog-ng/conf.d
pidfile: /run/syslog-ng.pid
socket: /run/syslog-ng.ctl
processes:
  main:
    exe: ${syslog_ng_binary}
    user: root
reload:
  signal: HUP
reload_on_change:
  paths:
    - ${config}
    - /etc/syslog-ng/conf.d
watches:
  service:
    check:
      type: service
      expect: active
  ctl:
    check:
      type: command
      command:
        - ${syslog_ng_binary}
        - stats
      timeout: 10s
      optional: true
      verify: true
  memory:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    clear:
      cycles: 10
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 16044442
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    clear:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 2245
      optional: true
    for:
      duration: 5m
    clear:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} IO usage stayed above ${check.threshold} (current ${check.value})
