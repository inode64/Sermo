name: syslog-ng
category: observability
service: syslog-ng
apps:
  - syslog-ng
variables:
  config: /etc/syslog-ng/syslog-ng.conf
preflight:
  config:
    type: command
    command:
      - ${syslog_ng_binary}
      - --syntax-only
      - --cfgfile=${config}
    timeout: 30s
config_files:
  - ${config}
  - /etc/syslog-ng/conf.d
pidfile: /run/syslog-ng.pid
socket: /run/syslog-ng.ctl
processes:
  main:
    exe: ${syslog_ng_binary}
    user: root
reload:
  signal: HUP
reload_on_change:
  paths:
    - ${config}
    - /etc/syslog-ng/conf.d
watches:
  service:
    check:
      type: service
      expect: active
  ctl:
    check:
      type: command
      command:
        - ${syslog_ng_binary}
        - stats
      timeout: 10s
      optional: true
      verify: true
  memory:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
