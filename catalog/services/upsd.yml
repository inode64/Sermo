kind: daemon
name: upsd
display_name: "NUT UPS Daemon"
service: upsd
variables:
  port: 3493
  binary: "/usr/bin/upsd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  nut: { type: nut, port: "${port}", timeout: 3s }
