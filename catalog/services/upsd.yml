name: upsd
display_name: NUT UPS Daemon
category: hardware
service:
  systemd:
    - upsd
  openrc:
    - upsd
apps:
  - upsd
restart_on_change:
  apps:
    - upsd
variables:
  port: 3493
  user: nut
pidfile: /run/nut/upsd.pid
os:
  ubuntu:
    service:
      systemd:
        - nut-server
processes:
  main:
    exe: ${upsd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  nut:
    check:
      type: nut
      port: ${port}
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 2248295
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
