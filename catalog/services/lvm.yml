name: lvm
display_name: LVM
category: storage
service: lvm
apps:
  - lvm
restart_on_change:
  apps:
    - lvm
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
processes: { }
watches:
  service:
    check:
      type: service
      expect: active
