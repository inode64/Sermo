name: bitbucketrunner
display_name: Bitbucket Pipelines Runner
category: vpn
description: Atlassian Bitbucket self-hosted Pipelines runner.
service:
  systemd:
    - bitbucketrunner
  openrc:
    - bitbucketrunner
watches:
  service:
    check:
      type: service
      expect: active
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
