name: bitbucketrunner
display_name: Bitbucket Pipelines Runner
category: vpn
description: Atlassian Bitbucket self-hosted Pipelines runner.
service:
  systemd:
    - bitbucketrunner
  openrc:
    - bitbucketrunner
checks:
  service:
    type: service
    expect: active
rules:
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
