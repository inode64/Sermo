name: proftpd
display_name: ProFTPD
category: network
service: proftpd
apps:
  - proftpd
variables:
  user: root
  port: 21
preflight:
  config:
    type: command
    command:
      - ${proftpd_binary}
      - --configtest
    timeout: 30s
pidfile: /run/proftpd/proftpd.pid
processes:
  main:
    exe: ${proftpd_binary}
    user: ${user}
reload:
  signal: HUP
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  ftp:
    type: ftp
    port: ${port}
    timeout: 3s
