name: proftpd
display_name: ProFTPD
category: network
service: proftpd
apps:
  - proftpd
restart_on_change:
  apps:
    - proftpd
variables:
  user: root
  port: 21
preflight:
  config:
    type: command
    command:
      - ${proftpd_binary}
      - --configtest
    timeout: 30s
pidfile: /run/proftpd/proftpd.pid
processes:
  main:
    exe: ${proftpd_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  ftp:
    check:
      type: ftp
      port: ${port}
      timeout: 3s
