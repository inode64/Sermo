name: proftpd
display_name: ProFTPD
category: network
service: proftpd
apps:
  - proftpd
restart_on_change:
  apps:
    - proftpd
variables:
  user: root
  port: 21
preflight:
  config:
    type: command
    command:
      - ${proftpd_binary}
      - --configtest
    timeout: 30s
pidfile: /run/proftpd/proftpd.pid
processes:
  main:
    exe: ${proftpd_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  ftp:
    check:
      type: ftp
      port: ${port}
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 23879680
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
