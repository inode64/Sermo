name: mdmonitor
display_name: MD array monitor
category: storage
description: mdadm monitor service for Linux software RAID arrays.
service:
  systemd:
    - mdmonitor
apps:
  - mdadm
restart_on_change:
  apps:
    - mdadm
processes:
  main:
    exe: ${mdadm_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  raid:
    check:
      type: raid
      degraded:
        op: '>'
        value: 0
