name: mdmonitor
display_name: MD array monitor
category: storage
description: mdadm monitor service for Linux software RAID arrays.
service:
  systemd:
    - mdmonitor
apps:
  - mdadm
restart_on_change:
  apps:
    - mdadm
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
processes:
  main:
    exe: ${mdadm_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  raid:
    check:
      type: raid
      degraded:
        op: '>'
        value: 0
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 85065728
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
