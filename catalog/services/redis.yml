kind: daemon
name: redis
display_name: Redis
category: database
type: cache
service:
  systemd:
  - redis
  - redis-server
  openrc:
  - redis
  - redis-server
apps:
- redis
variables:
  user: redis
  host: 127.0.0.1
  port: 6379
pidfile:
- /run/redis/redis.pid
- /run/redis.pid
processes:
  redis:
    exe: ${redis_binary}
    user: ${user}
config_files:
- /etc/redis/redis.conf
- /etc/redis.conf
checks:
  service:
    type: service
    expect: active
  tcp:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  ping:
    type: redis
    host: ${host}
    port: ${port}
    timeout: 3s
  persistence:
    type: redis
    host: ${host}
    port: ${port}
    timeout: 3s
    expect:
      rdb_last_bgsave_status: ok
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  restart-if-tcp-failed:
    type: remediation
    if:
      failed:
        check: tcp
    for:
      cycles: 3
    then:
      action: restart
  restart-if-ping-failed:
    type: remediation
    if:
      failed:
        check: ping
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
postflight:
  ping:
    type: redis
    host: ${host}
    port: ${port}
    timeout: 3s
reload_on_change:
  paths:
  - /etc/redis/redis.conf
  - /etc/redis.conf
