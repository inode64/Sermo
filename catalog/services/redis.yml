kind: daemon
name: redis
display_name: "Redis"
type: cache

service:
  systemd: [redis, redis-server]
  openrc: [redis, redis-server]

# Binary + version are owned by the `redis` app (same name) and linked here.
apps: [redis]

variables:
  binary: /usr/bin/redis-server
  user: redis
  host: 127.0.0.1
  port: 6379
  pidfile: /run/redis/redis.pid

commands:
  version:
    command: ["${binary}", "--version"]

preflight:
  libraries:
    type: libraries
    binary: "${binary}"

processes:
  pidfile:
    type: pidfile
    path: "${pidfile}"

  redis:
    type: command_match
    exe: "${binary}"
    user: "${user}"

checks:
  service:
    type: service
    expect: active

  tcp:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 2s

  # Native RESP liveness: connects and verifies the server answers PING with
  # PONG (the redis probe does AUTH+PING+INFO over a socket), so no external
  # redis-cli is needed. This is the bare liveness check wired to the restart
  # rule below; set password/user (and tls) here if the server requires auth.
  ping:
    type: redis
    host: "${host}"
    port: "${port}"
    timeout: 3s

  # Same native RESP probe, but asserting the last background save succeeded
  # (reported "ok" even when persistence is disabled, so it never false-alarms).
  # It exposes role, replication, persistence and memory for expect. Kept
  # separate from `ping` and NOT wired to a remediation rule: a failed save is
  # surfaced for alerting, not fixed by a restart.
  persistence:
    type: redis
    host: "${host}"
    port: "${port}"
    timeout: 3s
    expect:
      rdb_last_bgsave_status: ok

stop_policy:
  graceful_timeout: 30s
  term_timeout: 15s
  force_kill: false

rules:
  restart-if-tcp-failed:
    type: remediation
    if:
      failed:
        check: tcp
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart

  restart-if-ping-failed:
    type: remediation
    if:
      failed:
        check: ping
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart
