name: redis
display_name: Redis
category: database
type: cache
service:
  systemd:
    - redis
    - redis-server
  openrc:
    - redis
    - redis-server
apps:
  - redis
variables:
  user: redis
  host: 127.0.0.1
  port: 6379
pidfile:
  - /run/redis/redis.pid
  - /run/redis.pid
processes:
  redis:
    exe: ${redis_binary}
    user: ${user}
config_files:
  - /etc/redis/redis.conf
  - /etc/redis.conf
stop_policy:
  graceful_timeout: 90s
  term_timeout: 60s
  kill_only_if:
    users:
      - ${user}
    exe_any:
      - ${redis_binary}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
restart_on_change:
  paths:
    - /etc/redis/redis.conf
    - /etc/redis.conf
  apps:
    - redis
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  restart-if-tcp-failed:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
    for:
      cycles: 3
    then:
      action: restart
  restart-if-ping-failed:
    check:
      type: redis
      host: ${host}
      port: ${port}
      timeout: 3s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
  alert-if-persistence-failed:
    check:
      type: redis
      host: ${host}
      port: ${port}
      timeout: 3s
      expect:
        rdb_last_bgsave_status: ok
    then:
      action: alert
      message: ${display_name} persistence status is not ok
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 27538228
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
