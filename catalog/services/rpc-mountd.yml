kind: daemon
name: rpc-mountd
display_name: "NFS Mount Daemon"
category: storage
description: "RPC.mountd"
service:
  systemd: [rpc-mountd, nfs-mountd]
  openrc: [rpc-mountd, nfs-mountd]
apps: [rpc-mountd]

checks:
  service: { type: service, expect: active }
  mountd: { type: mountd, timeout: 3s }
