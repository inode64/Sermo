name: rsync
category: storage
service:
  systemd:
    - rsync
    - rsyncd
  openrc:
    - rsyncd
    - rsync
apps:
  - rsync
variables:
  port: 873
pidfile: /run/rsyncd.pid
processes:
  main:
    exe: ${rsync_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  rsync:
    type: rsync
    host: 127.0.0.1
    port: ${port}
    timeout: 3s
    verify: true
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  restart-if-rsync-failed:
    check:
      ref: rsync
    for:
      cycles: 3
    then:
      action: restart
  restart-if-port-failed:
    check:
      ref: port
    for:
      cycles: 3
    then:
      action: restart
