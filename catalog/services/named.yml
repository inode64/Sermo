kind: daemon
name: named
display_name: "BIND (named)"
category: network
service: named
apps: [named]

variables:
  host: 127.0.0.1
  port: 53
  # Name resolved to prove the resolver answers; override per deployment.
  query: localhost
preflight:
  config: { type: command, command: ["sh","-c","/etc/init.d/named checkconfig && /etc/init.d/named checkzones"], timeout: 30s, analyze: { use: [common] } }

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/named/named.pid

config_files: [/etc/bind/named.conf, /etc/named.conf]

checks:
  service: { type: service, expect: active }
  port: { type: dns, host: "${host}", port: "${port}", query: "${query}" }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
