name: named
display_name: BIND (named)
category: network
service: named
apps:
  - named
variables:
  host: 127.0.0.1
  port: 53
  user: named
  query: localhost
os:
  ubuntu:
    variables:
      user: bind
preflight:
  config:
    type: command
    command:
      - ${named_checkconf}
      - -z
    timeout: 30s
    analyze:
      use:
        - common
pidfile: /run/named/named.pid
config_files:
  - /etc/bind/named.conf
  - /etc/named.conf
processes:
  main:
    exe: ${named_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: dns
      host: ${host}
      port: ${port}
      query: ${query}
