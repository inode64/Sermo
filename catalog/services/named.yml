name: named
display_name: BIND (named)
category: network
service: named
apps:
  - named
restart_on_change:
  apps:
    - named
variables:
  host: 127.0.0.1
  port: 53
  user: named
  query: localhost
os:
  ubuntu:
    variables:
      user: bind
preflight:
  config:
    type: command
    command:
      - ${named_checkconf}
      - -z
    timeout: 30s
    analyze:
      use:
        - common
pidfile: /run/named/named.pid
config_files:
  - /etc/bind/named.conf
  - /etc/named.conf
processes:
  main:
    exe: ${named_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: dns
      host: ${host}
      port: ${port}
      query: ${query}
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 111955149
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.55%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 29647
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} IO usage stayed above ${check.threshold} (current ${check.value})
