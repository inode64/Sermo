name: dbus
display_name: D-Bus
category: system
description: DBus Daemon
service:
  systemd:
    - dbus
    - dbus-daemon
  openrc:
    - dbus
    - dbus-daemon
apps:
  - dbus
restart_on_change:
  apps:
    - dbus
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: messagebus
pidfile: /run/dbus.pid
processes:
  main:
    exe: ${dbus_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  dbus:
    check:
      type: dbus
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 11304551
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    clear:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
