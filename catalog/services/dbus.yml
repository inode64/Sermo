name: dbus
display_name: D-Bus
category: system
description: DBus Daemon
service:
  systemd:
    - dbus
    - dbus-daemon
  openrc:
    - dbus
    - dbus-daemon
apps:
  - dbus
restart_on_change:
  apps:
    - dbus
variables:
  user: messagebus
pidfile: /run/dbus.pid
processes:
  main:
    exe: ${dbus_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  dbus:
    check:
      type: dbus
      timeout: 3s
