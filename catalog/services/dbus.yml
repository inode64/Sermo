kind: daemon
name: dbus
display_name: D-Bus
category: system
description: DBus Daemon
service:
  systemd:
    - dbus
    - dbus-daemon
  openrc:
    - dbus
    - dbus-daemon
apps:
  - dbus
variables:
  user: messagebus
pidfile: /run/dbus.pid
processes:
  main:
    exe: ${dbus_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  dbus:
    type: dbus
    timeout: 3s
