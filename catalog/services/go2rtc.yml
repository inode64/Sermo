name: go2rtc
display_name: go2rtc
category: web
description: go2rtc real-time camera streaming server (WebRTC/RTSP).
service:
  systemd:
    - go2rtc
    - go2rtc@config
  openrc:
    - go2rtc
apps:
  - go2rtc
variables:
  host: 127.0.0.1
  port: 1984
pidfile: /run/go2rtc.pid
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  http:
    check:
      type: http
      url: http://${host}:${port}/
      expect_status:
        op: <
        value: 500
      timeout: 5s
