name: freshclam
display_name: FreshClam
category: security
description: ClamAV virus database updater daemon
service:
  systemd:
    - clamav-freshclam
    - freshclam
  openrc:
    - freshclam
apps:
  - freshclam
variables:
  user: clamav
pidfile: /run/clamav/freshclam.pid
processes:
  main:
    exe: ${freshclam_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${freshclam_binary}
    user: ${user}
    state: running
    requires:
      - service
    verify: true
watches:
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
