kind: daemon
name: freshclam
display_name: "FreshClam"
category: security
description: "ClamAV virus database updater daemon"
service:
  systemd: [clamav-freshclam, freshclam]
  openrc: [freshclam]
apps: [freshclam]

variables:
  user: clamav

pidfile: /run/clamav/freshclam.pid

processes:
  main:
    exe: "${freshclam_binary}"
    user: "${user}"

checks:
  service: { type: service, expect: active }
