kind: daemon
name: freshclam
display_name: FreshClam
category: security
description: ClamAV virus database updater daemon
service:
  systemd:
    - clamav-freshclam
    - freshclam
  openrc:
    - freshclam
apps:
  - freshclam
variables:
  user: clamav
pidfile: /run/clamav/freshclam.pid
processes:
  main:
    exe: ${freshclam_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${freshclam_binary}
    user: ${user}
    state: running
    requires:
      - service
postflight:
  process:
    type: process
    exe: ${freshclam_binary}
    user: ${user}
    state: running
rules:
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
