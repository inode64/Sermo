name: bluetooth
display_name: Bluetooth
category: hardware
description: Bluetooth daemon (bluetoothd).
service: bluetooth
apps:
  - bluetoothd
restart_on_change:
  apps:
    - bluetoothd
pidfile: /run/bluetoothd.pid
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${bluetoothd_binary}
      user: root
      state: running
      requires:
        - service
      optional: true
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
