name: bluetooth
display_name: Bluetooth
category: hardware
description: Bluetooth daemon (bluetoothd).
service: bluetooth
apps:
  - bluetoothd
pidfile: /run/bluetoothd.pid
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${bluetoothd_binary}
    user: root
    state: running
    requires:
      - service
    optional: true
postflight:
  process:
    type: process
    exe: ${bluetoothd_binary}
    user: root
    state: running
    optional: true
rules:
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
