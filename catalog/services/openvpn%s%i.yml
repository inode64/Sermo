kind: daemon
name: openvpn%s%i
display_name: "OpenVPN ${instance}"
category: network
apps: [openvpn]

# OpenRC has a single flat namespace (no server/client split): one init script
# per tunnel, symlinked as openvpn.<instance>. The daemon owns its discovery
# from those symlinks; the generic `openvpn` app provides the binary.
versions:
  from: "/etc/init.d/openvpn.${instance}"

service: "openvpn.${instance}"

variables:
  config: "/etc/openvpn/${instance}.conf"
  port:
    from_file: "${config}"
    directive: port
    default: 1194

config_files: ["${config}"]

# No `preflight: config` here: OpenVPN has no config-test-and-exit mode. Running
# `openvpn --config <f> --dev null` parses the config but then keeps running, so a
# *valid* config never exits and would only fail the preflight on its timeout —
# inverted behaviour. There is no offline syntax checker to gate start/restart on.

pidfile: /run/openvpn.${instance}.pid

checks:
  service: { type: service, expect: active }
  port: { type: openvpn, optional: true, port: "${port}" }
