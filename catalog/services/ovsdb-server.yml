name: ovsdb-server
display_name: Open vSwitch Database Server
category: virtualization
service:
  systemd:
    - ovsdb-server
  openrc:
    - ovsdb-server
apps:
  - ovsdb-server
restart_on_change:
  apps:
    - ovsdb-server
processes:
  main:
    exe: ${ovsdb_server_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  openvswitch:
    check:
      type: openvswitch
      socket: /run/openvswitch/db.sock
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 8578663
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
