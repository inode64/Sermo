name: ovsdb-server
display_name: Open vSwitch Database Server
category: virtualization
service:
  systemd:
    - ovsdb-server
  openrc:
    - ovsdb-server
apps:
  - ovsdb-server
restart_on_change:
  apps:
    - ovsdb-server
processes:
  main:
    exe: ${ovsdb_server_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  openvswitch:
    check:
      type: openvswitch
      socket: /run/openvswitch/db.sock
      timeout: 3s
