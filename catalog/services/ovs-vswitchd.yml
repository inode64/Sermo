kind: daemon
name: ovs-vswitchd
display_name: "Open vSwitch"
category: virtualization
description: "OpenVsiwtch Server"
service: ovs-vswitchd
apps: [ovs-vswitchd]

checks:
  service: { type: service, expect: active }
  openvswitch: { type: openvswitch, socket: /run/openvswitch/db.sock, timeout: 3s }
