name: ovs-vswitchd
display_name: Open vSwitch Server
category: virtualization
service: ovs-vswitchd
apps:
  - ovs-vswitchd
restart_on_change:
  apps:
    - ovs-vswitchd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
processes:
  main:
    exe: ${ovs_vswitchd_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  openvswitch:
    check:
      type: openvswitch
      socket: /run/openvswitch/db.sock
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 174515405
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
