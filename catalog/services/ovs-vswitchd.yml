name: ovs-vswitchd
display_name: Open vSwitch Server
category: virtualization
service: ovs-vswitchd
apps:
  - ovs-vswitchd
restart_on_change:
  apps:
    - ovs-vswitchd
processes:
  main:
    exe: ${ovs_vswitchd_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  openvswitch:
    check:
      type: openvswitch
      socket: /run/openvswitch/db.sock
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 174515405
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.87%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
