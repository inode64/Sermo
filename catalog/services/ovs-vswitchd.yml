name: ovs-vswitchd
display_name: Open vSwitch Server
category: virtualization
service: ovs-vswitchd
apps:
  - ovs-vswitchd
restart_on_change:
  apps:
    - ovs-vswitchd
processes:
  main:
    exe: ${ovs_vswitchd_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  openvswitch:
    check:
      type: openvswitch
      socket: /run/openvswitch/db.sock
      timeout: 3s
