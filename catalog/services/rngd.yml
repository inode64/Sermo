name: rngd
display_name: RNG Daemon
category: hardware
description: Feeds kernel entropy from hardware/random sources.
service: rngd
pidfile:
  path: /run/rngd.pid
  optional: true
watches:
  service:
    check:
      type: service
      expect: active
      verify: true
  process:
    check:
      type: process
      exe: ${rngd_binary}
      user: root
      state: running
      optional: true
      requires:
        - service
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 3338650
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
apps:
  - rngd
restart_on_change:
  apps:
    - rngd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
