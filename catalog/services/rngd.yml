name: rngd
display_name: RNG Daemon
category: hardware
description: Feeds kernel entropy from hardware/random sources.
service: rngd
pidfile:
  path: /run/rngd.pid
  optional: true
watches:
  service:
    check:
      type: service
      expect: active
      verify: true
  process:
    check:
      type: process
      exe: ${rngd_binary}
      user: root
      state: running
      optional: true
      requires:
        - service
apps:
  - rngd
