name: rngd
display_name: RNG Daemon
category: hardware
description: Feeds kernel entropy from hardware/random sources.
service: rngd
pidfile:
  path: /run/rngd.pid
  optional: true
checks:
  service:
    type: service
    expect: active
    verify: true
  process:
    type: process
    exe: ${rngd_binary}
    user: root
    state: running
    optional: true
    requires:
      - service
apps:
  - rngd
