name: patroni
display_name: "Patroni"
category: database
description: Patroni high-availability controller for PostgreSQL clusters.
service:
  systemd:
    - patroni
  openrc:
    - patroni
apps:
  - patroni
restart_on_change:
  apps:
    - patroni
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: postgres
  host: 127.0.0.1
  port: 8008
  config: /etc/patroni/patroni.yml
config_files:
  - ${config}
  - /etc/patroni
preflight:
  config:
    type: command
    command:
      - ${patroni_binary}
      - --validate-config
      - --ignore-listen-port
      - ${config}
    timeout: 30s
processes:
  main:
    exe: ${patroni_binary}
    user: ${user}
pidfile: /run/patroni.pid
reload:
  signal: HUP
reload_on_change:
  paths:
    - ${config}
    - /etc/patroni
stop_policy:
  graceful_timeout: 60s
  term_timeout: 30s
  kill_only_if:
    users:
      - ${user}
    exe_any:
      - ${patroni_binary}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  api-port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
      verify: true
  api:
    check:
      type: http
      url: http://${host}:${port}/patroni
      expect_status: 200
      timeout: 3s
      optional: true
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
