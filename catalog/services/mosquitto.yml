name: mosquitto
display_name: Eclipse Mosquitto
category: messaging
description: Mosquitto MQTT message broker.
type: queue
service:
  systemd:
    - mosquitto
  openrc:
    - mosquitto
apps:
  - mosquitto
variables:
  host: 127.0.0.1
  port: 1883
restart_on_change:
  libraries:
    - glibc
    - openssl
    - systemd-libs
pidfile: /run/mosquitto.pid
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  mqtt:
    type: mqtt
    host: ${host}
    port: ${port}
    timeout: 3s
    verify: true
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
preflight:
  config:
    type: command
    command:
      - ${mosquitto_binary}
      - -c
      - /etc/mosquitto/mosquitto.conf
    timeout: 15s
watches:
  restart-if-mqtt-failed:
    check:
      ref: mqtt
    for:
      cycles: 3
    then:
      action: restart
  restart-if-port-failed:
    check:
      ref: port
    for:
      cycles: 3
    then:
      action: restart
