name: mosquitto
display_name: Eclipse Mosquitto
category: messaging
description: Mosquitto MQTT message broker.
type: queue
service:
  systemd:
    - mosquitto
  openrc:
    - mosquitto
apps:
  - mosquitto
variables:
  host: 127.0.0.1
  port: 1883
  config: /etc/mosquitto/mosquitto.conf
  user: mosquitto
config_files:
  - ${config}
  - /etc/mosquitto/conf.d
restart_on_change:
  libraries:
    - glibc
    - openssl
    - systemd-libs
  apps:
    - mosquitto
pidfile: /run/mosquitto.pid
processes:
  main:
    exe: ${mosquitto_binary}
    user: ${user}
preflight:
  config:
    type: command
    command:
      - ${mosquitto_binary}
      - --test-config
      - -c
      - ${config}
    timeout: 15s
reload:
  signal: HUP
reload_on_change:
  paths:
    - ${config}
    - /etc/mosquitto/conf.d
watches:
  service:
    check:
      type: service
      expect: active
  fds:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
  memory:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
  restart-if-mqtt-failed:
    check:
      type: mqtt
      host: ${host}
      port: ${port}
      timeout: 3s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-port-failed:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 15251456
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
