name: mosquitto
display_name: Eclipse Mosquitto
category: messaging
description: Mosquitto MQTT message broker.
type: queue
service:
  systemd:
    - mosquitto
  openrc:
    - mosquitto
apps:
  - mosquitto
variables:
  host: 127.0.0.1
  port: 1883
restart_on_change:
  libraries:
    - glibc
    - openssl
    - systemd-libs
pidfile: /run/mosquitto.pid
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  mqtt:
    type: mqtt
    host: ${host}
    port: ${port}
    timeout: 3s
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
preflight:
  config:
    type: command
    command:
      - ${mosquitto_binary}
      - -c
      - /etc/mosquitto/mosquitto.conf
    timeout: 15s
    optional: true
postflight:
  mqtt:
    type: mqtt
    host: ${host}
    port: ${port}
    timeout: 3s
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
  restart-if-mqtt-failed:
    type: remediation
    if:
      failed:
        check: mqtt
    for:
      cycles: 3
    then:
      action: restart
  restart-if-port-failed:
    type: remediation
    if:
      failed:
        check: port
    for:
      cycles: 3
    then:
      action: restart
