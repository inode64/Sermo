name: mosquitto
display_name: Eclipse Mosquitto
category: messaging
description: Mosquitto MQTT message broker.
type: queue
service:
  systemd:
    - mosquitto
  openrc:
    - mosquitto
apps:
  - mosquitto
variables:
  host: 127.0.0.1
  port: 1883
restart_on_change:
  libraries:
    - glibc
    - openssl
    - systemd-libs
pidfile: /run/mosquitto.pid
preflight:
  config:
    type: command
    command:
      - ${mosquitto_binary}
      - -c
      - /etc/mosquitto/mosquitto.conf
    timeout: 15s
watches:
  service:
    check:
      type: service
      expect: active
  fds:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
  memory:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
  restart-if-mqtt-failed:
    check:
      type: mqtt
      host: ${host}
      port: ${port}
      timeout: 3s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-port-failed:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
    for:
      cycles: 3
    then:
      action: restart
