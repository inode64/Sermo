name: homeassistant
display_name: Home Assistant
category: web
description: Home Assistant home-automation platform.
service:
  systemd:
    - homeassistant
    - home-assistant@homeassistant
  openrc:
    - homeassistant
apps:
  - python3
restart_on_change:
  apps:
    - python3
variables:
  host: 127.0.0.1
  port: 8123
pidfile: /run/homeassistant.pid
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  http:
    check:
      type: http
      url: http://${host}:${port}/
      expect_status:
        op: <
        value: 500
      timeout: 5s
