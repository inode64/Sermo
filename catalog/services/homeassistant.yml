name: homeassistant
display_name: Home Assistant
category: web
description: Home Assistant home-automation platform.
service:
  systemd:
    - homeassistant
    - home-assistant@homeassistant
  openrc:
    - homeassistant
apps:
  - python3
variables:
  host: 127.0.0.1
  port: 8123
pidfile: /run/homeassistant.pid
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  http:
    type: http
    url: http://${host}:${port}/
    expect_status:
      op: <
      value: 500
    timeout: 5s
