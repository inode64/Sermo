name: virtlogd
display_name: libvirt Log Daemon
category: virtualization
service: virtlogd
apps:
  - virtlogd
restart_on_change:
  apps:
    - virtlogd
socket: /run/libvirt/virtlogd-sock
processes:
  main:
    exe: ${virtlogd_binary}
    user: root
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-socket-missing:
    check:
      type: socket
      path: /run/libvirt/virtlogd-sock
      requires:
        - service
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 11786650
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
