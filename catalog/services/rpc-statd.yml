name: rpc-statd
display_name: NFS Status Monitor
category: storage
service:
  systemd:
    - rpc-statd
  openrc:
    - rpc.statd
    - rpc-statd
apps:
  - rpc-statd
restart_on_change:
  apps:
    - rpc-statd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: nobody
pidfile: /run/rpc.statd.pid
processes:
  main:
    exe: ${rpc_statd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  statd:
    check:
      type: statd
      host: 127.0.0.1
      port: 662
      timeout: 3s
      optional: true
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 3320628
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
