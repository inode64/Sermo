name: rpc-statd
display_name: NFS Status Monitor
category: storage
service:
  systemd:
    - rpc-statd
  openrc:
    - rpc.statd
    - rpc-statd
apps:
  - rpc-statd
variables:
  user: nobody
pidfile: /run/rpc.statd.pid
processes:
  main:
    exe: ${rpc_statd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  statd:
    check:
      type: statd
      host: 127.0.0.1
      port: 662
      timeout: 3s
      optional: true
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
