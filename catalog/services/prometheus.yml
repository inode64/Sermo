name: prometheus
display_name: Prometheus
category: observability
description: Prometheus monitoring server and time-series database.
service:
  systemd:
    - prometheus
  openrc:
    - prometheus
apps:
  - prometheus
variables:
  user: prometheus
  host: 127.0.0.1
  port: 9090
  config: /etc/prometheus/prometheus.yml
pidfile: /run/prometheus.pid
preflight:
  config:
    type: command
    command:
      - ${prometheus_promtool}
      - check
      - config
      - ${config}
    timeout: 30s
config_files:
  - ${config}
  - /etc/prometheus/rules
  - /etc/prometheus/rules.d
processes:
  main:
    exe: ${prometheus_binary}
    user: ${user}
reload:
  signal: HUP
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  health:
    type: prometheus
    host: ${host}
    port: ${port}
    timeout: 3s
reload_on_change:
  paths:
    - ${config}
    - /etc/prometheus/rules
    - /etc/prometheus/rules.d
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
