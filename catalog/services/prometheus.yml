kind: daemon
name: prometheus
display_name: "Prometheus"
category: observability
description: "Prometheus monitoring server and time-series database."

service:
  systemd: [prometheus]
  openrc: [prometheus]

apps: [prometheus]
variables:
  user: prometheus
  host: 127.0.0.1
  port: 9090
  config: /etc/prometheus/prometheus.yml

pidfile: /run/prometheus.pid

preflight:
  config: { type: command, command: ["${prometheus_promtool}", "check", "config", "${config}"], timeout: 30s }

config_files: ["${config}", /etc/prometheus/rules, /etc/prometheus/rules.d]

processes:
  main:
    type: command_match
    exe: "${prometheus_binary}"
    user: "${user}"

# Prometheus reloads its config and rule files on SIGHUP. Its systemd unit
# commonly defines no ExecReload, so Sermo signals MainPID; OpenRC's init script
# reloads where present. (`--web.enable-lifecycle` also exposes POST /-/reload,
# but SIGHUP needs no flag.)
reload:
  signal: HUP

checks:
  service:
    type: service
    expect: active

  port:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 2s

  # Native Prometheus probe: GETs /api/v1/status/buildinfo and verifies a success
  # status, reporting the server version; falls back to /-/healthy (liveness) on
  # older servers. Set user/password for a reverse proxy in front of the API.
  health:
    type: prometheus
    host: "${host}"
    port: "${port}"
    timeout: 3s
