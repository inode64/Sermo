kind: daemon
name: smb
aliases:
- samba
display_name: Samba SMB/NMB
category: storage
description: Combined Samba service unit that supervises SMB and NetBIOS daemons.
service:
  systemd:
  - smb
  openrc:
  - samba
  - smb
apps:
- smbd
- nmbd
variables:
  port: 445
  netbios_port: 139
  user: root
pidfiles:
  smbd: /run/samba/smbd.pid
  nmbd: /run/samba/nmbd.pid
preflight:
  config:
    type: command
    command:
    - ${smbd_testparm}
    - -s
    timeout: 30s
    analyze:
      use:
      - common
      rules:
      - id: dir-artifact
        match: (?i)(lock|pid) directory .* does not exist
        severity: ok
processes:
  smbd:
    exe: ${smbd_binary}
    user: ${user}
  nmbd:
    exe: ${nmbd_binary}
    user: ${user}
  winbindd:
    exe: /usr/sbin/winbindd
    user: ${user}
    enable_if:
      file: /etc/conf.d/samba
      key: daemon_list
      contains: winbindd
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  smb:
    type: smb
    port: ${port}
    timeout: 3s
  netbios:
    type: tcp
    port: ${netbios_port}
    optional: true
  winbindd:
    type: process
    exe: /usr/sbin/winbindd
    user: ${user}
    state: running
    requires:
    - service
    enable_if:
      file: /etc/conf.d/samba
      key: daemon_list
      contains: winbindd
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  block-restart-if-config-invalid:
    type: guard
    blocks:
    - restart
    - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
