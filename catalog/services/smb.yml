name: smb
aliases:
  - samba
display_name: Samba SMB/NMB
category: storage
description: Combined Samba service unit that supervises SMB and NetBIOS daemons.
service:
  systemd:
    - smb
  openrc:
    - samba
    - smb
apps:
  - smbd
  - nmbd
  - winbindd
variables:
  port: 445
  netbios_port: 139
  user: root
pidfiles:
  smbd: /run/samba/smbd.pid
  nmbd: /run/samba/nmbd.pid
preflight:
  config:
    type: command
    command:
      - ${smbd_testparm}
      - -s
    timeout: 30s
    analyze:
      use:
        - common
      rules:
        - id: dir-artifact
          match: (?i)(lock|pid) directory .* does not exist
          severity: ok
processes:
  smbd:
    exe: ${smbd_binary}
    user: ${user}
  nmbd:
    exe: ${nmbd_binary}
    user: ${user}
  winbindd:
    exe: ${winbindd_binary}
    user: ${user}
    enable_if:
      file: /etc/conf.d/samba
      key: daemon_list
      contains: winbindd
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  smb:
    check:
      type: smb
      port: ${port}
      timeout: 3s
  netbios:
    check:
      type: tcp
      port: ${netbios_port}
      optional: true
  winbindd:
    enable_if:
      file: /etc/conf.d/samba
      key: daemon_list
      contains: winbindd
    check:
      type: process
      exe: ${winbindd_binary}
      user: ${user}
      state: running
      requires:
        - service
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
