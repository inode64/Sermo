name: fcron
display_name: Fcron
category: system
service: fcron
apps:
  - fcron
restart_on_change:
  apps:
    - fcron
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
pidfile: /run/fcron.pid
socket: /run/fcron.fifo
processes:
  main:
    exe: ${fcron_binary}
    user: root
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      # Best-effort: the fcron binary path/identity varies by build; service +
      # pidfile are the authoritative liveness signals.
      type: process
      exe: ${fcron_binary}
      user: root
      state: running
      optional: true
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 174159463
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    clear:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
