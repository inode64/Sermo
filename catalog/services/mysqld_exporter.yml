name: mysqld_exporter
display_name: Prometheus MySQL Exporter
category: observability
description: 'Prometheus mysqld_exporter: MySQL/MariaDB metrics over HTTP /metrics.'
service:
  systemd:
    - mysqld_exporter
  openrc:
    - mysqld_exporter
apps:
  - mysqld_exporter
variables:
  host: 127.0.0.1
  port: 9104
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  metrics:
    check:
      type: http
      url: http://${host}:${port}/metrics
      expect_status: 200
      timeout: 5s
