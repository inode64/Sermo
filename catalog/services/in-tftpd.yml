name: in.tftpd
display_name: TFTP Server
category: network
description: TFTP server daemon for serving files over the Trivial File Transfer Protocol (TFTP).
service:
  systemd:
    - in-tftpd
    - tftpd
  openrc:
    - in.tftpd
    - in-tftpd
apps:
  - in.tftpd
restart_on_change:
  apps:
    - in.tftpd
variables:
  port: 69
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tftp
      port: ${port}
