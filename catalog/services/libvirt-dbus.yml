name: libvirt-dbus
display_name: libvirt D-Bus
category: virtualization
description: D-Bus bridge exposing libvirt objects to desktop and management clients.
service:
  systemd:
    - libvirt-dbus
  openrc:
    - libvirt-dbus
apps:
  - libvirt-dbus
variables:
  user: root
processes:
  main:
    exe: ${libvirt_dbus_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-dbus-failed:
    check:
      type: dbus
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    clear:
      cycles: 10
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
