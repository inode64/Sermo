kind: daemon
name: avahi-daemon
display_name: "Avahi"
description: "Zero Configuration Networking"
service: avahi-daemon
variables:
  binary: "/usr/bin/avahi-daemon"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  avahi: { type: avahi, timeout: 3s }
