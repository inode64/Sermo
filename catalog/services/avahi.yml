kind: daemon
name: avahi
catalog_aliases: [avahi-daemon]
display_name: "Avahi"
category: network
description: "Zero Configuration Networking"
service:
  systemd: [avahi, avahi-daemon]
  openrc: [avahi, avahi-daemon]
apps: [avahi]

checks:
  service: { type: service, expect: active }
  avahi: { type: avahi, timeout: 3s }
