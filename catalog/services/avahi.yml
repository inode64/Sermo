name: avahi
display_name: Avahi
category: network
description: Zero Configuration Networking
service:
  systemd:
    - avahi
    - avahi-daemon
  openrc:
    - avahi
    - avahi-daemon
apps:
  - avahi
restart_on_change:
  apps:
    - avahi
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
watches:
  service:
    check:
      type: service
      expect: active
  avahi:
    check:
      type: avahi
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 9795175
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
