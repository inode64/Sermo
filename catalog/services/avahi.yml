name: avahi
display_name: Avahi
category: network
description: Zero Configuration Networking
service:
  systemd:
    - avahi
    - avahi-daemon
  openrc:
    - avahi
    - avahi-daemon
apps:
  - avahi
restart_on_change:
  apps:
    - avahi
watches:
  service:
    check:
      type: service
      expect: active
  avahi:
    check:
      type: avahi
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 9795175
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
