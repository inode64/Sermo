name: dmeventd
display_name: Device-mapper event daemon
category: system
service: dmeventd
apps:
  - dmeventd
restart_on_change:
  apps:
    - dmeventd
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${dmeventd_binary}
      user: root
      state: running
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 1910375
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
