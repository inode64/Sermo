name: dmeventd
display_name: Device-mapper event daemon
category: system
service: dmeventd
apps:
  - dmeventd
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${dmeventd_binary}
    user: root
    state: running
    requires:
      - service
    verify: true
watches:
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
