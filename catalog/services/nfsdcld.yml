kind: daemon
name: nfsdcld
display_name: NFS client tracking daemon
category: storage
description: NFSv4 client tracking daemon used by the kernel NFS server.
service:
  systemd:
    - nfsdcld
  openrc:
    - nfsdcld
apps:
  - nfsdcld
variables:
  user: root
processes:
  main:
    exe: ${nfsdcld_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${nfsdcld_binary}
    user: ${user}
    state: running
    requires:
      - service
postflight:
  process:
    type: process
    exe: ${nfsdcld_binary}
    user: ${user}
    state: running
rules:
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
