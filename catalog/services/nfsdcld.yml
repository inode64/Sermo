name: nfsdcld
display_name: NFS client tracking daemon
category: storage
description: NFSv4 client tracking daemon used by the kernel NFS server.
service:
  systemd:
    - nfsdcld
  openrc:
    - nfsdcld
apps:
  - nfsdcld
variables:
  user: root
processes:
  main:
    exe: ${nfsdcld_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      # Best-effort: nfsdcld is socket-activated/short-lived, so the process may
      # legitimately be absent while the unit is active. service is authoritative.
      type: process
      exe: ${nfsdcld_binary}
      user: ${user}
      state: running
      optional: true
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 4122624
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
