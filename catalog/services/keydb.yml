name: keydb
display_name: KeyDB
category: database
service:
  systemd:
    - keydb
    - keydb-server
  openrc:
    - keydb
    - keydb-server
apps:
  - keydb
variables:
  host: 127.0.0.1
  port: 6379
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  health:
    type: redis
    host: ${host}
    port: ${port}
    timeout: 3s
    expect:
      rdb_last_bgsave_status: ok
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
watches:
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
