kind: daemon
name: keydb
display_name: "KeyDB"
category: database
service:
  systemd: [keydb, keydb-server]
  openrc: [keydb, keydb-server]
apps: [keydb]

variables:
  host: 127.0.0.1
  port: 6379

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }

  # KeyDB speaks the RESP protocol, so the native redis probe verifies liveness
  # (PING) and exposes role, replication, persistence and memory in its result
  # data. The expect asserts the last background save succeeded (reported "ok"
  # even when persistence is disabled, so it never false-alarms).
  health:
    type: redis
    host: "${host}"
    port: "${port}"
    timeout: 3s
    expect:
      rdb_last_bgsave_status: ok

rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: ">"
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
