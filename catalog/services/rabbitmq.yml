kind: daemon
name: rabbitmq
display_name: "RabbitMQ"
category: messaging
type: queue

service:
  systemd: [rabbitmq-server, rabbitmq]
  openrc: [rabbitmq]

# RabbitMQ runs on the Erlang VM: the runtime is owned by the `erlang` app and
# linked here, so its binary + version checks run in this service's preflight
# (a missing Erlang blocks start).
apps: [erlang, rabbitmq]

variables:
  binary: /usr/bin/rabbitmq-server
  ctl: /usr/bin/rabbitmqctl
  user: rabbitmq
  host: 127.0.0.1
  port: 5672
  pidfile: /run/rabbitmq.pid

commands:
  version:
    command: ["${ctl}", "version"]

processes:
  # The init script writes the wrapper PID here; the Erlang broker (beam.smp,
  # a version-specific exe under /usr/lib64/erlang) runs as a descendant and is
  # picked up automatically. A command_match on ${binary} would not match the
  # broker, so the pidfile is the reliable anchor.
  pidfile:
    type: pidfile
    path: "${pidfile}"

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/rabbitmq.pid

checks:
  service:
    type: service
    expect: active

  amqp:
    type: amqp
    host: "${host}"
    port: "${port}"
    timeout: 3s

stop_policy:
  graceful_timeout: 60s
  term_timeout: 30s
  # exe_any is an exact-path match, so only the wrapper script is listed; the
  # Erlang VM (beam.smp, under a version-specific erts dir) is intentionally
  # absent and therefore never force-killable — fail-safe by design.
  kill_only_if:
    users: ["${user}"]
    exe_any:
      - "${binary}"

rules:
  restart-if-amqp-failed:
    type: remediation
    if:
      failed:
        check: amqp
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart
