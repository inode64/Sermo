name: rabbitmq
display_name: RabbitMQ
category: messaging
type: queue
service:
  systemd:
    - rabbitmq-server
    - rabbitmq
  openrc:
    - rabbitmq
apps:
  - erlang
  - rabbitmq
restart_on_change:
  apps:
    - erlang
    - rabbitmq
variables:
  user: rabbitmq
  host: 127.0.0.1
  port: 5672
pidfile: /run/rabbitmq.pid
stop_policy:
  graceful_timeout: 60s
  term_timeout: 30s
  kill_only_if:
    users:
      - ${user}
    exe_any:
      - ${rabbitmq_binary}
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-amqp-failed:
    check:
      type: amqp
      host: ${host}
      port: ${port}
      timeout: 3s
    for:
      cycles: 3
    then:
      action: restart
