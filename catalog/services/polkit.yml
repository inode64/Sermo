name: polkit
display_name: Polkit
category: system
description: PolicyKit authorization service.
service:
  systemd:
    - polkit
apps:
  - polkit
variables:
  user: polkitd
processes:
  main:
    exe: ${polkit_binary}
    user: ${user}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-dbus-failed:
    check:
      type: dbus
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
