name: polkit
display_name: Polkit
category: system
description: PolicyKit authorization service.
service:
  systemd:
    - polkit
apps:
  - polkit
variables:
  user: polkitd
processes:
  main:
    exe: ${polkit_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  dbus:
    type: dbus
    timeout: 5s
    verify: true
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  restart-if-dbus-failed:
    check:
      ref: dbus
    for:
      cycles: 3
    then:
      action: restart
