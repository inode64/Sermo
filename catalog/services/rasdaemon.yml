name: rasdaemon
display_name: RAS daemon
category: hardware
description: Logs hardware RAS events such as memory and PCIe errors.
service:
  systemd:
    - rasdaemon
apps:
  - rasdaemon
processes:
  main:
    exe: ${rasdaemon_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${rasdaemon_binary}
    user: root
    state: running
    requires:
      - service
    verify: true
watches:
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
