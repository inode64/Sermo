name: nebula-%i
display_name: Nebula ${instance}
description: Nebula mesh-VPN node (Slack/Defined Networking).
category: vpn
service:
  systemd:
    - nebula@${instance}
    - nebula-${instance}
    - nebula.${instance}
  openrc:
    - nebula.${instance}
apps:
  - nebula
restart_on_change:
  apps:
    - nebula
variables:
  config: /etc/nebula/${instance}.yml
  host:
    from_file: ${config}
    pattern: (?m)^\s*static_host_map:\s*\n\s*(?:"[^"]+"|[^:\n]+)\s*:\s*\[\s*"\[?([^"\]]+)\]?:(?:\d+)"
    default: 127.0.0.1
  port:
    from_file: ${config}
    pattern: (?m)^\s*static_host_map:\s*\n\s*(?:"[^"]+"|[^:\n]+)\s*:\s*\[\s*"[^"]+:(\d+)"
    default: 4242
  user: root
config_files:
  - ${config}
preflight:
  config:
    type: command
    command:
      - ${nebula_binary}
      - -test
      - -config
      - ${config}
    timeout: 30s
pidfile: /run/supervise-nebula.${instance}.pid
processes:
  main:
    exe: ${binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  handshake:
    check:
      type: nebula
      optional: true
      host: ${host}
      port: ${port}
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 32818791
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.22%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
