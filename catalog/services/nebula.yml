name: nebula-%i
display_name: Nebula ${instance}
description: Nebula mesh-VPN node (Slack/Defined Networking).
category: vpn
service:
  systemd:
    - nebula@${instance}
    - nebula-${instance}
    - nebula.${instance}
  openrc:
    - nebula.${instance}
apps:
  - nebula
variables:
  config: /etc/nebula/${instance}.yml
  host:
    from_file: ${config}
    pattern: (?m)^\s*static_host_map:\s*\n\s*(?:"[^"]+"|[^:\n]+)\s*:\s*\[\s*"\[?([^"\]]+)\]?:(?:\d+)"
    default: 127.0.0.1
  port:
    from_file: ${config}
    pattern: (?m)^\s*static_host_map:\s*\n\s*(?:"[^"]+"|[^:\n]+)\s*:\s*\[\s*"[^"]+:(\d+)"
    default: 4242
  user: root
config_files:
  - ${config}
preflight:
  config:
    type: command
    command:
      - ${nebula_binary}
      - -test
      - -config
      - ${config}
    timeout: 30s
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
pidfile: /run/supervise-nebula.${instance}.pid
processes:
  main:
    exe: ${binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  handshake:
    type: nebula
    optional: true
    host: ${host}
    port: ${port}
    timeout: 3s
