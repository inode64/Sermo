name: pmie_farm
display_name: PCP Inference Engine Farm
category: observability
description: Performance Co-Pilot pmie farm service.
service:
  systemd:
    - pmie_farm
apps:
  - pmie_farm
variables:
  user: pcp
processes:
  main:
    exe: ${pmie_farm_binary}
    user: ${user}
  pmpause:
    exe: ${pmie_farm_pmpause_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      # pmie_farm's active unit runs as a shell wrapper (the farm loop), not the
      # pmie_farm binary itself, so an exact-exe match cannot see it. Keep the
      # check as a best-effort signal, not a hard failure that flips the service.
      type: process
      exe: ${pmie_farm_binary}
      user: ${user}
      state: running
      optional: true
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 2752922
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
