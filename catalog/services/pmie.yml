name: pmie
display_name: PCP Inference Engine
category: observability
description: Performance Co-Pilot inference engine daemon.
service:
  systemd:
    - pmie
apps:
  - pmie
variables:
  user: pcp
pidfile: /run/pcp/pmie.pid
processes:
  main:
    exe: ${pmie_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      # Best-effort: after a PCP package update the running pmie's exe reads as
      # "(deleted)" until restart and cannot match by exact exe (a deliberate
      # kill-safety rule), so this must not hard-fail. service + pidfile are the
      # authoritative liveness signals.
      type: process
      exe: ${pmie_binary}
      user: ${user}
      state: running
      optional: true
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 9700557
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
