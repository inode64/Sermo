name: smartd
display_name: S.M.A.R.T. Daemon
category: storage
service:
  systemd:
    - smartd
  openrc:
    - smartd
os:
  ubuntu:
    service:
      systemd:
        - smartmontools
apps:
  - smartd
restart_on_change:
  apps:
    - smartd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
pidfile:
  path: /run/smartd.pid
  optional: true
processes:
  main:
    exe: ${smartd_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
      verify: true
  process:
    check:
      type: process
      exe: ${smartd_binary}
      user: root
      state: running
      optional: true
      requires:
        - service
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 6343885
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
