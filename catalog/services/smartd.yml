name: smartd
display_name: S.M.A.R.T. Daemon
category: storage
service:
  systemd:
    - smartd
  openrc:
    - smartd
os:
  ubuntu:
    service:
      systemd:
        - smartmontools
apps:
  - smartd
pidfile:
  path: /run/smartd.pid
  optional: true
processes:
  main:
    exe: ${smartd_binary}
    user: root
checks:
  service:
    type: service
    expect: active
    verify: true
  process:
    type: process
    exe: ${smartd_binary}
    user: root
    state: running
    optional: true
    requires:
      - service
rules:
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
