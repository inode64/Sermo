name: virtlockd
display_name: libvirt Lock Daemon
category: virtualization
service: virtlockd
apps:
  - virtlockd
checks:
  service:
    type: service
    expect: active
  libvirt:
    type: libvirt
    socket: /run/libvirt/virtlockd-sock
    timeout: 5s
    verify: true
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-libvirt-failed:
    type: remediation
    if:
      failed:
        check: libvirt
    for:
      cycles: 3
    then:
      action: restart
