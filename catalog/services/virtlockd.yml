name: virtlockd
display_name: libvirt Lock Daemon
category: virtualization
service: virtlockd
apps:
  - virtlockd
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-socket-failed:
    check:
      # virtlockd's socket is the lock-manager transport, not a libvirt
      # hypervisor RPC endpoint, so probe it as a plain socket, not `libvirt`.
      type: socket
      path: /run/libvirt/virtlockd-sock
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
