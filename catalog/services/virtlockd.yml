name: virtlockd
display_name: libvirt Lock Daemon
category: virtualization
service: virtlockd
apps:
  - virtlockd
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-libvirt-failed:
    check:
      type: libvirt
      socket: /run/libvirt/virtlockd-sock
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
