name: atftp
display_name: atftp
category: network
description: atftp TFTP server daemon.
service:
  systemd:
    - atftp
  openrc:
    - atftp
apps:
  - atftp
variables:
  port: 69
  user: nobody
processes:
  main:
    exe: ${atftp_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tftp
      port: ${port}
