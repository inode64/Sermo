name: atftp
display_name: atftp
category: network
description: atftp TFTP server daemon.
service:
  systemd:
    - atftp
  openrc:
    - atftp
apps:
  - atftp
restart_on_change:
  apps:
    - atftp
variables:
  port: 69
  user: nobody
processes:
  main:
    exe: ${atftp_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tftp
      port: ${port}
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 3599975
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
