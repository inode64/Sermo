name: asterisk
display_name: Asterisk PBX
category: messaging
service: asterisk
apps:
  - asterisk
restart_on_change:
  apps:
    - asterisk
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 5038
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  asterisk:
    check:
      type: asterisk
      port: ${port}
      timeout: 3s
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
