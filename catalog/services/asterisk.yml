name: asterisk
display_name: Asterisk PBX
category: messaging
service: asterisk
apps:
  - asterisk
variables:
  port: 5038
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  asterisk:
    type: asterisk
    port: ${port}
    timeout: 3s
watches:
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
