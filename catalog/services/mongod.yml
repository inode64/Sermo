name: mongod
display_name: MongoDB
category: database
description: Mongo DB
service: mongod
apps:
  - mongod
restart_on_change:
  apps:
    - mongod
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 27017
  config: /etc/mongod.conf
preflight:
  config:
    type: command
    command:
      - ${mongod_binary}
      - --config
      - ${config}
      - --outputConfig
    timeout: 15s
config_files:
  - ${config}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  mongodb:
    check:
      type: mongodb
      host: ${host}
      port: ${port}
      timeout: 3s
