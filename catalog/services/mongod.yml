kind: daemon
name: mongod
display_name: MongoDB
category: database
description: Mongo DB
service: mongod
apps:
- mongod
variables:
  host: 127.0.0.1
  port: 27017
  config: /etc/mongod.conf
preflight:
  config:
    type: command
    command:
    - ${mongod_binary}
    - --config
    - ${config}
    - --outputConfig
    timeout: 15s
config_files:
- ${config}
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  mongodb:
    type: mongodb
    host: ${host}
    port: ${port}
    timeout: 3s
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
    - restart
    - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
