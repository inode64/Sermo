name: libvirtd
display_name: libvirt
category: virtualization
service: libvirtd
apps:
  - libvirtd
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-libvirt-failed:
    check:
      type: libvirt
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
