kind: daemon
name: libvirtd
display_name: "libvirt"
service: libvirtd
variables:
  binary: "/usr/bin/libvirtd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  libvirt: { type: libvirt, timeout: 5s }
