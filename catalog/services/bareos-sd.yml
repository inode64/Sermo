name: bareos-sd
display_name: Bareos Storage Daemon
category: storage
description: Backup storage Server
service: bareos-sd
apps:
  - bareos-sd
restart_on_change:
  apps:
    - bareos-sd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 9103
preflight:
  config:
    type: command
    command:
      - ${bareos_sd_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 10678272
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
