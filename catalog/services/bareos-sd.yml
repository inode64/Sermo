name: bareos-sd
display_name: Bareos Storage Daemon
category: storage
description: Backup storage Server
service: bareos-sd
apps:
  - bareos-sd
restart_on_change:
  apps:
    - bareos-sd
variables:
  port: 9103
preflight:
  config:
    type: command
    command:
      - ${bareos_sd_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
