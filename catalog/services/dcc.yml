name: dcc
display_name: Distributed Checksum Clearinghouse
category: mail
description: DCC interface daemon used by mail filtering stacks.
service: dcc
apps:
  - dcc
restart_on_change:
  apps:
    - dcc
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: root
pidfile:
  # dccifd's pidfile is unreliable across distros (Gentoo has been observed
  # writing an invalid PID); the socket check below is the authoritative signal.
  optional: true
  path:
    - /run/dcc/dccifd.pid
socket: /var/lib/dcc/dccifd
processes:
  main:
    exe: ${dcc_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      # Best-effort: the dccifd identity is not reliably matchable across distros;
      # service + socket are the authoritative liveness signals.
      type: process
      exe: ${dcc_binary}
      user: ${user}
      state: running
      optional: true
      requires:
        - service
      verify: true
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    clear:
      cycles: 10
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
