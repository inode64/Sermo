name: dcc
display_name: Distributed Checksum Clearinghouse
category: mail
description: DCC interface daemon used by mail filtering stacks.
service: dcc
apps:
  - dcc
variables:
  user: root
pidfile: /run/dcc/dccifd.pid
socket: /var/lib/dcc/dccifd
processes:
  main:
    exe: ${dcc_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${dcc_binary}
    user: ${user}
    state: running
    requires:
      - service
    verify: true
watches:
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
