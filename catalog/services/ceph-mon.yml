name: ceph-mon
display_name: Ceph Monitor
category: storage
description: 'Ceph cluster monitor: maintains the cluster maps and the paxos quorum.'
service: ceph-mon@${hostname}
apps:
  - ceph-mon
  - ceph
variables:
  user: ceph
  host: 127.0.0.1
  port: 3300
socket: /run/ceph/ceph-mon.${hostname}.asok
processes:
  ceph-mon:
    exe: ${ceph_mon_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  tcp:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  restart-if-messenger-failed:
    check:
      type: ceph
      host: ${host}
      port: ${port}
      timeout: 3s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-status-failed:
    check:
      type: command
      command:
        - ${ceph_binary}
        - --admin-daemon
        - /run/ceph/ceph-mon.${hostname}.asok
        - mon_status
      timeout: 5s
      analyze:
        use:
          - ceph
    for:
      cycles: 3
    then:
      action: restart
