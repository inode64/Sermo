kind: daemon
name: ceph-mon
display_name: Ceph Monitor
category: storage
description: 'Ceph cluster monitor: maintains the cluster maps and the paxos quorum.'
service: ceph-mon@${hostname}
apps:
- ceph-mon
- ceph
variables:
  user: ceph
  host: 127.0.0.1
  port: 3300
socket: /run/ceph/ceph-mon.${hostname}.asok
processes:
  ceph-mon:
    exe: ${ceph_mon_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  tcp:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  messenger:
    type: ceph
    host: ${host}
    port: ${port}
    timeout: 3s
  status:
    type: command
    command:
    - ${ceph_binary}
    - --admin-daemon
    - /run/ceph/ceph-mon.${hostname}.asok
    - mon_status
    timeout: 5s
    analyze:
      use:
      - ceph
postflight:
  messenger:
    type: ceph
    host: ${host}
    port: ${port}
    timeout: 3s
rules:
  restart-if-messenger-failed:
    type: remediation
    if:
      failed:
        check: messenger
    for:
      cycles: 3
    then:
      action: restart
  restart-if-status-failed:
    type: remediation
    if:
      failed:
        check: status
    for:
      cycles: 3
    then:
      action: restart
