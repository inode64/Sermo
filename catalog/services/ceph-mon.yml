name: ceph-mon
display_name: Ceph Monitor
category: storage
description: 'Ceph cluster monitor: maintains the cluster maps and the paxos quorum.'
service: ceph-mon@${hostname}
apps:
  - ceph-mon
  - ceph
restart_on_change:
  apps:
    - ceph-mon
    - ceph
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: ceph
  host: 127.0.0.1
  port: 3300
socket: /run/ceph/ceph-mon.${hostname}.asok
processes:
  ceph-mon:
    exe: ${ceph_mon_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  # A mon binds its msgr v2 port to the cluster/public network address, not
  # loopback, so these ${host}=127.0.0.1 probes are optional and off by default;
  # the admin-socket mon_status command below is the authoritative health signal.
  # Set `host` to the mon's bind address on an instance to enable an active probe.
  tcp:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
      optional: true
  restart-if-messenger-failed:
    check:
      type: ceph
      host: ${host}
      port: ${port}
      timeout: 3s
      optional: true
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-status-failed:
    check:
      type: command
      command:
        - ${ceph_binary}
        - --admin-daemon
        - /run/ceph/ceph-mon.${hostname}.asok
        - mon_status
      timeout: 5s
      analyze:
        use:
          - ceph
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 490434560
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.44%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 20702
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} IO usage stayed above ${check.threshold} (current ${check.value})
