name: fetchmail
display_name: Fetchmail
category: messaging
service: fetchmail
apps:
  - fetchmail
variables:
  config:
    - /etc/fetchmailrc
    - /etc/fetchmail/fetchmailrc
config_files:
  - ${config}
preflight:
  config:
    type: command
    command:
      - sh
      - -c
      - test ! -e "$1" || exec "$0" --configdump -f "$1"
      - ${fetchmail_binary}
      - ${config}
    timeout: 30s
restart_on_change:
  paths:
    - ${config}
  apps:
    - fetchmail
  messages:
    path: >-
      ${display_name} will restart after config change: ${change.path}
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${fetchmail_binary}
      user: root
      state: running
      requires:
        - service
      optional: true
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
