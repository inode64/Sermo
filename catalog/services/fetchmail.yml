name: fetchmail
display_name: Fetchmail
category: messaging
service: fetchmail
apps:
  - fetchmail
variables:
  config:
    - /etc/fetchmailrc
    - /etc/fetchmail/fetchmailrc
config_files:
  - ${config}
preflight:
  config:
    type: command
    command:
      - sh
      - -c
      - test ! -e "$1" || exec "$0" --configdump -f "$1"
      - ${fetchmail_binary}
      - ${config}
    timeout: 30s
restart_on_change:
  paths:
    - ${config}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${fetchmail_binary}
      user: root
      state: running
      requires:
        - service
      optional: true
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
