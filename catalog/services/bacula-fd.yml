kind: daemon
name: bacula-fd
display_name: "Bacula File Daemon"
category: storage
description: "Backup file Server"
service: bacula-fd
apps: [bacula-fd]

variables:
  port: 9102
  binary: "/usr/bin/bacula-fd"
preflight:
  config: { type: command, command: ["${binary}","-t"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
