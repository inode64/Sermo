name: bacula-fd
display_name: Bacula File Daemon
category: storage
description: Backup file Server
service: bacula-fd
apps:
  - bacula-fd
restart_on_change:
  apps:
    - bacula-fd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 9102
preflight:
  config:
    type: command
    command:
      - ${bacula_fd_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
