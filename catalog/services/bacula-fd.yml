name: bacula-fd
display_name: Bacula File Daemon
category: storage
description: Backup file Server
service: bacula-fd
apps:
  - bacula-fd
variables:
  port: 9102
preflight:
  config:
    type: command
    command:
      - ${bacula_fd_binary}
      - -t
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
