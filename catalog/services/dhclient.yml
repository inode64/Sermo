kind: daemon
name: dhclient
display_name: "DHCP Client"
category: network
description: "Cliente DHCP"
service: dhclient
apps: [dhclient]

variables:
  host: 0.0.0.0
  port: 68
  interface: ""
  lease_file: "/var/lib/dhcp/dhclient.leases"

checks:
  service: { type: service, expect: active }
  protocol:
    type: dhclient
    host: "${host}"
    port: "${port}"
    interface: "${interface}"
    lease_file: "${lease_file}"
    timeout: 3s
