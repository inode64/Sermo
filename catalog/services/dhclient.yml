name: dhclient
display_name: DHCP Client
category: network
service: dhclient
apps:
  - dhclient
restart_on_change:
  apps:
    - dhclient
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 0.0.0.0
  port: 68
  interface: ''
  lease_file: /var/lib/dhcp/dhclient.leases
watches:
  service:
    check:
      type: service
      expect: active
  protocol:
    check:
      type: dhclient
      host: ${host}
      port: ${port}
      interface: ${interface}
      lease_file: ${lease_file}
      timeout: 3s
