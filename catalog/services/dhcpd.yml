kind: daemon
name: dhcpd
display_name: "DHCP Server"
description: "Servidor DHCP"
service: dhcpd
apps: [dhcpd]

variables:
  port: 67
preflight:
  config: { type: command, command: ["/etc/init.d/dhcpd","configtest"], timeout: 30s }

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/dhcp/dhcpd.pid

checks:
  service: { type: service, expect: active }
  port: { type: dhcp, port: "${port}" }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
