name: dhcpd
display_name: DHCP Server
category: network
service:
  systemd:
    - dhcpd
    - dhcpd4
  openrc:
    - dhcpd
apps:
  - dhcpd
restart_on_change:
  apps:
    - dhcpd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 67
  user: dhcp
  config: /etc/dhcp/dhcpd.conf
preflight:
  config:
    type: command
    command:
      - ${dhcpd_binary}
      - -t
      - -cf
      - ${config}
    timeout: 30s
os:
  gentoo:
    pidfile: /run/dhcp/dhcpd.pid
  ubuntu:
    service:
      systemd:
        - isc-dhcp-server
    variables:
      user: dhcpd
    pidfile: /run/dhcp-server/dhcpd.pid
processes:
  main:
    exe: ${dhcpd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: dhcp
      optional: true
      port: ${port}
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 15282996
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
