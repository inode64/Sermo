name: dhcpd
display_name: DHCP Server
category: network
service:
  systemd:
    - dhcpd
    - dhcpd4
  openrc:
    - dhcpd
apps:
  - dhcpd
variables:
  port: 67
  user: dhcp
  config: /etc/dhcp/dhcpd.conf
preflight:
  config:
    type: command
    command:
      - ${dhcpd_binary}
      - -t
      - -cf
      - ${config}
    timeout: 30s
os:
  gentoo:
    pidfile: /run/dhcp/dhcpd.pid
  ubuntu:
    service:
      systemd:
        - isc-dhcp-server
    variables:
      user: dhcpd
    pidfile: /run/dhcp-server/dhcpd.pid
processes:
  main:
    exe: ${dhcpd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: dhcp
      optional: true
      port: ${port}
