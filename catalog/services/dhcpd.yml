kind: daemon
name: dhcpd
display_name: "DHCP Server"
category: network
service:
  systemd: [dhcpd, dhcpd4]
  openrc: [dhcpd]
apps: [dhcpd]

variables:
  port: 67
  user: dhcp
  config: /etc/dhcp/dhcpd.conf
preflight:
  config: { type: command, command: ["${dhcpd_binary}", "-t", "-cf", "${config}"], timeout: 30s }

os:
  gentoo:
    # Gentoo/OpenRC writes a pidfile; systemd dhcpd4 commonly runs with --no-pid.
    pidfile: /run/dhcp/dhcpd.pid

processes:
  main:
    exe: "${dhcpd_binary}"
    user: "${user}"

checks:
  service: { type: service, expect: active }
  port: { type: dhcp, optional: true, port: "${port}" }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
