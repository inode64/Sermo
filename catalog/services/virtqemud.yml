kind: daemon
name: virtqemud
display_name: "libvirt QEMU Daemon"
category: virtualization
description: "Modular libvirt daemon for QEMU/KVM domains."
service:
  systemd: [virtqemud]
apps: [virtqemud]

checks:
  service: { type: service, expect: active }
  libvirt: { type: libvirt, socket: /run/libvirt/virtqemud-sock, timeout: 5s }
