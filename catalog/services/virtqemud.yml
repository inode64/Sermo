name: virtqemud
display_name: libvirt QEMU Daemon
category: virtualization
description: Modular libvirt daemon for QEMU/KVM domains.
service:
  systemd:
    - virtqemud
apps:
  - virtqemud
restart_on_change:
  apps:
    - virtqemud
processes:
  main:
    exe: ${virtqemud_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  libvirt:
    check:
      type: libvirt
      socket: /run/libvirt/virtqemud-sock
      timeout: 5s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 57473434
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
