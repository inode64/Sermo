kind: daemon
name: memcached
display_name: "Memcached"
category: database
description: "Memcached in-memory cache"
type: cache
service: memcached
apps: [memcached]

variables:
  host: 127.0.0.1
  port: 11211
  user: memcached

processes:
  main:
    exe: "${memcached_binary}"
    user: "${user}"

checks:
  service: { type: service, expect: active }
  port: { type: tcp, host: "${host}", port: "${port}", timeout: 2s }

  # Native memcached probe over the ASCII text protocol: a single `stats`
  # command proves the daemon answers and exposes the server version plus
  # operational counters (connections, get hits/misses, items, bytes, evictions,
  # limit_maxbytes, …) in the result data, assertable via expect:.
  stats:
    type: memcached
    host: "${host}"
    port: "${port}"
    timeout: 3s

  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: ">"
        value: 90%
    # 12 consecutive 30s cycles = 6 minutes.
    for:
      cycles: 12
    then:
      action: restart
