name: memcached
display_name: Memcached
category: database
description: Memcached in-memory cache
type: cache
service: memcached
apps:
  - memcached
restart_on_change:
  apps:
    - memcached
variables:
  host: 127.0.0.1
  port: 11211
  user: memcached
processes:
  main:
    exe: ${memcached_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  memory:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  restart-if-memcached-failed:
    check:
      type: memcached
      host: ${host}
      port: ${port}
      timeout: 3s
    for:
      cycles: 3
    then:
      action: restart
  restart-if-tcp-failed:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 3892839
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
