name: memcached
display_name: Memcached
category: database
description: Memcached in-memory cache
type: cache
service: memcached
apps:
  - memcached
variables:
  host: 127.0.0.1
  port: 11211
  user: memcached
processes:
  main:
    exe: ${memcached_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  stats:
    type: memcached
    host: ${host}
    port: ${port}
    timeout: 3s
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  restart-if-memcached-failed:
    type: remediation
    if:
      failed:
        check: stats
    for:
      cycles: 3
    then:
      action: restart
  restart-if-tcp-failed:
    type: remediation
    if:
      failed:
        check: port
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
