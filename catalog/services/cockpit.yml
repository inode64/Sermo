name: cockpit
display_name: Cockpit
category: system
description: Web-based Linux server administration console.
service:
  systemd:
    - cockpit
also_service:
  systemd:
    - cockpit.socket
apps:
  - cockpit
restart_on_change:
  apps:
    - cockpit
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 9090
  user: cockpit-systemd-service
socket:
  path:
    - /run/cockpit/session
    - /run/cockpit/wsinstance/http.sock
    - /run/cockpit/wsinstance/https-factory.sock
  optional: true
processes:
  main:
    exe: ${cockpit_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 4929127
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
