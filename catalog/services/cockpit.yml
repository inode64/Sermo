kind: daemon
name: cockpit
display_name: "Cockpit"
category: system
description: "Web-based Linux server administration console."
service:
  systemd: [cockpit]
also_service:
  systemd: [cockpit.socket]
apps: [cockpit]

variables:
  host: 127.0.0.1
  port: 9090
  user: cockpit-systemd-service

socket:
  path:
    - /run/cockpit/session
    - /run/cockpit/wsinstance/http.sock
    - /run/cockpit/wsinstance/https-factory.sock
  optional: true

processes:
  main:
    exe: "${cockpit_binary}"
    user: "${user}"

checks:
  service: { type: service, expect: active }
  port: { type: tcp, host: "${host}", port: "${port}", timeout: 2s }
