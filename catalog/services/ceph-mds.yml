name: ceph-mds
display_name: Ceph Metadata Server
category: storage
description: >-
  Ceph MDS (CephFS metadata). Binds dynamic ports in the 6800-7300 range assigned at startup, so it is monitored by service state and process presence rather than a fixed port.
service: ceph-mds@${hostname}
apps:
  - ceph-mds
  - ceph
restart_on_change:
  apps:
    - ceph-mds
    - ceph
variables:
  user: ceph
socket: /run/ceph/ceph-mds.${hostname}.asok
processes:
  ceph-mds:
    exe: ${ceph_mds_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-status-failed:
    check:
      type: command
      command:
        - ${ceph_binary}
        - --admin-daemon
        - /run/ceph/ceph-mds.${hostname}.asok
        - status
      timeout: 5s
      analyze:
        use:
          - ceph
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 39766426
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.22%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 450
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} IO usage is high
