name: ceph-mds
display_name: Ceph Metadata Server
category: storage
description: >-
  Ceph MDS (CephFS metadata). Binds dynamic ports in the 6800-7300 range assigned at startup, so it is monitored by service state and process presence rather than a fixed port.
service: ceph-mds@${hostname}
apps:
  - ceph-mds
  - ceph
variables:
  user: ceph
socket: /run/ceph/ceph-mds.${hostname}.asok
processes:
  ceph-mds:
    exe: ${ceph_mds_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  status:
    type: command
    command:
      - ${ceph_binary}
      - --admin-daemon
      - /run/ceph/ceph-mds.${hostname}.asok
      - status
    timeout: 5s
    analyze:
      use:
        - ceph
    verify: true
rules:
  restart-if-status-failed:
    type: remediation
    if:
      failed:
        check: status
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
