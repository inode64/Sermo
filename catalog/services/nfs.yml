name: nfs
display_name: NFS Server
category: storage
description: Kernel NFS server.
service:
  systemd:
    - nfs-server
    - nfs
  openrc:
    - nfs
apps:
  - rpc-mountd
restart_on_change:
  apps:
    - rpc-mountd
variables:
  host: 127.0.0.1
  port: 2049
processes:
  mountd:
    exe: ${rpc_mountd_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  nfs:
    check:
      type: nfs
      host: ${host}
      port: ${port}
      timeout: 3s
