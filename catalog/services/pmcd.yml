kind: daemon
name: pmcd
display_name: "PCP Collector (pmcd)"
category: observability
description: "Performance Co-Pilot metric collector daemon (pmcd)."

service:
  systemd: [pmcd]
  openrc: [pmcd]

apps: [pmcd]
variables:
  host: 127.0.0.1
  port: 44321

restart_on_change:
  # Restart when a linked critical library changes on disk (e.g. an
  # OpenSSL CVE update), so the service picks up the new code.
  libraries: [glibc, systemd-libs, lzma]

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/pcp/pmcd.pid

checks:
  service:
    type: service
    expect: active

  # pmcd serves the PCP protocol on 44321; a tcp probe confirms collectors and
  # pmlogger/pmie clients can reach it.
  port:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 2s
