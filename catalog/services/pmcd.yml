kind: daemon
name: pmcd
display_name: PCP Collector (pmcd)
category: observability
description: Performance Co-Pilot metric collector daemon (pmcd).
service:
  systemd:
  - pmcd
  openrc:
  - pmcd
apps:
- pmcd
variables:
  host: 127.0.0.1
  port: 44321
  user: pcp
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
restart_on_change:
  libraries:
  - glibc
  - systemd-libs
  - lzma
pidfile: /run/pcp/pmcd.pid
socket:
- /run/pcp/pmcd.socket
- /var/lib/pcp/pmcd/root.socket
processes:
  main:
    exe: ${pmcd_binary}
    user: ${user}
  pmdaroot:
    exe: ${pmcd_pmdaroot_binary}
    user: root
  pmdaproc:
    exe: ${pmcd_pmdaproc_binary}
    user: root
  pmdaxfs:
    exe: ${pmcd_pmdaxfs_binary}
    user: root
  pmdalinux:
    exe: ${pmcd_pmdalinux_binary}
    user: root
  pmdakvm:
    exe: ${pmcd_pmdakvm_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
