name: containerd
display_name: containerd
category: virtualization
description: Container runtime used by Docker, Kubernetes and other OCI tooling.
service:
  systemd:
    - containerd
  openrc:
    - containerd
apps:
  - containerd
variables:
  user: root
  config: /etc/containerd/config.toml
  socket: /run/containerd/containerd.sock
preflight:
  config:
    type: command
    command:
      - ${containerd_binary}
      - -c
      - ${config}
      - config
      - dump
    timeout: 15s
config_files:
  - ${config}
socket: ${socket}
processes:
  main:
    exe: ${containerd_binary}
    user: ${user}
  shim:
    exe: ${containerd_shim_binary}
    user: ${user}
restart_on_change:
  paths:
    - ${config}
  apps:
    containerd:
      level: patch
  messages:
    path: >-
      ${display_name} will restart after config change: ${change.path}
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-version-failed:
    check:
      type: command
      command:
        - ${containerd_binary}
        - --version
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    clear:
      cycles: 10
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 65371751
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    clear:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
