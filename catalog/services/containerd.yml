kind: daemon
name: containerd
display_name: containerd
category: virtualization
description: Container runtime used by Docker, Kubernetes and other OCI tooling.
service:
  systemd:
  - containerd
  openrc:
  - containerd
apps:
- containerd
variables:
  user: root
  config: /etc/containerd/config.toml
  socket: /run/containerd/containerd.sock
preflight:
  config:
    type: command
    command:
    - ${containerd_binary}
    - -c
    - ${config}
    - config
    - dump
    timeout: 15s
config_files:
- ${config}
socket: ${socket}
processes:
  main:
    exe: ${containerd_binary}
    user: ${user}
  shim:
    exe: ${containerd_shim_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  version:
    type: command
    command:
    - ${containerd_binary}
    - --version
    timeout: 5s
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
postflight:
  version:
    type: command
    command:
    - ${containerd_binary}
    - --version
    timeout: 5s
reload_on_change:
  paths:
  - ${config}
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
    - restart
    - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
  restart-if-version-failed:
    type: remediation
    if:
      failed:
        check: version
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
