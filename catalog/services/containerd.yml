kind: daemon
name: containerd
display_name: "containerd"
category: virtualization
description: "Container runtime used by Docker, Kubernetes and other OCI tooling."
service:
  systemd: [containerd]
  openrc: [containerd]
apps: [containerd]

variables:
  user: root
  config: /etc/containerd/config.toml
  socket: /run/containerd/containerd.sock

# `config dump` reads the TOML config (merged with built-in defaults) and prints
# it, exiting non-zero on a malformed config file — a syntax check that never
# starts the runtime.
preflight:
  config: { type: command, command: ["${containerd_binary}", "-c", "${config}", "config", "dump"], timeout: 15s }

config_files: ["${config}"]

socket: "${socket}"

processes:
  main:
    exe: "${containerd_binary}"
    user: "${user}"

checks:
  service: { type: service, expect: active }
