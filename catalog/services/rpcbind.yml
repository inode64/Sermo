name: rpcbind
display_name: RPC Bind
category: storage
description: ONC RPC portmapper.
service: rpcbind
apps:
  - rpcbind
variables:
  host: 127.0.0.1
  port: 111
socket: /run/rpcbind.sock
processes:
  main:
    exe: ${rpcbind_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  rpcbind:
    check:
      type: rpcbind
      host: ${host}
      port: ${port}
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 3604480
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
