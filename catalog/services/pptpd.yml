name: pptpd
display_name: PPTP Server
category: network
service: pptpd
apps:
  - pptpd
restart_on_change:
  apps:
    - pptpd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 1723
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
