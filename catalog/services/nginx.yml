name: nginx
display_name: Nginx
category: web
service: nginx
apps:
  - nginx
restart_on_change:
  apps:
    - nginx
variables:
  host: 127.0.0.1
  port: 80
  tls_port: 443
preflight:
  config:
    type: command
    command:
      - ${nginx_binary}
      - -t
    timeout: 30s
    analyze:
      use:
        - common
        - web
pidfile: /run/nginx/nginx.pid
config_files:
  - /etc/nginx/nginx.conf
processes:
  main:
    exe: ${nginx_binary}
    user: root
reload:
  command:
    - ${nginx_binary}
    - -s
    - reload
reload_on_change:
  paths:
    - /etc/nginx/nginx.conf
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  http:
    check:
      type: http
      url: http://${host}:${port}/
      expect_status:
        op: <
        value: 500
      timeout: 5s
      verify: true
  cert:
    check:
      type: cert
      host: ${host}
      port: ${tls_port}
      cert_verify: false
      expires_in_days: 21
      timeout: 5s
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 30201037
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
