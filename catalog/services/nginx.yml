kind: daemon
name: nginx
display_name: Nginx
category: web
service: nginx
apps:
- nginx
variables:
  host: 127.0.0.1
  port: 80
  tls_port: 443
preflight:
  config:
    type: command
    command:
    - ${nginx_binary}
    - -t
    timeout: 30s
    analyze:
      use:
      - common
      - web
pidfile: /run/nginx/nginx.pid
config_files:
- /etc/nginx/nginx.conf
processes:
  main:
    exe: ${nginx_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  http:
    type: http
    url: http://${host}:${port}/
    expect_status:
      op: <
      value: 500
    timeout: 5s
  cert:
    type: cert
    host: ${host}
    port: ${tls_port}
    verify: false
    expires_in_days: 21
    timeout: 5s
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  block-restart-if-config-invalid:
    type: guard
    blocks:
    - restart
    - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
postflight:
  http:
    type: http
    url: http://${host}:${port}/
    expect_status:
      op: <
      value: 500
    timeout: 5s
reload_on_change:
  paths:
  - /etc/nginx/nginx.conf
