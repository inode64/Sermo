kind: daemon
name: nginx
display_name: "Nginx"
service: nginx
apps: [nginx]

variables:
  host: 127.0.0.1
  port: 80
  tls_port: 443
preflight:
  config: { type: command, command: ["/etc/init.d/nginx","configtest"], timeout: 30s, analyze: { use: [common] } }

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/nginx/nginx.pid

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }

  # The server answers HTTP. `< 500` treats any non-server-error response (incl.
  # 3xx/4xx from vhost/redirect defaults) as healthy, so it never false-alarms on
  # a bare default site.
  http:
    type: http
    url: "http://${host}:${port}/"
    expect_status: { op: "<", value: 500 }
    timeout: 5s

  # HTTPS certificate expiry. verify:false avoids alarms on self-signed certs; a
  # TLS/connection error is not an alert, so a host without 443 stays quiet.
  cert:
    type: cert
    host: "${host}"
    port: "${tls_port}"
    verify: false
    expires_in_days: 21
    timeout: 5s

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
