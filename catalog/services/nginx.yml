name: nginx
display_name: Nginx
category: web
service: nginx
apps:
  - nginx
variables:
  host: 127.0.0.1
  port: 80
  tls_port: 443
preflight:
  config:
    type: command
    command:
      - ${nginx_binary}
      - -t
    timeout: 30s
    analyze:
      use:
        - common
        - web
pidfile: /run/nginx/nginx.pid
config_files:
  - /etc/nginx/nginx.conf
processes:
  main:
    exe: ${nginx_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  http:
    type: http
    url: http://${host}:${port}/
    expect_status:
      op: <
      value: 500
    timeout: 5s
    verify: true
  cert:
    type: cert
    host: ${host}
    port: ${tls_port}
    cert_verify: false
    expires_in_days: 21
    timeout: 5s
  fds:
    type: metric
    scope: service
    name: fds
    op: '>'
    value: 50000
    optional: true
  memory:
    type: metric
    scope: service
    name: memory
    op: '>'
    value: 60%
    optional: true
reload_on_change:
  paths:
    - /etc/nginx/nginx.conf
watches:
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      ref: fds
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
  alert-if-memory-high:
    check:
      ref: memory
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
