name: filebeat
display_name: Filebeat
category: observability
description: Lightweight log shipper for Logstash and Elasticsearch
service: filebeat
apps:
  - filebeat
variables:
  config: /etc/filebeat/filebeat.yml
preflight:
  config:
    type: command
    command:
      - ${filebeat_binary}
      - test
      - config
      - -c
      - ${config}
    timeout: 30s
config_files:
  - ${config}
  - /etc/filebeat/modules.d
restart_on_change:
  paths:
    - ${config}
    - /etc/filebeat/modules.d
watches:
  service:
    check:
      type: service
      expect: active
  config-output:
    check:
      type: command
      command:
        - ${filebeat_binary}
        - test
        - output
        - -c
        - ${config}
      timeout: 30s
      optional: true
      verify: true
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
