kind: daemon
name: kafka-controller
display_name: Apache Kafka Controller
category: messaging
description: 'Kafka controller: maintains the KRaft metadata quorum on the controller listener.'
type: queue
service:
  systemd:
    - kafka-controller
    - kafka
  openrc:
    - kafka-controller
    - kafka
apps:
  - java
  - kafka
variables:
  host: 127.0.0.1
  port: 9093
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  protocol:
    type: kafka
    host: ${host}
    port: ${port}
    timeout: 3s
    expect:
      role: controller
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-protocol-failed:
    type: remediation
    if:
      failed:
        check: protocol
    for:
      cycles: 3
    then:
      action: restart
