kind: daemon
name: postgres-%v
display_name: "PostgreSQL ${version}"
category: database
service:
  systemd: [postgres, postgresql, "postgresql-${version}", "postgres-${version}"]
  openrc: ["postgresql-${version}", "postgres-${version}", postgres]
variables:
  port: 5432
  binary: "/usr/lib64/postgresql-${version}/bin/postgres"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
