kind: daemon
name: postgres-%v
display_name: "PostgreSQL ${version}"
category: database
service:
  systemd: [postgres, postgresql, "postgresql-${version}", "postgres-${version}"]
  openrc: ["postgresql-${version}", "postgres-${version}", postgres]
apps: ["postgres-${version}"]
variables:
  port: 5432
  user: postgres
  data_dir: /var/lib/postgresql/${version}/data
  config_dir: /var/lib/postgresql/${version}/data

os:
  debian:
    variables:
      data_dir: /var/lib/postgresql/${version}/main
      config_dir: /etc/postgresql/${version}/main
  ubuntu:
    variables:
      data_dir: /var/lib/postgresql/${version}/main
      config_dir: /etc/postgresql/${version}/main
  gentoo:
    variables:
      config_dir: /etc/postgresql-${version}

preflight:
  config:
    type: command
    user: "${user}"
    command: ["${binary}", "-D", "${config_dir}", "-C", "config_file", "--data-directory=${data_dir}"]
    timeout: 30s

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
