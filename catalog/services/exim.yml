name: exim
display_name: Exim
category: messaging
description: Gestor de correo SMTP Exim
service: exim
apps:
  - exim
restart_on_change:
  apps:
    - exim
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 25
  tls_port: 465
  user: mail
  spool_dir: /var/spool/exim
  db_dir: /var/spool/exim/db
  db_cleanup_record_limit: "100"
  db_cleanup_age: 10d
  db_cleanup_interval: 6h
  db_cleanup_timeout: 5m
  msglog_dir: /var/spool/exim/msglog
  msglog_backlog_limit: "300"
  msglog_growth_limit: "200"
  msglog_growth_window: 2m
preflight:
  config:
    type: command
    command:
      - ${exim_binary}
      - -bV
    timeout: 10s
pidfile: /run/exim.pid
processes:
  main:
    exe: ${exim_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  smtp:
    check:
      type: smtp
      port: ${port}
      timeout: 3s
  cert:
    check:
      type: cert
      optional: true
      host: ${host}
      port: ${tls_port}
      cert_verify: false
      expires_in_days: 21
      timeout: 5s
  alert-if-msglog-backlog-high:
    check:
      type: count
      path: ${msglog_dir}
      of: file
      count:
        op: '>'
        value: ${msglog_backlog_limit}
      optional: true
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} msglog backlog stayed above ${msglog_backlog_limit} files (current ${check.value})
  alert-if-msglog-backlog-growing-fast:
    check:
      type: count
      path: ${msglog_dir}
      of: file
      delta:
        op: '>'
        value: ${msglog_growth_limit}
      within: ${msglog_growth_window}
      optional: true
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} msglog backlog grew by more than ${msglog_growth_limit} files in ${msglog_growth_window} (current growth ${check.value})
  tidy-callout-db-if-large:
    interval: ${db_cleanup_interval}
    check:
      type: sql
      engine: sqlite
      path: ${db_dir}/callout
      query: "SELECT count(*) FROM tblblob"
      op: '>'
      value: ${db_cleanup_record_limit}
      summary: "Exim callout DB has ${value} records (limit ${check.value}); cleanup age ${db_cleanup_age}"
      optional: true
    then:
      hook:
        command:
          - ${exim_tidydb}
          - -t
          - ${db_cleanup_age}
          - ${spool_dir}
          - callout
        timeout: ${db_cleanup_timeout}
        expect_exit: 0
  tidy-retry-db-if-large:
    interval: ${db_cleanup_interval}
    check:
      type: sql
      engine: sqlite
      path: ${db_dir}/retry
      query: "SELECT count(*) FROM tblblob"
      op: '>'
      value: ${db_cleanup_record_limit}
      summary: "Exim retry DB has ${value} records (limit ${check.value}); cleanup age ${db_cleanup_age}"
      optional: true
    then:
      hook:
        command:
          - ${exim_tidydb}
          - -t
          - ${db_cleanup_age}
          - ${spool_dir}
          - retry
        timeout: ${db_cleanup_timeout}
        expect_exit: 0
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 117041972
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 531848
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} IO usage stayed above ${check.threshold} (current ${check.value})
