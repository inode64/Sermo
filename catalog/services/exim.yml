name: exim
display_name: Exim
category: messaging
description: Gestor de correo SMTP Exim
service: exim
apps:
  - exim
variables:
  host: 127.0.0.1
  port: 25
  tls_port: 465
  user: mail
preflight:
  config:
    type: command
    command:
      - ${exim_binary}
      - -bV
    timeout: 10s
pidfile: /run/exim.pid
processes:
  main:
    exe: ${exim_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  smtp:
    type: smtp
    port: ${port}
    timeout: 3s
  cert:
    type: cert
    optional: true
    host: ${host}
    port: ${tls_port}
    verify: false
    expires_in_days: 21
    timeout: 5s
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
