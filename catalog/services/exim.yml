name: exim
display_name: Exim
category: messaging
description: Gestor de correo SMTP Exim
service: exim
apps:
  - exim
variables:
  host: 127.0.0.1
  port: 25
  tls_port: 465
  user: mail
preflight:
  config:
    type: command
    command:
      - ${exim_binary}
      - -bV
    timeout: 10s
pidfile: /run/exim.pid
processes:
  main:
    exe: ${exim_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  smtp:
    check:
      type: smtp
      port: ${port}
      timeout: 3s
  cert:
    check:
      type: cert
      optional: true
      host: ${host}
      port: ${tls_port}
      cert_verify: false
      expires_in_days: 21
      timeout: 5s
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
