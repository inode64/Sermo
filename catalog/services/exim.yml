name: exim
display_name: Exim
category: messaging
description: Gestor de correo SMTP Exim
service: exim
apps:
  - exim
restart_on_change:
  apps:
    - exim
variables:
  host: 127.0.0.1
  port: 25
  tls_port: 465
  user: mail
  msglog_dir: /var/spool/exim/msglog
  msglog_backlog_limit: "300"
  msglog_growth_limit: "200"
  msglog_growth_window: 2m
preflight:
  config:
    type: command
    command:
      - ${exim_binary}
      - -bV
    timeout: 10s
pidfile: /run/exim.pid
processes:
  main:
    exe: ${exim_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  smtp:
    check:
      type: smtp
      port: ${port}
      timeout: 3s
  cert:
    check:
      type: cert
      optional: true
      host: ${host}
      port: ${tls_port}
      cert_verify: false
      expires_in_days: 21
      timeout: 5s
  alert-if-msglog-backlog-high:
    check:
      type: count
      path: ${msglog_dir}
      of: file
      count:
        op: '>'
        value: ${msglog_backlog_limit}
      optional: true
    then:
      action: alert
      message: >-
        ${display_name} msglog backlog is above ${msglog_backlog_limit} files
  alert-if-msglog-backlog-growing-fast:
    check:
      type: count
      path: ${msglog_dir}
      of: file
      delta:
        op: '>'
        value: ${msglog_growth_limit}
      within: ${msglog_growth_window}
      optional: true
    then:
      action: alert
      message: >-
        ${display_name} msglog backlog grew by more than ${msglog_growth_limit} files in ${msglog_growth_window}
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
