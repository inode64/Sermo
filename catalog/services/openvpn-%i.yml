kind: daemon
name: openvpn-%i
display_name: "OpenVPN ${instance}"
category: network
uses: openvpn
service: "openvpn.${instance}"
apps: ["openvpn-${instance}"]
variables:
  config: "/etc/openvpn/${instance}.conf"
  pidfile: "/run/openvpn.${instance}.pid"

config_files: ["${config}"]

# No `preflight: config` here: OpenVPN has no config-test-and-exit mode. Running
# `openvpn --config <f> --dev null` parses the config but then keeps running, so a
# *valid* config never exits and would only fail the preflight on its timeout —
# inverted behaviour. There is no offline syntax checker to gate start/restart on.

pidfile: "${pidfile}"
