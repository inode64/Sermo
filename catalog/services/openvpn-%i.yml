kind: daemon
name: openvpn-%i
display_name: "OpenVPN ${instance}"
category: network
uses: openvpn
service: "openvpn.${instance}"
apps: ["openvpn-${instance}"]
variables:
  config: "/etc/openvpn/${instance}.conf"
  pidfile: "/run/openvpn.${instance}.pid"

config_files: ["${config}"]

preflight:
  config:
    type: command
    command: ["${binary}", "--config", "${config}", "--verb", "0", "--dev", "null"]
    timeout: 30s

pidfile: "${pidfile}"
