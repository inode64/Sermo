name: dovecot
display_name: Dovecot
category: messaging
description: Dovecot IMAP/POP3
service: dovecot
apps:
  - dovecot
variables:
  host: 127.0.0.1
  port: 143
  tls_port: 993
  pop_port: 110
  pop_tls_port: 995
  sieve_port: 4190
  user: dovecot
  login_user: dovenull
  mail_user: mail
preflight:
  config:
    type: command
    command:
      - ${dovecot_doveconf}
      - -n
    timeout: 30s
pidfile: /run/dovecot/master.pid
socket: /run/dovecot/master
processes:
  main:
    exe: ${dovecot_binary}
    user: root
  anvil:
    exe: ${dovecot_anvil_binary}
    user: ${user}
  log:
    exe: ${dovecot_log_binary}
    user: root
  config:
    exe: ${dovecot_config_binary}
    user: root
  stats:
    exe: ${dovecot_stats_binary}
    user: ${user}
  auth-root:
    exe: ${dovecot_auth_binary}
    user: root
  auth:
    exe: ${dovecot_auth_binary}
    user: ${user}
  imap-login:
    exe: ${dovecot_imap_login_binary}
    user: ${login_user}
  imap:
    exe: ${dovecot_imap_binary}
    user: ${mail_user}
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  imap:
    type: imap
    port: ${port}
    timeout: 3s

  # POP3 liveness (plain). optional: hosts without pop3 enabled stay quiet.
  pop:
    type: pop
    port: ${pop_port}
    timeout: 3s
    optional: true

  # ManageSieve (RFC 5804 greeting). optional when the sieve service is disabled.
  sieve:
    type: sieve
    port: ${sieve_port}
    timeout: 3s
    optional: true

  cert:
    type: cert
    host: ${host}
    port: ${tls_port}
    cert_verify: false
    expires_in_days: 21
    timeout: 5s

postflight:
  imap:
    type: imap
    port: ${port}
    timeout: 3s

rules:
  restart-if-imap-failed:
    type: remediation
    if:
      failed: { check: imap }
    for:
      cycles: 3
    then:
      action: restart

  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
