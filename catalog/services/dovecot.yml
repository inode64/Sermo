kind: daemon
name: dovecot
display_name: "Dovecot"
description: "Dovecot IMAP/POP3"
service: dovecot
variables:
  host: 127.0.0.1
  port: 143
  tls_port: 993
  binary: "/usr/bin/dovecot"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
  config: { type: command, command: ["sh","-c","/usr/bin/doveconf >/dev/null"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  imap: { type: imap, port: "${port}", timeout: 3s }

  # IMAPS certificate expiry. verify:false avoids alarms on self-signed internal
  # certs; a TLS/connection error is not an alert, so a non-TLS server stays quiet.
  cert:
    type: cert
    host: "${host}"
    port: "${tls_port}"
    verify: false
    expires_in_days: 21
    timeout: 5s

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
