kind: daemon
name: dovecot
display_name: "Dovecot"
category: messaging
description: "Dovecot IMAP/POP3"
service: dovecot
apps: [dovecot]

variables:
  host: 127.0.0.1
  port: 143
  tls_port: 993
  user: dovecot
  login_user: dovenull
  mail_user: mail
preflight:
  config: { type: command, command: ["${dovecot_doveconf}", "-n"], timeout: 30s }

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/dovecot/master.pid

socket: /run/dovecot/master

processes:
  main:
    exe: "${dovecot_binary}"
    user: root
  anvil:
    exe: "${dovecot_anvil_binary}"
    user: "${user}"
  log:
    exe: "${dovecot_log_binary}"
    user: root
  config:
    exe: "${dovecot_config_binary}"
    user: root
  stats:
    exe: "${dovecot_stats_binary}"
    user: "${user}"
  auth-root:
    exe: "${dovecot_auth_binary}"
    user: root
  auth:
    exe: "${dovecot_auth_binary}"
    user: "${user}"
  imap-login:
    exe: "${dovecot_imap_login_binary}"
    user: "${login_user}"
  imap:
    exe: "${dovecot_imap_binary}"
    user: "${mail_user}"

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  imap: { type: imap, port: "${port}", timeout: 3s }

  # IMAPS certificate expiry. verify:false avoids alarms on self-signed internal
  # certs; a TLS/connection error is not an alert, so a non-TLS server stays quiet.
  cert:
    type: cert
    host: "${host}"
    port: "${tls_port}"
    verify: false
    expires_in_days: 21
    timeout: 5s

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
