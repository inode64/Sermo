name: dovecot
display_name: Dovecot
category: messaging
description: Dovecot IMAP/POP3
service: dovecot
apps:
  - dovecot
restart_on_change:
  apps:
    - dovecot
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 143
  tls_port: 993
  pop_port: 110
  pop_tls_port: 995
  sieve_port: 4190
  user: dovecot
  login_user: dovenull
  mail_user: mail
preflight:
  config:
    type: command
    command:
      - ${dovecot_doveconf}
      - -n
    timeout: 30s
pidfile: /run/dovecot/master.pid
socket: /run/dovecot/master
processes:
  main:
    exe: ${dovecot_binary}
    user: root
  anvil:
    exe: ${dovecot_anvil_binary}
    user: ${user}
  log:
    exe: ${dovecot_log_binary}
    user: root
  config:
    exe: ${dovecot_config_binary}
    user: root
  stats:
    exe: ${dovecot_stats_binary}
    user: ${user}
  auth-root:
    exe: ${dovecot_auth_binary}
    user: root
  auth:
    exe: ${dovecot_auth_binary}
    user: ${user}
  imap-login:
    exe: ${dovecot_imap_login_binary}
    user: ${login_user}
  imap:
    exe: ${dovecot_imap_binary}
    user: ${mail_user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  # Plain IMAP (143) is deployment-specific: IMAPS-only hosts do not listen on
  # it, so this must not flip an active, TLS-serving server to failed. The `cert`
  # check on ${tls_port} stays required as the authoritative TLS health signal.
  port:
    check:
      type: tcp
      port: ${port}
      optional: true
  pop:
    check:
      type: pop
      port: ${pop_port}
      timeout: 3s
      optional: true

    # ManageSieve (RFC 5804 greeting). optional when the sieve service is disabled.
  sieve:
    check:
      type: sieve
      port: ${sieve_port}
      timeout: 3s
      optional: true

  cert:
    check:
      type: cert
      host: ${host}
      port: ${tls_port}
      cert_verify: false
      expires_in_days: 21
      timeout: 5s

  # Plain-IMAP liveness/remediation, optional for the same reason as `port`:
  # IMAPS-only hosts do not serve 143, so this must not drive a restart there.
  restart-if-imap-failed:
    check:
      type: imap
      port: ${port}
      timeout: 3s
      optional: true
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 3409288397
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 3175514
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} IO usage stayed above ${check.threshold} (current ${check.value})
