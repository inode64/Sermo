name: qemu-ga
display_name: QEMU Guest Agent
category: virtualization
service:
  systemd:
    - qemu-ga
    - qemu-guest-agent
  openrc:
    - qemu-guest-agent
    - qemu-ga
apps:
  - qemu-ga
restart_on_change:
  apps:
    - qemu-ga
variables:
  user: root
processes:
  main:
    exe: ${qemu_ga_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-version-failed:
    check:
      type: command
      command:
        - ${qemu_ga_binary}
        - --version
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
