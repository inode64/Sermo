name: tomcat-%v%s%i
display_name: Apache Tomcat ${version} ${instance}
category: web
apps:
  - java
  - tomcat-${version}
service:
  openrc:
    - tomcat-${version}${sep}${instance}
  systemd:
    - tomcat@${version}${sep}${instance}
variables:
  config: /etc/tomcat-${version}${sep}${instance}/server.xml
  port:
    from_file: ${config}
    pattern: <Connector[^>]*?\bport="(\d+)"
    default: 8080
  # AJP connector (reverse-proxy backends). Falls back to 8009 when absent from server.xml.
  ajp_port:
    from_file: ${config}
    pattern: <Connector[^>]*?\bprotocol="(?:AJP/1\.3|org\.apache\.coyote\.ajp\.[^"]+)"[^>]*?\bport="(\d+)"
    default: 8009
config_files:
  - ${config}
pidfile: /run/tomcat-${version}${sep}${instance}.pid
restart_on_change:
  paths:
    - ${config}
watches:
  service:
    check:
      type: service
      expect: active
  ajp:
    check:
      type: ajp
      host: 127.0.0.1
      port: ${ajp_port}
      timeout: 3s
      optional: true

  restart-if-http-failed:
    check:
      type: http
      url: http://127.0.0.1:${port}/
      expect_status:
        op: <
        value: 500
      timeout: 5s

      # AJP13 CPing/CPong — proves the AJP connector answers, not only HTTP.
      # optional: many installs disable AJP and terminate TLS at a reverse proxy.
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-port-failed:
    check:
      type: tcp
      port: ${port}
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
