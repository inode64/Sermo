name: upower
display_name: UPower
category: hardware
description: D-Bus service for power device and battery status.
service:
  systemd:
    - upower
apps:
  - upower
variables:
  user: root
processes:
  main:
    exe: ${upower_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  dbus:
    type: dbus
    timeout: 5s
postflight:
  dbus:
    type: dbus
    timeout: 5s
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-dbus-failed:
    type: remediation
    if:
      failed:
        check: dbus
    for:
      cycles: 3
    then:
      action: restart
