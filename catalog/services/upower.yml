name: upower
display_name: UPower
category: hardware
description: D-Bus service for power device and battery status.
service:
  systemd:
    - upower
apps:
  - upower
restart_on_change:
  apps:
    - upower
variables:
  user: root
processes:
  main:
    exe: ${upower_binary}
    user: ${user}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-dbus-failed:
    check:
      type: dbus
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
