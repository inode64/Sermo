name: virtnetworkd
display_name: libvirt Network Daemon
category: virtualization
description: Modular libvirt daemon for virtual network management.
service:
  systemd:
    - virtnetworkd
apps:
  - virtnetworkd
restart_on_change:
  apps:
    - virtnetworkd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
socket: /run/libvirt/virtnetworkd-sock
processes:
  main:
    exe: ${virtnetworkd_binary}
    user: root
  dnsmasq-root:
    exe: ${virtnetworkd_dnsmasq_binary}
    cmd: /var/lib/libvirt/dnsmasq/
    user: root
  dnsmasq-nobody:
    exe: ${virtnetworkd_dnsmasq_binary}
    cmd: /var/lib/libvirt/dnsmasq/
    user: nobody
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-libvirt-failed:
    check:
      type: libvirt
      socket: /run/libvirt/virtnetworkd-sock
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 26528973
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
