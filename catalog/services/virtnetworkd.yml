kind: daemon
name: virtnetworkd
display_name: "libvirt Network Daemon"
category: virtualization
description: "Modular libvirt daemon for virtual network management."
service:
  systemd: [virtnetworkd]
apps: [virtnetworkd]

socket: /run/libvirt/virtnetworkd-sock

processes:
  main:
    exe: "${virtnetworkd_binary}"
    user: root
  dnsmasq-root:
    exe: "${virtnetworkd_dnsmasq_binary}"
    cmd: "/var/lib/libvirt/dnsmasq/"
    user: root
  dnsmasq-nobody:
    exe: "${virtnetworkd_dnsmasq_binary}"
    cmd: "/var/lib/libvirt/dnsmasq/"
    user: nobody

checks:
  service: { type: service, expect: active }
