name: cloudflared
display_name: Cloudflare Tunnel
category: vpn
description: Cloudflare Tunnel daemon (cloudflared)
type: tunnel
service:
  systemd:
    - cloudflared
  openrc:
    - cloudflared
apps:
  - cloudflared
variables:
  user: cloudflared
  host: 127.0.0.1
  port: 60123
  config: /etc/cloudflared/config.yml
config_files:
  - ${config}
preflight:
  config:
    type: command
    command:
      - sh
      - -c
      - test ! -e "$1" || exec "$0" --config "$1" tunnel ingress validate
      - ${cloudflared_binary}
      - ${config}
    timeout: 30s
processes:
  main:
    exe: ${cloudflared_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  protocol:
    type: cloudflared
    host: ${host}
    port: ${port}
    timeout: 3s
stop_policy:
  kill_only_if:
    users:
      - ${user}
    exe_any:
      - ${cloudflared_binary}
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
  restart-if-inactive:
    type: remediation
    if:
      failed:
        check: service
    for:
      cycles: 3
    then:
      action: restart
  restart-if-protocol-failed:
    type: remediation
    if:
      failed:
        check: protocol
    for:
      cycles: 3
    then:
      action: restart
