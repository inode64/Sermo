kind: daemon
name: cloudflared
display_name: "Cloudflare Tunnel"
description: "Cloudflare Tunnel daemon (cloudflared)"
type: tunnel

service:
  systemd: [cloudflared]
  openrc: [cloudflared]

# Binary + version are owned by the `cloudflared` app (same name) and linked here.
apps: [cloudflared]

variables:
  binary: /usr/bin/cloudflared
  user: cloudflared
  host: 127.0.0.1
  port: 60123

commands:
  version:
    command: ["${binary}", "--version"]
    timeout: 10s

processes:
  main:
    type: command_match
    exe: "${binary}"
    user: "${user}"

checks:
  service:
    type: service
    expect: active

  protocol:
    type: cloudflared
    host: "${host}"
    port: "${port}"
    timeout: 3s

stop_policy:
  kill_only_if:
    users: ["${user}"]
    exe_any:
      - "${binary}"

rules:
  restart-if-inactive:
    type: remediation
    if:
      failed:
        check: service
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart

  restart-if-protocol-failed:
    type: remediation
    if:
      failed:
        check: protocol
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart
