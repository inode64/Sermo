name: cloudflared
display_name: Cloudflare Tunnel
category: vpn
description: Cloudflare Tunnel daemon (cloudflared)
type: tunnel
service:
  systemd:
    - cloudflared
  openrc:
    - cloudflared
apps:
  - cloudflared
restart_on_change:
  apps:
    - cloudflared
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: cloudflared
  host: 127.0.0.1
  port: 60123
  config: /etc/cloudflared/config.yml
config_files:
  - ${config}
preflight:
  config:
    type: command
    command:
      - sh
      - -c
      - test ! -e "$1" || exec "$0" --config "$1" tunnel ingress validate
      - ${cloudflared_binary}
      - ${config}
    timeout: 30s
processes:
  main:
    exe: ${cloudflared_binary}
    user: ${user}
stop_policy:
  kill_only_if:
    users:
      - ${user}
    exe_any:
      - ${cloudflared_binary}
watches:
  restart-if-inactive:
    check:
      type: service
      expect: active
    for:
      cycles: 3
    then:
      action: restart
  restart-if-protocol-failed:
    check:
      type: cloudflared
      host: ${host}
      port: ${port}
      timeout: 3s
    for:
      cycles: 3
    then:
      action: restart
