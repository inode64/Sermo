name: udisks2
display_name: UDisks2
category: storage
description: D-Bus service for disk management.
service:
  systemd:
    - udisks2
apps:
  - udisks2
processes:
  main:
    exe: ${udisks2_binary}
    user: root
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-udisks2-failed:
    check:
      type: udisks2
      timeout: 5s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 16999629
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
