name: udisks2
display_name: UDisks2
category: storage
description: D-Bus service for disk management.
service:
  systemd:
    - udisks2
apps:
  - udisks2
processes:
  main:
    exe: ${udisks2_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  udisks2:
    type: udisks2
    timeout: 5s
    verify: true
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-udisks2-failed:
    type: remediation
    if:
      failed:
        check: udisks2
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
