name: tuned
display_name: TuneD
category: system
description: Dynamic system tuning daemon.
service:
  systemd:
    - tuned
  openrc:
    - tuned
apps:
  - tuned
restart_on_change:
  apps:
    - tuned
pidfile:
  - /run/tuned/tuned.pid
  - /run/tuned.pid
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-active-failed:
    check:
      type: command
      command:
        - tuned-adm
        - active
      timeout: 10s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 41965159
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
