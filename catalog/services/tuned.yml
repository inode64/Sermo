name: tuned
display_name: TuneD
category: system
description: Dynamic system tuning daemon.
service:
  systemd:
    - tuned
  openrc:
    - tuned
apps:
  - tuned
pidfile:
  - /run/tuned/tuned.pid
  - /run/tuned.pid
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-active-failed:
    check:
      type: command
      command:
        - tuned-adm
        - active
      timeout: 10s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
