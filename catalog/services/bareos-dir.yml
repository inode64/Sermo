name: bareos-dir
display_name: Bareos Director
category: storage
description: Backup director Server
service: bareos-dir
apps:
  - bareos-dir
variables:
  port: 9101
preflight:
  config:
    type: command
    command:
      - ${bareos_dir_binary}
      - -t
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
