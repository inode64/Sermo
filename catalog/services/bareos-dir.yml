name: bareos-dir
display_name: Bareos Director
category: storage
description: Backup director Server
service: bareos-dir
apps:
  - bareos-dir
variables:
  port: 9101
preflight:
  config:
    type: command
    command:
      - ${bareos_dir_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
