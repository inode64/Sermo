name: snmp-ups
display_name: SNMP UPS Driver
category: hardware
service: snmp-ups
apps:
  - snmp-ups
restart_on_change:
  apps:
    - snmp-ups
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${snmp_ups_binary}
      user: root
      state: running
      requires:
        - service
      optional: true
      verify: true
