name: snmp-ups
display_name: SNMP UPS Driver
category: hardware
service: snmp-ups
apps:
  - snmp-ups
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${snmp_ups_binary}
    user: root
    state: running
    requires:
      - service
    optional: true
    verify: true
