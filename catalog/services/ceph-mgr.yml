name: ceph-mgr
display_name: Ceph Manager
category: storage
description: 'Ceph manager daemon: hosts the cluster''s management modules (dashboard, prometheus, balancer, …).'
service: ceph-mgr@${hostname}
apps:
  - ceph-mgr
  - ceph
variables:
  user: ceph
socket: /run/ceph/ceph-mgr.${hostname}.asok
processes:
  ceph-mgr:
    exe: ${ceph_mgr_binary}
    user: ${user}
restart_on_change:
  apps:
    - ceph-mgr
    - ceph
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-status-failed:
    check:
      type: command
      command:
        - ${ceph_binary}
        - --admin-daemon
        - /run/ceph/ceph-mgr.${hostname}.asok
        - status
      timeout: 5s
      analyze:
        use:
          - ceph
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 164715725
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.22%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
