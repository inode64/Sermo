name: ceph-mgr
display_name: Ceph Manager
category: storage
description: 'Ceph manager daemon: hosts the cluster''s management modules (dashboard, prometheus, balancer, …).'
service: ceph-mgr@${hostname}
apps:
  - ceph-mgr
  - ceph
variables:
  user: ceph
socket: /run/ceph/ceph-mgr.${hostname}.asok
processes:
  ceph-mgr:
    exe: ${ceph_mgr_binary}
    user: ${user}
restart_on_change:
checks:
  service:
    type: service
    expect: active
  status:
    type: command
    command:
      - ${ceph_binary}
      - --admin-daemon
      - /run/ceph/ceph-mgr.${hostname}.asok
      - status
    timeout: 5s
    analyze:
      use:
        - ceph
    verify: true
watches:
  restart-if-status-failed:
    check:
      ref: status
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
