kind: daemon
name: rpc-idmapd
display_name: "NFS idmapd"
category: storage
description: "NFSv4 ID mapping daemon."
service:
  systemd: [nfs-idmapd, rpc-idmapd]
  openrc: [rpc.idmapd, rpc-idmapd]
apps: [rpc-idmapd]

processes:
  main:
    type: command_match
    exe: "${rpc_idmapd_binary}"
    user: root

checks:
  service: { type: service, expect: active }
