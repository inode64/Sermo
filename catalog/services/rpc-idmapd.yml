name: rpc-idmapd
display_name: NFS idmapd
category: storage
description: NFSv4 ID mapping daemon.
service:
  systemd:
    - nfs-idmapd
    - rpc-idmapd
  openrc:
    - rpc.idmapd
    - rpc-idmapd
apps:
  - rpc-idmapd
processes:
  main:
    exe: ${rpc_idmapd_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
      verify: true
  process:
    check:
      type: process
      exe: ${rpc_idmapd_binary}
      user: root
      state: running
      optional: true
      requires:
        - service
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 5109351
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
