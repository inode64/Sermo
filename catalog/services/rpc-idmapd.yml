kind: daemon
name: rpc-idmapd
display_name: NFS idmapd
category: storage
description: NFSv4 ID mapping daemon.
service:
  systemd:
    - nfs-idmapd
    - rpc-idmapd
  openrc:
    - rpc.idmapd
    - rpc-idmapd
apps:
  - rpc-idmapd
processes:
  main:
    exe: ${rpc_idmapd_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${rpc_idmapd_binary}
    user: root
    state: running
    requires:
      - service
postflight:
  process:
    type: process
    exe: ${rpc_idmapd_binary}
    user: root
    state: running
rules:
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
