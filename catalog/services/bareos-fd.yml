name: bareos-fd
display_name: Bareos File Daemon
category: storage
description: Backup file Server
service: bareos-fd
apps:
  - bareos-fd
restart_on_change:
  apps:
    - bareos-fd
variables:
  port: 9102
preflight:
  config:
    type: command
    command:
      - ${bareos_fd_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
