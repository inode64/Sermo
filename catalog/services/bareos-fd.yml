name: bareos-fd
display_name: Bareos File Daemon
category: storage
description: Backup file Server
service: bareos-fd
apps:
  - bareos-fd
restart_on_change:
  apps:
    - bareos-fd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 9102
preflight:
  config:
    type: command
    command:
      - ${bareos_fd_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 7727104
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
