name: bareos-fd
display_name: Bareos File Daemon
category: storage
description: Backup file Server
service: bareos-fd
apps:
  - bareos-fd
variables:
  port: 9102
preflight:
  config:
    type: command
    command:
      - ${bareos_fd_binary}
      - -t
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
