kind: daemon
name: bareos-fd
display_name: "Bareos File Daemon"
category: storage
description: "Backup file Server"
service: bareos-fd
apps: [bareos-fd]

variables:
  port: 9102
preflight:
  config: { type: command, command: ["${bareos_fd_binary}","-t"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
