name: rest-server
display_name: Restic REST Server
category: storage
description: 'restic rest-server: HTTP backend for restic backups.'
service:
  systemd:
    - rest-server
  openrc:
    - rest-server
apps:
  - rest-server
restart_on_change:
  apps:
    - rest-server
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 8000
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
