kind: daemon
name: rest-server
display_name: Restic REST Server
category: storage
description: 'restic rest-server: HTTP backend for restic backups.'
service:
  systemd:
    - rest-server
  openrc:
    - rest-server
apps:
  - rest-server
variables:
  host: 127.0.0.1
  port: 8000
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
