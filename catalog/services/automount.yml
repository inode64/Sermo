name: automount
display_name: Automount
category: system
service:
  systemd:
    - autofs
    - automount
  openrc:
    - autofs
    - automount
apps:
  - automount
restart_on_change:
  apps:
    - automount
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
watches:
  service:
    check:
      type: service
      expect: active
  autofs:
    check:
      type: autofs
