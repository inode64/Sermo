kind: daemon
name: zigbee2mqtt
display_name: Zigbee2MQTT
category: web
description: Zigbee to MQTT bridge.
service: zigbee2mqtt
apps:
- node
pidfile: /run/zigbee2mqtt.pid
checks:
  service:
    type: service
    expect: active
  http:
    type: http
    url: http://127.0.0.1:${port}/
    expect_status:
      op: <
      value: 500
    timeout: 5s
    optional: true
rules:
  restart-if-node-binary-changed:
    type: remediation
    if:
      changed:
        path: ${node_binary}
    then:
      action: restart
  restart-if-http-failed:
    type: remediation
    if:
      failed:
        check: http
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
variables:
  port: 8080
postflight:
  http:
    type: http
    url: http://127.0.0.1:${port}/
    expect_status:
      op: <
      value: 500
    timeout: 5s
    optional: true
