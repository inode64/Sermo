name: zigbee2mqtt
display_name: Zigbee2MQTT
category: web
description: Zigbee to MQTT bridge.
service: zigbee2mqtt
apps:
  - node
restart_on_change:
  apps:
    - node
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
pidfile: /run/zigbee2mqtt.pid
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-node-binary-changed:
    type: remediation
    if:
      changed:
        path: ${node_binary}
    then:
      action: restart
variables:
  port: 8080
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-http-failed:
    check:
      type: http
      url: http://127.0.0.1:${port}/
      expect_status:
        op: <
        value: 500
      timeout: 5s
      optional: true
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
