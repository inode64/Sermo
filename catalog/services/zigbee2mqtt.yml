name: zigbee2mqtt
display_name: Zigbee2MQTT
category: web
description: Zigbee to MQTT bridge.
service: zigbee2mqtt
apps:
  - node
pidfile: /run/zigbee2mqtt.pid
checks:
  service:
    type: service
    expect: active
  http:
    type: http
    url: http://127.0.0.1:${port}/
    expect_status:
      op: <
      value: 500
    timeout: 5s
    optional: true
    verify: true
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-node-binary-changed:
    type: remediation
    if:
      changed:
        path: ${node_binary}
    then:
      action: restart
variables:
  port: 8080
watches:
  restart-if-http-failed:
    check:
      ref: http
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
