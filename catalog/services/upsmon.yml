name: upsmon
display_name: NUT UPS Monitor
category: hardware
service:
  systemd:
    - upsmon
  openrc:
    - upsmon
apps:
  - upsmon
restart_on_change:
  apps:
    - upsmon
variables:
  user: nut
pidfile: /run/nut/upsmon.pid
os:
  ubuntu:
    service:
      systemd:
        - nut-monitor
processes:
  main:
    exe: ${upsmon_binary}
    user: root
  worker:
    exe: ${upsmon_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${upsmon_binary}
      user: root
      state: running
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
