name: upsmon
display_name: NUT UPS Monitor
category: hardware
service:
  systemd:
    - nut-monitor
  openrc:
    - upsmon
apps:
  - upsmon
restart_on_change:
  apps:
    - upsmon
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: nut
pidfile: /run/nut/upsmon.pid
os:
  ubuntu:
    service:
      systemd:
        - nut-monitor
processes:
  main:
    exe: ${upsmon_binary}
    user: root
  worker:
    exe: ${upsmon_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${upsmon_binary}
      user: root
      state: running
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 12512052
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
