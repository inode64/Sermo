name: ovsdb-client
display_name: Open vSwitch Client
category: virtualization
service: ovsdb-client
apps:
  - ovsdb-client
watches:
  service:
    check:
      type: service
      expect: active
  openvswitch:
    check:
      type: openvswitch
      socket: /run/openvswitch/db.sock
      timeout: 5s
      optional: true
      verify: true
