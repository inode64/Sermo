name: ovsdb-client
display_name: Open vSwitch Client
category: virtualization
service: ovsdb-client
apps:
  - ovsdb-client
restart_on_change:
  apps:
    - ovsdb-client
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
watches:
  service:
    check:
      type: service
      expect: active
  openvswitch:
    check:
      type: openvswitch
      socket: /run/openvswitch/db.sock
      timeout: 5s
      optional: true
      verify: true
