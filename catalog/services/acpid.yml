name: acpid
display_name: ACPI Daemon
category: hardware
service: acpid
apps:
  - acpid
restart_on_change:
  apps:
    - acpid
pidfile: /run/acpid.pid
processes:
  main:
    exe: ${acpid_binary}
    user: root
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  acpid:
    check:
      type: acpid
      timeout: 3s
