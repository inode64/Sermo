name: acpid
display_name: ACPI Daemon
category: hardware
service: acpid
apps:
  - acpid
restart_on_change:
  apps:
    - acpid
pidfile: /run/acpid.pid
processes:
  main:
    exe: ${acpid_binary}
    user: root
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  acpid:
    check:
      type: acpid
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 2023015
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
