name: acpid
display_name: ACPI Daemon
category: hardware
service: acpid
apps:
  - acpid
restart_on_change:
  apps:
    - acpid
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
pidfile: /run/acpid.pid
processes:
  main:
    exe: ${acpid_binary}
    user: root
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  acpid:
    check:
      type: acpid
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 2023015
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
