kind: daemon
name: acpid
display_name: "ACPI Daemon"
service: acpid
variables:
  binary: "/usr/bin/acpid"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  acpid: { type: acpid, timeout: 3s }
