name: rspamd
display_name: Rspamd
category: messaging
service: rspamd
apps:
  - rspamd
restart_on_change:
  apps:
    - rspamd
variables:
  port: 11334
  user: rspamd
preflight:
  config:
    type: command
    command:
      - ${rspamd_rspamadm}
      - configtest
    timeout: 30s
pidfile: /run/rspamd.pid
socket:
  path: /var/lib/rspamd/rspamd.sock
  optional: true
processes:
  main:
    exe: ${rspamd_binary}
    user: root
  worker:
    exe: ${rspamd_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  rspamd:
    check:
      type: rspamd
      port: ${port}
      timeout: 3s
