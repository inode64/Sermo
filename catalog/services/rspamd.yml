kind: daemon
name: rspamd
display_name: Rspamd
category: messaging
service: rspamd
apps:
  - rspamd
variables:
  port: 11334
  user: rspamd
preflight:
  config:
    type: command
    command:
      - ${rspamd_rspamadm}
      - configtest
    timeout: 30s
pidfile: /run/rspamd.pid
socket:
  path: /var/lib/rspamd/rspamd.sock
  optional: true
processes:
  main:
    exe: ${rspamd_binary}
    user: root
  worker:
    exe: ${rspamd_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  rspamd:
    type: rspamd
    port: ${port}
    timeout: 3s
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
