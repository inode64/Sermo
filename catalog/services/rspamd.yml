name: rspamd
display_name: Rspamd
category: messaging
service: rspamd
apps:
  - rspamd
restart_on_change:
  apps:
    - rspamd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 11334
  user: rspamd
preflight:
  config:
    type: command
    command:
      - ${rspamd_rspamadm}
      - configtest
    timeout: 30s
pidfile: /run/rspamd.pid
socket:
  path: /var/lib/rspamd/rspamd.sock
  optional: true
processes:
  main:
    exe: ${rspamd_binary}
    user: root
  worker:
    exe: ${rspamd_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  rspamd:
    check:
      type: rspamd
      port: ${port}
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 1436786279
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 3148
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} IO usage stayed above ${check.threshold} (current ${check.value})
