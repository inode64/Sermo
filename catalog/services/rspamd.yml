kind: daemon
name: rspamd
display_name: "Rspamd"
service: rspamd
variables:
  port: 11334
  binary: "/usr/bin/rspamd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  config: { type: command, command: ["/usr/bin/rspamadm","configtest"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  rspamd: { type: rspamd, port: "${port}", timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
