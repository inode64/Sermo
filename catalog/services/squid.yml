name: squid
display_name: Squid
category: web
service: squid
apps:
  - squid
restart_on_change:
  apps:
    - squid
variables:
  port: 3128
  user: squid
preflight:
  config:
    type: command
    command:
      - ${squid_binary}
      - -k
      - check
    timeout: 30s
pidfile: /run/squid.pid
processes:
  main:
    exe: ${squid_binary}
    user: root
  pinger:
    exe: ${squid_pinger_binary}
    user: ${user}
  log-file-daemon:
    exe: ${squid_log_file_daemon_binary}
    user: ${user}
  security-file-certgen:
    exe: ${squid_security_file_certgen_binary}
    user: ${user}
reload:
  command:
    - ${squid_binary}
    - -k
    - reconfigure
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
