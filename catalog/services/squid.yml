kind: daemon
name: squid
display_name: "Squid"
category: web
service: squid
apps: [squid]

variables:
  port: 3128
  user: squid
preflight:
  config: { type: command, command: ["${squid_binary}","-k","check"], timeout: 30s }

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/squid.pid

processes:
  main:
    exe: "${squid_binary}"
    user: root
  pinger:
    exe: "${squid_pinger_binary}"
    user: "${user}"
  log-file-daemon:
    exe: "${squid_log_file_daemon_binary}"
    user: "${user}"
  security-file-certgen:
    exe: "${squid_security_file_certgen_binary}"
    user: "${user}"

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }

  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: ">"
        value: 90%
    # 12 consecutive 30s cycles = 6 minutes.
    for:
      cycles: 12
    then:
      action: restart

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
