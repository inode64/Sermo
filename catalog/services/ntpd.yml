name: ntpd
display_name: NTP Daemon
category: network
description: Network Time Protocol Daemon
service: ntpd
apps:
  - ntpd
restart_on_change:
  apps:
    - ntpd
variables:
  port: 123
  user: ntp
pidfile: /run/ntpd.pid
processes:
  main:
    exe: ${ntpd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: ntp
      port: ${port}
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 20446413
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.11%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
