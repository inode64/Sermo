kind: daemon
name: ntpd
display_name: NTP Daemon
category: network
description: Network Time Protocol Daemon
service: ntpd
apps:
  - ntpd
variables:
  port: 123
  user: ntp
pidfile: /run/ntpd.pid
processes:
  main:
    exe: ${ntpd_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  port:
    type: ntp
    port: ${port}
