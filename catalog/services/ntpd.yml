name: ntpd
display_name: NTP Daemon
category: network
description: Network Time Protocol Daemon
service: ntpd
apps:
  - ntpd
restart_on_change:
  apps:
    - ntpd
variables:
  port: 123
  user: ntp
pidfile: /run/ntpd.pid
processes:
  main:
    exe: ${ntpd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: ntp
      port: ${port}
