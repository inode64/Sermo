kind: daemon
name: nebula-%i
display_name: "Nebula ${instance}"
category: network
uses: nebula
service:
  systemd: ["nebula@${instance}", "nebula-${instance}", "nebula.${instance}"]
  openrc: ["nebula.${instance}"]
apps: ["nebula-${instance}"]

variables:
  config: "/etc/nebula/${instance}.yml"

config_files: ["${config}"]

preflight:
  config: { type: command, command: ["${binary}", "-test", "-config", "${config}"], timeout: 30s }

pidfile: "/run/supervise-nebula.${instance}.pid"
