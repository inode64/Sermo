name: garbd
display_name: Galera Arbitrator
category: database
description: Synchronous multi-master replication engine that provides the wsrep API
service: garbd
apps:
  - garbd
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${garbd_binary}
    user: root
    state: running
    requires:
      - service
postflight:
  process:
    type: process
    exe: ${garbd_binary}
    user: root
    state: running
rules:
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
