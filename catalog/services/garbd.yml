name: garbd
display_name: Galera Arbitrator
category: database
description: Synchronous multi-master replication engine that provides the wsrep API
service: garbd
apps:
  - garbd
restart_on_change:
  apps:
    - garbd
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${garbd_binary}
      user: root
      state: running
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
