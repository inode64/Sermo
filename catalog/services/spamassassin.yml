name: spamassassin
display_name: SpamAssassin
category: messaging
description: Anti-spam filter for email servers
service:
  systemd:
    - spamassassin
    - spamd
  openrc:
    - spamd
    - spamassassin
apps:
  - perl
  - spamassassin
variables:
  port: 783
preflight:
  config:
    type: command
    command:
      - ${spamassassin_binary}
      - --lint
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  spamd:
    check:
      type: spamd
      port: ${port}
      timeout: 3s
