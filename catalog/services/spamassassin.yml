kind: daemon
name: spamassassin
display_name: "SpamAssassin"
description: "Antispam"
service: spamassassin

# SpamAssassin is a Perl application: the Perl runtime is owned by the `perl`
# app and linked here, so its binary + version checks run in this service's
# preflight (a missing Perl blocks start).
apps: [perl, spamassassin]

variables:
  port: 783
  binary: "/usr/bin/spamassassin"
preflight:
  config: { type: command, command: ["${binary}","--lint"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  spamd: { type: spamd, port: "${port}", timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
