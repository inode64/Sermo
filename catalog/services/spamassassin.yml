name: spamassassin
display_name: SpamAssassin
category: messaging
description: Anti-spam filter for email servers
service:
  systemd:
    - spamassassin
    - spamd
  openrc:
    - spamd
    - spamassassin
apps:
  - perl
  - spamassassin
variables:
  port: 783
preflight:
  config:
    type: command
    command:
      - ${spamassassin_binary}
      - --lint
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  spamd:
    type: spamd
    port: ${port}
    timeout: 3s
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
