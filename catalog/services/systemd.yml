name: systemd
display_name: systemd
category: system
description: systemd system and service manager
service: systemd
apps:
  - systemd
restart_on_change:
  apps:
    - systemd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
reload:
  command:
    - systemctl
    - daemon-reload
  when: always
reload_on_change:
  paths:
    - /etc/systemd/system
    - /lib/systemd/system
