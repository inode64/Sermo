name: systemd
display_name: systemd
category: system
description: systemd system and service manager
service: systemd
apps:
  - systemd
restart_on_change:
  apps:
    - systemd
reload:
  command:
    - systemctl
    - daemon-reload
  when: always
reload_on_change:
  paths:
    - /etc/systemd/system
    - /lib/systemd/system
