name: syncthing
display_name: Syncthing
category: storage
description: Syncthing continuous file-synchronization daemon.
service:
  systemd:
    - syncthing@${hostname}
    - syncthing
  openrc:
    - syncthing
apps:
  - syncthing
variables:
  host: 127.0.0.1
  port: 8384
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
restart_on_change:
  libraries:
    - glibc
    - zlib
    - sqlite3
  apps:
    - syncthing
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  health:
    check:
      type: syncthing
      host: ${host}
      port: ${port}
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 306033869
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.22%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
