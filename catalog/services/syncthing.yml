kind: daemon
name: syncthing
display_name: Syncthing
category: storage
description: Syncthing continuous file-synchronization daemon.
service:
  systemd:
  - syncthing@${hostname}
  - syncthing
  openrc:
  - syncthing
apps:
- syncthing
variables:
  host: 127.0.0.1
  port: 8384
restart_on_change:
  libraries:
  - glibc
  - zlib
  - sqlite3
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  health:
    type: syncthing
    host: ${host}
    port: ${port}
    timeout: 3s
