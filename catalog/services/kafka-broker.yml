kind: daemon
name: kafka-broker
display_name: Apache Kafka Broker
category: messaging
description: 'Kafka broker: serves the client data plane (produce/fetch) on the broker
  listener.'
type: queue
service:
  systemd:
  - kafka-broker
  - kafka
  openrc:
  - kafka-broker
  - kafka
apps:
- java
- kafka
variables:
  host: 127.0.0.1
  port: 9092
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  protocol:
    type: kafka
    host: ${host}
    port: ${port}
    timeout: 3s
    expect:
      role: broker
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-protocol-failed:
    type: remediation
    if:
      failed:
        check: protocol
    for:
      cycles: 3
    then:
      action: restart
