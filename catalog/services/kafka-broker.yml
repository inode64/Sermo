name: kafka-broker
display_name: Apache Kafka Broker
category: messaging
description: 'Kafka broker: serves the client data plane (produce/fetch) on the broker listener.'
type: queue
service:
  systemd:
    - kafka-broker
    - kafka
  openrc:
    - kafka-broker
    - kafka
apps:
  - java
  - kafka
variables:
  host: 127.0.0.1
  port: 9092
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  restart-if-protocol-failed:
    check:
      type: kafka
      host: ${host}
      port: ${port}
      timeout: 3s
      expect:
        role: broker
    for:
      cycles: 3
    then:
      action: restart
