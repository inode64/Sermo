name: firehol
display_name: FireHOL
category: security
description: Firewall ruleset applied through FireHOL.
service:
  systemd:
    - firehol
  openrc:
    - firehol
apps:
  - firehol
  - iptables
restart_on_change:
  apps:
    - firehol
    - iptables
processes: { }
watches:
  service:
    check:
      type: service
      expect: active
  firewall:
    check:
      type: firewall_rules
      backend: auto
      min_rules: 1
      requires:
        - service
