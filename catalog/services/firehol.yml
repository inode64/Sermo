name: firehol
display_name: FireHOL
category: security
description: Firewall ruleset applied through FireHOL.
service:
  systemd:
    - firehol
  openrc:
    - firehol
apps:
  - firehol
  - iptables
restart_on_change:
  apps:
    - firehol
    - iptables
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
processes: { }
watches:
  service:
    check:
      type: service
      expect: active
  firewall:
    check:
      type: firewall_rules
      backend: auto
      min_rules: 1
      requires:
        - service
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 14417920
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
