kind: daemon
name: firehol
display_name: "FireHOL"
category: security
description: "Firewall ruleset applied through FireHOL."
service:
  systemd: [firehol]
  openrc: [firehol]
apps: [firehol]

# FireHOL is a oneshot firewall loader: it applies rules and exits. Do not add a
# pidfile/process selector; the init service state is the health signal.
checks:
  service: { type: service, expect: active }
