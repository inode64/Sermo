name: pmlogger
display_name: PCP Archive Logger
category: observability
description: Performance Co-Pilot primary archive logger.
service:
  systemd:
    - pmlogger
apps:
  - pmlogger
variables:
  host: 127.0.0.1
  port: 4330
  user: pcp
pidfile: /run/pcp/pmlogger.pid
processes:
  main:
    exe: ${pmlogger_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 74459546
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 11187
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} IO usage is high
