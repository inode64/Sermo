name: node_exporter
display_name: Prometheus Node Exporter
category: observability
description: 'Prometheus node_exporter: host metrics over HTTP /metrics.'
service:
  systemd:
    - node_exporter
  openrc:
    - node_exporter
apps:
  - node_exporter
restart_on_change:
  apps:
    - node_exporter
variables:
  host: 127.0.0.1
  port: 9100
  user: node_exporter
pidfile: /run/node_exporter.pid
processes:
  main:
    exe: ${node_exporter_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  metrics:
    check:
      type: http
      url: http://${host}:${port}/metrics
      expect_status: 200
      timeout: 5s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 30462362
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 2.08%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 895
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} IO usage is high
