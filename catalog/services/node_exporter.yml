name: node_exporter
display_name: Prometheus Node Exporter
category: observability
description: 'Prometheus node_exporter: host metrics over HTTP /metrics.'
service:
  systemd:
    - node_exporter
  openrc:
    - node_exporter
apps:
  - node_exporter
variables:
  host: 127.0.0.1
  port: 9100
  user: node_exporter
pidfile: /run/node_exporter.pid
processes:
  main:
    exe: ${node_exporter_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  metrics:
    type: http
    url: http://${host}:${port}/metrics
    expect_status: 200
    timeout: 5s
