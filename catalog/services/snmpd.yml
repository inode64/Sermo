kind: daemon
name: snmpd
display_name: "Net-SNMP Daemon"
category: observability
service: snmpd
apps: [snmpd]

variables:
  user: root
  port: 161

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/snmpd.pid

processes:
  main:
    exe: "${snmpd_binary}"
    user: "${user}"

# Net-SNMP reloads its config on SIGHUP; the systemd unit usually has no
# ExecReload while OpenRC's init script reloads; the default `when: auto`
# bridges both.
reload:
  signal: HUP

checks:
  service: { type: service, expect: active }
  port: { type: snmp, port: "${port}" }

rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: ">"
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
