name: snmpd
display_name: Net-SNMP Daemon
category: observability
service: snmpd
apps:
  - snmpd
variables:
  user: root
  port: 161
pidfile: /run/snmpd.pid
processes:
  main:
    exe: ${snmpd_binary}
    user: ${user}
reload:
  signal: HUP
checks:
  service:
    type: service
    expect: active
  port:
    type: snmp
    port: ${port}
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
