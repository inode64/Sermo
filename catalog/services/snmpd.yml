name: snmpd
display_name: Net-SNMP Daemon
category: observability
service: snmpd
apps:
  - snmpd
variables:
  user: root
  port: 161
pidfile: /run/snmpd.pid
processes:
  main:
    exe: ${snmpd_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: snmp
      port: ${port}
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
