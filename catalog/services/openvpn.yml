kind: daemon
name: openvpn%s%i
display_name: OpenVPN ${instance}
category: vpn
apps:
- openvpn
versions:
  from: /etc/init.d/openvpn.${instance}
service: openvpn.${instance}
variables:
  config: /etc/openvpn/${instance}.conf
  port:
    from_file: ${config}
    directive: port
    default: 1194
config_files:
- ${config}
pidfile: /run/openvpn.${instance}.pid
checks:
  service:
    type: service
    expect: active
  port:
    type: openvpn
    optional: true
    port: ${port}
