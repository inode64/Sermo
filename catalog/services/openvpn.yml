name: openvpn%s%i
display_name: OpenVPN ${instance}
category: vpn
apps:
  - openvpn
restart_on_change:
  apps:
    - openvpn
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
service:
  openrc:
    - openvpn.${instance}
variables:
  config: /etc/openvpn/${instance}.conf
  port:
    from_file: ${config}
    directive: port
    default: 1194
config_files:
  - ${config}
pidfile: /run/openvpn.${instance}.pid
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: openvpn
      optional: true
      port: ${port}
