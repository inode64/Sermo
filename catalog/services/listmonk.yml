kind: daemon
name: listmonk
display_name: listmonk
category: web
description: listmonk newsletter and mailing-list manager.
service:
  systemd:
    - listmonk
  openrc:
    - listmonk
apps:
  - listmonk
variables:
  host: 127.0.0.1
  port: 9000
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  http:
    type: http
    url: http://${host}:${port}/
    expect_status:
      op: <
      value: 500
    timeout: 5s
