name: listmonk
display_name: listmonk
category: web
description: listmonk newsletter and mailing-list manager.
service:
  systemd:
    - listmonk
  openrc:
    - listmonk
apps:
  - listmonk
variables:
  host: 127.0.0.1
  port: 9000
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  http:
    check:
      type: http
      url: http://${host}:${port}/
      expect_status:
        op: <
        value: 500
      timeout: 5s
