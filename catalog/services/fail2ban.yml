kind: daemon
name: fail2ban
catalog_aliases: [fail2ban-server]
display_name: "Fail2ban"
category: security
service:
  systemd: [fail2ban, fail2ban-server]
  openrc: [fail2ban, fail2ban-server]

# fail2ban runs on the Python 3 runtime, owned by the `python` app and
# linked here so its binary + version checks run in this service's preflight
# (a missing Python blocks start).
apps: [python, fail2ban]

variables:
  binary: "/usr/bin/fail2ban-server"
preflight:
  config: { type: command, command: ["${binary}","-t"], timeout: 30s }

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/fail2ban/fail2ban.pid

checks:
  service: { type: service, expect: active }
  fail2ban: { type: fail2ban, timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
