name: fail2ban
display_name: Fail2ban
category: security
service:
  systemd:
    - fail2ban
    - fail2ban-server
  openrc:
    - fail2ban
    - fail2ban-server
apps:
  - python3
  - fail2ban
restart_on_change:
  apps:
    - python3
    - fail2ban
preflight:
  config:
    type: command
    command:
      - ${fail2ban_binary}
      - -t
    timeout: 30s
pidfile: /run/fail2ban/fail2ban.pid
reload:
  command:
    - ${fail2ban_client}
    - reload
watches:
  service:
    check:
      type: service
      expect: active
  fail2ban:
    check:
      type: fail2ban
      timeout: 3s
