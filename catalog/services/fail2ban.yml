name: fail2ban
display_name: Fail2ban
category: security
service:
  systemd:
    - fail2ban
    - fail2ban-server
  openrc:
    - fail2ban
    - fail2ban-server
apps:
  - python3
  - fail2ban
preflight:
  config:
    type: command
    command:
      - ${fail2ban_binary}
      - -t
    timeout: 30s
pidfile: /run/fail2ban/fail2ban.pid
checks:
  service:
    type: service
    expect: active
  fail2ban:
    type: fail2ban
    timeout: 3s
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
