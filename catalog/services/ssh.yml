name: ssh
display_name: OpenSSH
category: network
service:
  systemd:
    - sshd
    - ssh
  openrc:
    - sshd
apps:
  - ssh
variables:
  user: root
  port: 22
preflight:
  config:
    type: command
    command:
      - ${ssh_binary}
      - -t
    timeout: 30s
pidfile: /run/sshd.pid
processes:
  main:
    exe: ${ssh_binary}
    user: ${user}
reload:
  signal: HUP
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  ssh:
    type: ssh
    port: ${port}
    timeout: 3s
