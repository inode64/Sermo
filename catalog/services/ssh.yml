kind: daemon
name: ssh
display_name: "OpenSSH"
category: network
service:
  systemd: [sshd, ssh]
  openrc: [sshd]
apps: [ssh]

variables:
  user: root
  port: 22
preflight:
  config: { type: command, command: ["${ssh_binary}","-t"], timeout: 30s }

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/sshd.pid

processes:
  main:
    type: command_match
    exe: "${ssh_binary}"
    user: "${user}"

# sshd re-reads its config on SIGHUP, but its systemd unit usually defines no
# ExecReload (so `systemctl reload` fails); OpenRC's init script does reload.
# The default `when: auto` uses the init reload where it exists and signals
# sshd ourselves where it doesn't.
reload:
  signal: HUP

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  ssh: { type: ssh, port: "${port}", timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
