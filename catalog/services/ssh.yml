name: ssh
display_name: OpenSSH
category: network
service:
  systemd:
    - sshd
    - ssh
  openrc:
    - sshd
apps:
  - ssh
restart_on_change:
  apps:
    - ssh
variables:
  user: root
  port: 22
preflight:
  config:
    type: command
    command:
      - ${ssh_binary}
      - -t
    timeout: 30s
pidfile: /run/sshd.pid
processes:
  main:
    exe: ${ssh_binary}
    user: ${user}
reload:
  signal: HUP
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  ssh:
    check:
      type: ssh
      port: ${port}
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 137420800
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.66%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 451
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} IO usage is high
