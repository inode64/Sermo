name: postfix
display_name: "Postfix"
category: messaging
description: "Postfix MTA (SMTP)."
service:
  systemd: [postfix]
  openrc: [postfix]
apps: [postfix]

restart_on_change:
  apps:
    - postfix
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 25
  tls_port: 465

preflight:
  config:
    type: command
    command: ["${postfix_binary}", "check"]
    timeout: 30s

config_files: [/etc/postfix/main.cf, /etc/postfix/master.cf]

reload:
  command: ["${postfix_binary}", "reload"]

reload_on_change:
  paths: [/etc/postfix/main.cf, /etc/postfix/master.cf]
watches:
  service:
    check: { type: service, expect: active }
  cert:
    check:
      type: cert
      optional: true
      host: "${host}"
      port: "${tls_port}"
      cert_verify: false
      expires_in_days: 21
      timeout: 5s

  restart-if-smtp-failed:
    check:
      type: smtp
      host: "${host}"
      port: "${port}"
      timeout: 3s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-port-failed:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 3s
    for:
      cycles: 3
    then:
      action: restart
