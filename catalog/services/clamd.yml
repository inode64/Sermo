name: clamd
display_name: ClamAV Daemon
category: security
service:
  systemd:
    - clamd
    - clamav-daemon
  openrc:
    - clamd
apps:
  - clamd
variables:
  user: root
pidfile:
  - /run/clamd.pid
  - /run/clamav/clamd.pid
processes:
  main:
    exe: ${clamd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  clamd:
    check:
      type: clamd
      socket: /run/clamav/clamd.sock
      timeout: 3s
