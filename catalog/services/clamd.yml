name: clamd
display_name: ClamAV Daemon
category: security
service:
  systemd:
    - clamd
    - clamav-daemon
  openrc:
    - clamd
apps:
  - clamd
restart_on_change:
  apps:
    - clamd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  user: root
  # clamd's LocalSocket path is deployment-specific; this default matches the
  # common /run/clamav/clamd.ctl. Override on an instance for other layouts.
  clamd_socket: /run/clamav/clamd.ctl
pidfile:
  - /run/clamd.pid
  - /run/clamav/clamd.pid
processes:
  main:
    exe: ${clamd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  clamd:
    # Optional: the socket path varies by config (LocalSocket), so a mismatch
    # must not flip an active clamd to failed; service + pidfile are authoritative.
    check:
      type: clamd
      socket: ${clamd_socket}
      timeout: 3s
      optional: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 1218679194
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
