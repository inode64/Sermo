name: epmd
display_name: EPMD
category: messaging
description: Erlang Port Mapper Daemon used by local Erlang nodes.
service:
  systemd:
    - epmd
  openrc:
    - epmd
apps:
  - epmd
variables:
  port: 4369
  user: epmd
pidfile: /run/epmd.pid
processes:
  main:
    exe: ${epmd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
      timeout: 2s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 3347661
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
