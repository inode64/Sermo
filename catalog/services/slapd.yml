kind: daemon
name: slapd
display_name: "OpenLDAP (slapd)"
category: identity
service: slapd
apps: [slapd]

variables:
  host: 127.0.0.1
  port: 389
  tls_port: 636

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  ldap: { type: ldap, port: "${port}", timeout: 3s }

  # LDAPS certificate expiry. verify:false avoids alarms on self-signed internal
  # certs; a TLS/connection error is not an alert, so a non-TLS server stays quiet.
  cert:
    type: cert
    host: "${host}"
    port: "${tls_port}"
    verify: false
    expires_in_days: 21
    timeout: 5s
