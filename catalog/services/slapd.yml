name: slapd
display_name: OpenLDAP (slapd)
category: identity
service: slapd
apps:
  - slapd
restart_on_change:
  apps:
    - slapd
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 389
  tls_port: 636
  config_dir:
    - /etc/ldap/slapd.d
    - /etc/openldap/slapd.d
  config:
    - /etc/ldap/slapd.conf
    - /etc/openldap/slapd.conf
config_files:
  - ${config_dir}
  - ${config}
preflight:
  config:
    type: command
    command:
      - sh
      - -c
      - if [ -d "$1" ]; then exec "$0" -Q -u -F "$1"; else exec "$0" -Q -u -f "$2"; fi
      - ${slapd_slaptest}
      - ${config_dir}
      - ${config}
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  ldap:
    check:
      type: ldap
      port: ${port}
      timeout: 3s
  cert:
    check:
      type: cert
      host: ${host}
      port: ${tls_port}
      cert_verify: false
      expires_in_days: 21
      timeout: 5s
