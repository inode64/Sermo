name: pmlogger_farm
display_name: PCP Archive Logger Farm
category: observability
description: Performance Co-Pilot pmlogger farm service.
service:
  systemd:
    - pmlogger_farm
apps:
  - pmlogger_farm
variables:
  user: pcp
processes:
  main:
    exe: ${pmlogger_farm_binary}
    user: ${user}
  pmpause:
    exe: ${pmlogger_farm_pmpause_binary}
    user: ${user}
  pmsleep:
    exe: ${pmlogger_farm_pmsleep_binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
    verify: true
  process:
    type: process
    optional: true  # Long-lived pmpause may show as pmsleep (deleted) after PCP upgrades.
    exe_any:
      - ${pmlogger_farm_pmpause_binary}
      - ${pmlogger_farm_pmsleep_binary}
    user: ${user}
    state: running
    requires:
      - service
watches:
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
