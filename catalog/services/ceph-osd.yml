name: ceph-osd-%n
display_name: Ceph OSD ${n}
category: storage
description: >-
  Ceph object storage daemon (one per backing device). Binds dynamic ports in the 6800-7300 range across the public and cluster networks, so it is monitored by service state rather than a fixed port.
service: ceph-osd@${n}
apps:
  - ceph-osd
  - ceph
restart_on_change:
  apps:
    - ceph-osd
    - ceph
variables:
  user: ceph
socket: /run/ceph/ceph-osd.${n}.asok
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-status-failed:
    check:
      type: command
      command:
        - ${ceph_binary}
        - --admin-daemon
        - /run/ceph/ceph-osd.${n}.asok
        - status
      timeout: 5s
      analyze:
        use:
          - ceph
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 2432420250
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 9.66%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} single-thread CPU usage is high
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 32285367
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: ${display_name} IO usage is high
