name: ceph-osd-%n
display_name: Ceph OSD ${n}
category: storage
description: >-
  Ceph object storage daemon (one per backing device). Binds dynamic ports in the 6800-7300 range across the public and cluster networks, so it is monitored by service state rather than a fixed port.
service: ceph-osd@${n}
apps:
  - ceph-osd
  - ceph
variables:
  user: ceph
socket: /run/ceph/ceph-osd.${n}.asok
checks:
  service:
    type: service
    expect: active
  status:
    type: command
    command:
      - ${ceph_binary}
      - --admin-daemon
      - /run/ceph/ceph-osd.${n}.asok
      - status
    timeout: 5s
    analyze:
      use:
        - ceph
    verify: true
rules:
  restart-if-status-failed:
    type: remediation
    if:
      failed:
        check: status
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
