name: supervisord
display_name: Supervisor
category: system
service: supervisord
apps:
  - supervisord
restart_on_change:
  apps:
    - supervisord
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
preflight:
  config:
    type: command
    command:
      - ${supervisord_binary}
      - check
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-ping-failed:
    check:
      type: command
      command:
        - supervisorctl
        - status
      timeout: 15s
      optional: true
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    clear:
      cycles: 10
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
