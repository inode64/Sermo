name: pm2
display_name: PM2
category: system
description: Node.js process manager supervising application processes.
service:
  systemd:
    - pm2-root
    - pm2
  openrc:
    - pm2
apps:
  - pm2
  - node
restart_on_change:
  apps:
    - pm2
    - node
variables:
  user: root
pidfile:
  - /run/pm2.pid
  - /root/.pm2/pm2.pid
processes:
  main:
    exe: ${pm2_binary}
    user: ${user}
preflight:
  config:
    type: command
    command:
      - ${pm2_binary}
      - ping
    timeout: 15s
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-ping-failed:
    check:
      type: command
      command:
        - ${pm2_binary}
        - ping
      timeout: 10s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
