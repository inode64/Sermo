kind: daemon
name: lvmetad
display_name: "LVM Metadata Daemon"
service: lvmetad
variables:
  binary: "/usr/bin/lvmetad"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], expect_exit: 1, timeout: 10s }

checks:
  service: { type: service, expect: active }
