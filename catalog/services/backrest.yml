name: backrest
display_name: Backrest
category: storage
description: Backrest web UI/orchestrator for restic backups.
service:
  systemd:
    - backrest
  openrc:
    - backrest
apps:
  - backrest
restart_on_change:
  apps:
    - backrest
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 9898
pidfile: /run/backrest.pid
processes:
  main:
    exe: ${backrest_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  http:
    check:
      type: http
      url: http://${host}:${port}/
      expect_status:
        op: <
        value: 500
      timeout: 5s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 119222682
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
