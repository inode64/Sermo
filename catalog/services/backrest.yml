name: backrest
display_name: Backrest
category: storage
description: Backrest web UI/orchestrator for restic backups.
service:
  systemd:
    - backrest
  openrc:
    - backrest
apps:
  - backrest
  - restic
variables:
  host: 127.0.0.1
  port: 9898
pidfile: /run/backrest.pid
processes:
  main:
    exe: ${backrest_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  http:
    check:
      type: http
      url: http://${host}:${port}/
      expect_status:
        op: <
        value: 500
      timeout: 5s
