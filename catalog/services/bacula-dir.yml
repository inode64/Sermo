name: bacula-dir
display_name: Bacula Director
category: storage
description: Backup director Server
service: bacula-dir
apps:
  - bacula-dir
restart_on_change:
  apps:
    - bacula-dir
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  port: 9101
preflight:
  config:
    type: command
    command:
      - ${bacula_dir_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
