name: bacula-dir
display_name: Bacula Director
category: storage
description: Backup director Server
service: bacula-dir
apps:
  - bacula-dir
variables:
  port: 9101
preflight:
  config:
    type: command
    command:
      - ${bacula_dir_binary}
      - -t
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
