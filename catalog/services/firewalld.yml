name: firewalld
display_name: firewalld
category: security
description: Dynamic firewall management daemon.
service:
  systemd:
    - firewalld
apps:
  - firewalld
restart_on_change:
  apps:
    - firewalld
variables:
  config_dir: /etc/firewalld
config_files:
  - ${config_dir}
preflight:
  config:
    type: command
    command:
      - ${firewalld_binary_offline}
      - --check-config
      - --system-config
      - ${config_dir}
    timeout: 30s
reload:
  command:
    - ${firewalld_cmd}
    - --reload
reload_on_change:
  paths:
    - ${config_dir}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-state-failed:
    check:
      type: command
      command:
        - ${firewalld_cmd}
        - --state
      timeout: 10s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
