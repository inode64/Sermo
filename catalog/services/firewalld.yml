name: firewalld
display_name: firewalld
category: security
description: Dynamic firewall management daemon.
service:
  systemd:
    - firewalld
apps:
  - firewalld
restart_on_change:
  apps:
    - firewalld
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  config_dir: /etc/firewalld
config_files:
  - ${config_dir}
preflight:
  config:
    type: command
    command:
      - ${firewalld_binary_offline}
      - --check-config
      - --system-config
      - ${config_dir}
    timeout: 30s
reload:
  command:
    - ${firewalld_cmd}
    - --reload
reload_on_change:
  paths:
    - ${config_dir}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  restart-if-state-failed:
    check:
      type: command
      command:
        - ${firewalld_cmd}
        - --state
      timeout: 10s
      verify: true
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 61352756
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.22%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
