kind: daemon
name: firewalld
display_name: firewalld
category: security
description: Dynamic firewall management daemon.
service:
  systemd:
  - firewalld
apps:
- firewalld
variables:
  config_dir: /etc/firewalld
config_files:
- ${config_dir}
preflight:
  config:
    type: command
    command:
    - ${firewalld_binary_offline}
    - --check-config
    - --system-config
    - ${config_dir}
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  state:
    type: command
    command:
    - firewall-cmd
    - state
    timeout: 10s
postflight:
  state:
    type: command
    command:
    - firewall-cmd
    - state
    timeout: 10s
reload_on_change:
  paths:
  - ${config_dir}
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
    - restart
    - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
  restart-if-state-failed:
    type: remediation
    if:
      failed:
        check: state
    for:
      cycles: 3
    then:
      action: restart
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
