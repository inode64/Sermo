name: networkmanager
display_name: NetworkManager
category: network
description: NetworkManager system network management daemon.
service:
  systemd:
    - NetworkManager
  openrc:
    - NetworkManager
    - networkmanager
apps:
  - networkmanager
restart_on_change:
  apps:
    - networkmanager
processes:
  main:
    exe: ${networkmanager_binary}
    user: root
reload:
  command:
    - ${networkmanager_nmcli}
    - general
    - reload
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  status:
    check:
      type: command
      optional: true
      command:
        - ${networkmanager_nmcli}
        - general
        - status
      timeout: 10s
      verify: true
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 31665357
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
