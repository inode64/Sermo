kind: daemon
name: networkmanager
display_name: "NetworkManager"
category: network
description: "NetworkManager system network management daemon."
service:
  systemd: [NetworkManager]
  openrc: [NetworkManager, networkmanager]
apps: [networkmanager]

processes:
  main:
    exe: "${networkmanager_binary}"
    user: root

checks:
  service: { type: service, expect: active }
