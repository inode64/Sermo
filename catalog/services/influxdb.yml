kind: daemon
name: influxdb
display_name: "InfluxDB"
category: database
description: "InfluxDB time-series database."
type: database

service:
  systemd: [influxdb]
  openrc: [influxdb]

apps: [influxdb]
variables:
  host: 127.0.0.1
  port: 8086
  config: /etc/influxdb2/config.toml

config_files: ["${config}"]

preflight:
  # influxd (v2) has no `config validate` subcommand; `print-config` loads and
  # resolves the config (erroring on an invalid file) and reads its path from
  # INFLUXD_CONFIG_PATH rather than a flag.
  config:
    type: command
    command: ["sh", "-c", "INFLUXD_CONFIG_PATH=\"$1\" exec \"$0\" print-config", "${influxdb_binary}", "${config}"]
    timeout: 30s

pidfile: /run/supervise-influxdb.pid

checks:
  service:
    type: service
    expect: active

  port:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 2s

  # Native InfluxDB probe: GETs /health (2.x and 1.8+) and verifies status "pass",
  # reporting the server version; falls back to /ping (all versions) when /health
  # is unavailable. Set tls: true if the API is served over https.
  health:
    type: influxdb
    host: "${host}"
    port: "${port}"
    timeout: 3s
