kind: daemon
name: influxdb
display_name: InfluxDB
category: database
description: InfluxDB time-series database.
type: database
service:
  systemd:
  - influxdb
  openrc:
  - influxdb
apps:
- influxdb
variables:
  host: 127.0.0.1
  port: 8086
  config: /etc/influxdb2/config.toml
config_files:
- ${config}
preflight:
  config:
    type: command
    command:
    - ${influxdb_binary}
    - config
    - validate
    - --config
    - ${config}
    timeout: 30s
pidfile: /run/supervise-influxdb.pid
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  health:
    type: influxdb
    host: ${host}
    port: ${port}
    timeout: 3s
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
    - restart
    - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
