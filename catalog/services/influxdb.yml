name: influxdb
display_name: InfluxDB
category: database
description: InfluxDB time-series database.
type: database
service:
  systemd:
    - influxdb
  openrc:
    - influxdb
apps:
  - influxdb
restart_on_change:
  apps:
    - influxdb
variables:
  host: 127.0.0.1
  port: 8086
  config: /etc/influxdb2/config.toml
config_files:
  - ${config}
preflight:
  config:
    type: command
    command:
      - ${influxdb_binary}
      - config
      - validate
      - --config
      - ${config}
    timeout: 30s
pidfile: /run/supervise-influxdb.pid
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  health:
    check:
      type: influxdb
      host: ${host}
      port: ${port}
      timeout: 3s
