name: node
display_name: Node.js
category: runtime
description: A JavaScript runtime built on Chrome's V8 JavaScript engine
service: node
apps:
  - node
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${node_binary}
    user: root
    state: running
    requires:
      - service
    optional: true
postflight:
  process:
    type: process
    exe: ${node_binary}
    user: root
    state: running
    optional: true
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
