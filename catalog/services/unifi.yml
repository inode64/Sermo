name: unifi
display_name: UniFi Network Controller
category: web
description: Ubiquiti UniFi Network controller (management API over HTTPS).
service:
  systemd:
    - unifi
  openrc:
    - unifi
apps:
  - java
  - mongod
variables:
  host: 127.0.0.1
  port: 8443
pidfile: /run/unifi.pid
processes:
  controller:
    cmd: java .*unifi
    user: unifi
  mongo:
    exe: ${mongod_binary}
    user: unifi
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  api:
    check:
      type: unifi
      host: ${host}
      port: ${port}
      timeout: 5s
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
