kind: daemon
name: unifi
display_name: UniFi Network Controller
category: web
description: Ubiquiti UniFi Network controller (management API over HTTPS).
service:
  systemd:
    - unifi
  openrc:
    - unifi
apps:
  - java
  - mongod
variables:
  host: 127.0.0.1
  port: 8443
pidfile: /run/unifi.pid
processes:
  controller:
    cmd: java .*unifi
    user: unifi
  mongo:
    exe: ${mongod_binary}
    user: unifi
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  api:
    type: unifi
    host: ${host}
    port: ${port}
    timeout: 5s
