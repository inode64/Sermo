name: usbhid-ups
display_name: USB HID UPS Driver
category: hardware
service: usbhid-ups
apps:
  - usbhid-ups
restart_on_change:
  apps:
    - usbhid-ups
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${usbhid_ups_binary}
      user: root
      state: running
      requires:
        - service
      optional: true
      verify: true
