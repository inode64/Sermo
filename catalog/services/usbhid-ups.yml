name: usbhid-ups
display_name: USB HID UPS Driver
category: hardware
service: usbhid-ups
apps:
  - usbhid-ups
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${usbhid_ups_binary}
      user: root
      state: running
      requires:
        - service
      optional: true
      verify: true
