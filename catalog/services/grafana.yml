kind: daemon
name: grafana
display_name: "Grafana"
category: observability
description: "Grafana observability and dashboarding server."

service:
  systemd: [grafana]
  openrc: [grafana]

apps: [grafana]
variables:
  host: 127.0.0.1
  port: 3000
  user: grafana

pidfile:
  - /run/grafana.pid
  - /run/grafana/grafana.pid

processes:
  main:
    exe: "${grafana_binary}"
    user: "${user}"

checks:
  service:
    type: service
    expect: active

  port:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 2s

  # /api/health is the unauthenticated liveness endpoint (returns 200 with a JSON
  # database status when Grafana is up).
  health:
    type: http
    url: "http://${host}:${port}/api/health"
    expect_status: { op: "<", value: 500 }
    timeout: 5s
