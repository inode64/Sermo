kind: daemon
name: grafana
display_name: "Grafana"
description: "Grafana observability and dashboarding server."

service:
  systemd: [grafana]
  openrc: [grafana]

apps: [grafana]
variables:
  host: 127.0.0.1
  port: 3000

checks:
  service:
    type: service
    expect: active

  port:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 2s

  # /api/health is the unauthenticated liveness endpoint (returns 200 with a JSON
  # database status when Grafana is up).
  health:
    type: http
    url: "http://${host}:${port}/api/health"
    expect_status: 200
    timeout: 5s
