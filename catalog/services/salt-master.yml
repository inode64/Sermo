name: salt-master
display_name: Salt Master
category: system
description: Salt master controller daemon
service: salt-master
apps:
  - salt-master
restart_on_change:
  apps:
    - salt-master
variables:
  port: 4505
pidfile: /run/salt-master.pid
socket:
  path:
    - /run/salt/master/publish_pull.ipc
    - /run/salt/master/master_event_pub.ipc
    - /run/salt/master/master_event_pull.ipc
  optional: true
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
