name: salt-master
display_name: Salt Master
category: system
description: Salt master controller daemon
service: salt-master
apps:
  - salt-master
variables:
  port: 4505
pidfile: /run/salt-master.pid
socket:
  path:
    - /run/salt/master/publish_pull.ipc
    - /run/salt/master/master_event_pub.ipc
    - /run/salt/master/master_event_pull.ipc
  optional: true
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
