kind: daemon
name: salt-master
display_name: "Salt Master"
category: system
description: "Salt master controller daemon"
service: salt-master
apps: [salt]

variables:
  port: 4505

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/salt-master.pid

socket:
  path:
    - /run/salt/master/publish_pull.ipc
    - /run/salt/master/master_event_pub.ipc
    - /run/salt/master/master_event_pull.ipc
  optional: true

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
