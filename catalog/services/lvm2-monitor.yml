kind: daemon
name: lvm2-monitor
display_name: "LVM2 monitor"
category: storage
description: "LVM2 dmeventd monitoring activation service."
service:
  systemd: [lvm2-monitor]
apps: [lvm]

# lvm2-monitor is commonly active/exited after enabling volume monitoring.
processes: {}

checks:
  service: { type: service, expect: active }
