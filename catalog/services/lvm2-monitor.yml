name: lvm2-monitor
display_name: LVM2 monitor
category: storage
description: LVM2 dmeventd monitoring activation service.
service:
  systemd:
    - lvm2-monitor
apps:
  - lvm
restart_on_change:
  apps:
    - lvm
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
processes: { }
watches:
  service:
    check:
      type: service
      expect: active
