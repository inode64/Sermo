kind: daemon
name: guacd
display_name: "Apache Guacamole"
category: web
description: "Guacamole daemon"
service: guacd
apps: [guacd]

variables:
  port: 4822
  user: guacamole

# Defining pidfile auto-wires process-tree monitoring and a
# requires:[service] pidfile health check (error if missing while active).
pidfile: /run/guacamole/guacd.pid

processes:
  main:
    exe: "${guacd_binary}"
    user: "${user}"

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  guacd: { type: guacd, port: "${port}", timeout: 3s }

  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: ">"
        value: 90%
    # 12 consecutive 30s cycles = 6 minutes.
    for:
      cycles: 12
    then:
      action: restart
