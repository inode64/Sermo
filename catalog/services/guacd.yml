kind: daemon
name: guacd
display_name: "Apache Guacamole"
description: "Guacamole daemon"
service: guacd
variables:
  port: 4822
  binary: "/usr/bin/guacd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  guacd: { type: guacd, port: "${port}", timeout: 3s }
