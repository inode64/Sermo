name: guacd
display_name: Apache Guacamole
category: web
description: Guacamole daemon
service: guacd
apps:
  - guacd
variables:
  port: 4822
  user: guacamole
pidfile: /run/guacamole/guacd.pid
processes:
  main:
    exe: ${guacd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  guacd:
    check:
      type: guacd
      port: ${port}
      timeout: 3s
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
