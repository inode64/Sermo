name: salt-minion
display_name: Salt Minion
category: system
description: Salt minion agent.
service: salt-minion
apps:
  - salt-minion
restart_on_change:
  apps:
    - salt-minion
pidfile: /run/salt-minion.pid
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${salt_minion_binary}
      user: root
      state: running
      requires:
        - service
      optional: true
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
