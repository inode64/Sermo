name: salt-minion
display_name: Salt Minion
category: system
description: Salt minion agent.
service: salt-minion
apps:
  - salt-minion
restart_on_change:
  apps:
    - salt-minion
pidfile: /run/salt-minion.pid
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${salt_minion_binary}
      user: root
      state: running
      requires:
        - service
      optional: true
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 150590669
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 0.44%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
