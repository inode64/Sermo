name: salt-minion
display_name: Salt Minion
category: system
description: Salt minion agent.
service: salt-minion
apps:
  - salt-minion
pidfile: /run/salt-minion.pid
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${salt_minion_binary}
    user: root
    state: running
    requires:
      - service
    optional: true
postflight:
  process:
    type: process
    exe: ${salt_minion_binary}
    user: root
    state: running
    optional: true
rules:
  alert-if-memory-high:
    type: alert
    if:
      metric:
        scope: service
        name: memory
        op: '>'
        value: 60%
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
