name: glusterd
display_name: GlusterFS
category: storage
description: GlusterFS
service: glusterd
apps:
  - glusterd
restart_on_change:
  apps:
    - glusterd
variables:
  port: 24007
socket: /run/glusterd.socket
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  glusterfs:
    check:
      type: glusterfs
      port: ${port}
      timeout: 3s
