name: glusterd
display_name: GlusterFS
category: storage
description: GlusterFS
service: glusterd
apps:
  - glusterd
restart_on_change:
  apps:
    - glusterd
variables:
  port: 24007
socket: /run/glusterd.socket
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  glusterfs:
    check:
      type: glusterfs
      port: ${port}
      timeout: 3s
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 137492890
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 1.09%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 3403879
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} IO usage stayed above ${check.threshold} (current ${check.value})
