kind: daemon
name: glusterd
display_name: "GlusterFS"
category: storage
description: "GlusterFS"
service: glusterd
apps: [glusterd]

variables:
  port: 24007

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  glusterfs: { type: glusterfs, port: "${port}", timeout: 3s }
