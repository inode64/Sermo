name: xinetd
category: network
service: xinetd
apps:
  - xinetd
restart_on_change:
  apps:
    - xinetd
pidfile: /run/xinetd.pid
processes:
  main:
    exe: ${xinetd_binary}
    user: root
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  process:
    # Best-effort: xinetd's pidfile/exe identity is not reliably matchable across
    # builds (it may run without a pidfile); service is authoritative.
    check:
      type: process
      exe: ${xinetd_binary}
      user: root
      state: running
      optional: true
      requires:
        - service
      verify: true
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 6889063
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: ${display_name} memory usage is high
