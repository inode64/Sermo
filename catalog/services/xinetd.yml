kind: daemon
name: xinetd
category: network
service: xinetd
apps:
- xinetd
pidfile: /run/xinetd.pid
processes:
  main:
    exe: ${xinetd_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  process:
    type: process
    exe: ${xinetd_binary}
    user: root
    state: running
    requires:
    - service
postflight:
  process:
    type: process
    exe: ${xinetd_binary}
    user: root
    state: running
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
