name: bacula-sd
display_name: Bacula Storage Daemon
category: storage
description: Backup storage Server
service: bacula-sd
apps:
  - bacula-sd
restart_on_change:
  apps:
    - bacula-sd
variables:
  port: 9103
preflight:
  config:
    type: command
    command:
      - ${bacula_sd_binary}
      - -t
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
