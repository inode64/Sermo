name: lvmpolld
display_name: LVM poll daemon
category: storage
service: lvmpolld
apps:
  - lvmpolld
restart_on_change:
  apps:
    - lvmpolld
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
watches:
  service:
    check:
      type: service
      expect: active
  lvmpolld:
    check:
      type: lvmpolld
      timeout: 3s
