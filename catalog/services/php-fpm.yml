name: php-fpm%v%s%i
display_name: PHP-FPM ${version} ${instance}
category: web
type: appserver
service:
  systemd:
    - php-fpm@${version}${sep}${instance}
    - php-fpm@php${version}${sep}${instance}
    - php-fpm-php${version}${sep}${instance}
    - php${version}${sep}${instance}-fpm
    - php-fpm${version}
    - php${version}-fpm
  openrc:
    - php-fpm-php${version}${sep}${instance}
    - php${version}${sep}${instance}
    - php-fpm${version}${sep}${instance}
    - php-fpm
    - php-fpm${version}
    - php${version}
apps:
  - php-fpm${version}
variables:
  user: www-data
  host: 127.0.0.1
  port: 9000
  config_test_pidfile: /run/php-fpm-php${version}${sep}${instance}.pid
  config: /etc/php/fpm-php${version}${sep}${instance}/php-fpm.conf
  status_path: /status
pidfile:
  optional: true
  path:
    - /run/php-fpm-${version}${sep}${instance}.pid
    - /run/php-fpm/php-fpm-${version}${sep}${instance}.pid
    - /run/php-fpm/php-fpm-php${version}${sep}${instance}.pid
    - /run/php-fpm-php${version}${sep}${instance}.pid
preflight:
  config:
    type: command
    command:
      - ${binary}
      - --test
      - --fpm-config
      - ${config}
      - --pid
      - ${config_test_pidfile}
    timeout: 10s
processes:
  master:
    exe: ${binary}
    user: root
  workers:
    exe: ${binary}
    user: ${user}
reload:
  signal: USR2
watches:
  # The top-level `pidfile:` above already generates a service-gated (optional)
  # pidfile health check; a separate watches.pidfile would collide with it.
  service:
    check:
      type: service
      expect: active
  tcp:
    check:
      type: tcp
      optional: true
      host: ${host}
      port: ${port}
      timeout: 3s
  fpm:
    check:
      type: fpm
      optional: true
      host: ${host}
      port: ${port}
      status_path: ${status_path}
      timeout: 3s
stop_policy:
  term_timeout: 10s
  force_kill: true
  kill_only_if:
    users:
      - ${user}
      - root
    exe_any:
      - ${binary}
