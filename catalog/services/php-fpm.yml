kind: daemon
name: php-fpm%v%s%i
display_name: "PHP-FPM ${version} ${instance}"
category: web
type: appserver

# A PHP-FPM instance is identified by version AND pool environment: the config
# tree is /etc/php/fpm-php8.4 (default) or /etc/php/fpm-php8.4_airbnb (named pool).
# The daemon owns discovery from that directory; a bare /etc/php/fpm-php8.4
# materializes as php-fpm8.4 with no trailing separator. `versions.require` gates
# each discovered pool on the versioned binary existing, so a leftover config tree
# without its runtime is skipped (and never dangles a link to a missing app).
versions:
  from: "/etc/php/fpm-php${version}${sep}${instance}"
  require:
    - "/usr/sbin/php-fpm${version}"
    - "/usr/bin/php-fpm${version}"

# NOTE: OpenRC often multiplexes pools through a single /etc/init.d/php-fpm
# symlinked per pool; systemd may use php-fpm@.service or versioned units. Try
# instance-specific names first so separately configured pools do not collapse to
# one shared unit.
service:
  systemd:
    - "php-fpm@php${version}${sep}${instance}"
    - "php-fpm@${version}${sep}${instance}"
    - "php-fpm-php${version}${sep}${instance}"
    - "php${version}${sep}${instance}-fpm"
    - "php-fpm"
    - "php${version}-fpm"
    - "php-fpm${version}"
  openrc:
    - "php-fpm-php${version}${sep}${instance}"
    - "php${version}${sep}${instance}"
    - "php-fpm${version}${sep}${instance}"
    - "php-fpm"
    - "php-fpm${version}"
    - "php${version}"

# The PHP-FPM runtime is owned by the matching `php-fpm${version}` app and linked here.
# That app resolves `${binary}`, validates the binary and exports version data.
apps: ["php-fpm${version}"]

variables:
  user: www-data
  host: 127.0.0.1
  port: 9000
  pidfile: /run/php-fpm-php${version}${sep}${instance}.pid
  config: /etc/php/fpm-php${version}${sep}${instance}/php-fpm.conf
  status_path: /status

pidfile: "${pidfile}"

preflight:
  config:
    type: command
    command: ["${binary}", "--test", "--fpm-config", "${config}", "--pid", "${pidfile}"]
    timeout: 10s

processes:
  master:
    exe: "${binary}"
    user: root

  workers:
    exe: "${binary}"
    user: "${user}"

checks:
  service:
    type: service
    expect: active

  tcp:
    type: tcp
    optional: true
    host: "${host}"
    port: "${port}"
    timeout: 3s

  # FastCGI /ping liveness plus pool metrics from the status page. Requires the
  # pool to enable `ping.path = /ping` and `pm.status_path = ${status_path}`; the
  # metrics (active/idle/total processes, listen queue, slow requests, …) land in
  # the result data, assertable via expect:.
  fpm:
    type: fpm
    optional: true
    host: "${host}"
    port: "${port}"
    status_path: "${status_path}"
    timeout: 3s

stop_policy:
  term_timeout: 10s
  force_kill: true
  kill_only_if:
    users: ["${user}", root]
    exe_any:
      - "${binary}"

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed:
        check: config
    then:
      action: block
      message: "${display_name} configuration is invalid"
