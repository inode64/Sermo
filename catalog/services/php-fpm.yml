kind: daemon
name: php-fpm%v%s%i
display_name: PHP-FPM ${version} ${instance}
category: web
type: appserver
service:
  systemd:
  - php-fpm@${version}${sep}${instance}
  - php-fpm@php${version}${sep}${instance}
  - php-fpm-php${version}${sep}${instance}
  - php${version}${sep}${instance}-fpm
  - php-fpm${version}
  - php${version}-fpm
  openrc:
  - php-fpm-php${version}${sep}${instance}
  - php${version}${sep}${instance}
  - php-fpm${version}${sep}${instance}
  - php-fpm
  - php-fpm${version}
  - php${version}
apps:
- php-fpm${version}
variables:
  user: www-data
  host: 127.0.0.1
  port: 9000
  pidfile: /run/php-fpm-php${version}${sep}${instance}.pid
  config: /etc/php/fpm-php${version}${sep}${instance}/php-fpm.conf
  status_path: /status
pidfile: ${pidfile}
preflight:
  config:
    type: command
    command:
    - ${binary}
    - --test
    - --fpm-config
    - ${config}
    - --pid
    - ${pidfile}
    timeout: 10s
processes:
  master:
    exe: ${binary}
    user: root
  workers:
    exe: ${binary}
    user: ${user}
checks:
  service:
    type: service
    expect: active
  tcp:
    type: tcp
    optional: true
    host: ${host}
    port: ${port}
    timeout: 3s
  fpm:
    type: fpm
    optional: true
    host: ${host}
    port: ${port}
    status_path: ${status_path}
    timeout: 3s
stop_policy:
  term_timeout: 10s
  force_kill: true
  kill_only_if:
    users:
    - ${user}
    - root
    exe_any:
    - ${binary}
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
    - restart
    - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
