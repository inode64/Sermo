kind: daemon
name: php-fpm%v
display_name: "PHP-FPM ${version}"
category: web
type: appserver

service:
  systemd: ["php-fpm", "php${version}-fpm", "php-fpm${version}"]
  openrc: ["php-fpm", "php-fpm${version}", "php${version}"]

# The PHP-FPM runtime is owned by the matching `php-fpm${version}` app and linked here.
# That app resolves `${binary}`, validates the binary and exports version data.
apps: ["php-fpm${version}"]

variables:
  user: www-data
  host: 127.0.0.1
  port: 9000
  pidfile: /run/php-fpm-php${version}.pid
  config: /etc/php/fpm-php${version}/php-fpm.conf
  status_path: /status

pidfile: "${pidfile}"

preflight:
  config:
    type: command
    command: ["${binary}", "--test", "--fpm-config", "${config}", "--pid", "${pidfile}"]
    timeout: 10s

processes:
  pidfile:
    type: pidfile
    path: "${pidfile}"

  master:
    type: command_match
    exe: "${binary}"
    user: root

  workers:
    type: command_match
    exe: "${binary}"
    user: "${user}"

checks:
  service:
    type: service
    expect: active

  tcp:
    type: tcp
    optional: true
    host: "${host}"
    port: "${port}"
    timeout: 3s

  # FastCGI /ping liveness plus pool metrics from the status page. Requires the
  # pool to enable `ping.path = /ping` and `pm.status_path = ${status_path}`; the
  # metrics (active/idle/total processes, listen queue, slow requests, …) land in
  # the result data, assertable via expect:.
  fpm:
    type: fpm
    optional: true
    host: "${host}"
    port: "${port}"
    status_path: "${status_path}"
    timeout: 3s

stop_policy:
  term_timeout: 10s
  force_kill: true
  kill_only_if:
    users: ["${user}", root]
    exe_any:
      - "${binary}"

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed:
        check: config
    then:
      action: block
      message: "${display_name} configuration is invalid"
