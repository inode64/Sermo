kind: daemon
name: mdadm
service: mdadm
variables:
  binary: "/usr/bin/mdadm"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }

checks:
  service: { type: service, expect: active }

  # md software-RAID health from /proc/mdstat (native, zero-config): alerts when
  # any array is degraded. A host with no md arrays never alerts, so it is safe
  # as a bundled default. This is what mdadm exists to watch.
  raid: { type: raid }
