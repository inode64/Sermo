name: mdadm
category: storage
service: mdadm
apps:
  - mdadm
restart_on_change:
  apps:
    - mdadm
pidfile: /run/mdadm.pid
processes:
  main:
    exe: ${mdadm_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  raid:
    check:
      type: raid
      degraded:
        op: '>'
        value: 0
