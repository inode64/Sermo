kind: daemon
name: openvpn-server-%i
display_name: OpenVPN server ${instance}
category: vpn
apps:
- openvpn
service:
  systemd:
  - openvpn-server@${instance}
variables:
  config: /etc/openvpn/server/${instance}.conf
  port:
    from_file: ${config}
    directive: port
    default: 1194
config_files:
- ${config}
checks:
  service:
    type: service
    expect: active
  port:
    type: openvpn
    optional: true
    port: ${port}
