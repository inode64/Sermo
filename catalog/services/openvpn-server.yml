name: openvpn-server-%i
display_name: OpenVPN server ${instance}
category: vpn
apps:
  - openvpn
restart_on_change:
  apps:
    - openvpn
service:
  systemd:
    - openvpn-server@${instance}
variables:
  config: /etc/openvpn/server/${instance}.conf
  port:
    from_file: ${config}
    directive: port
    default: 1194
config_files:
  - ${config}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: openvpn
      optional: true
      port: ${port}
