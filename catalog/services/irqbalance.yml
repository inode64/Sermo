name: irqbalance
category: hardware
service: irqbalance
apps:
  - irqbalance
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${irqbalance_binary}
      user: root
      state: running
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
