name: irqbalance
category: hardware
service: irqbalance
apps:
  - irqbalance
restart_on_change:
  apps:
    - irqbalance
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
watches:
  service:
    check:
      type: service
      expect: active
  process:
    check:
      type: process
      exe: ${irqbalance_binary}
      user: root
      state: running
      requires:
        - service
      verify: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
