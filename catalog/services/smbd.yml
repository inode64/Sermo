kind: daemon
name: smbd
display_name: "Samba SMB"
category: storage
description: "Servidor de ficheros Windows - SMB"
service: smbd
apps: [smbd]

variables:
  port: 445
preflight:
  # `testparm -s` warns that the lock/pid dirs "do not exist" when run standalone
  # (the running smbd creates them) — whitelist that artifact so only genuine
  # warnings (e.g. deprecated options) stay optional. Local rules win (first-match).
  config:
    type: command
    command: ["${smbd_testparm}", "-s"]
    timeout: 30s
    analyze:
      use: [common]
      rules:
        - { id: dir-artifact, match: '(?i)(lock|pid) directory .* does not exist', severity: ok }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  smb: { type: smb, port: "${port}", timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
