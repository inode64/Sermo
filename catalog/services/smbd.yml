name: smbd
display_name: Samba SMB
category: storage
service: smbd
apps:
  - smbd
variables:
  port: 445
preflight:
  config:
    type: command
    command:
      - ${smbd_testparm}
      - -s
    timeout: 30s
    analyze:
      use:
        - common
      rules:
        - id: dir-artifact
          match: (?i)(lock|pid) directory .* does not exist
          severity: ok
reload:
  command:
    - ${smbd_smbcontrol}
    - smbd
    - reload-config
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
  smb:
    check:
      type: smb
      port: ${port}
      timeout: 3s
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
