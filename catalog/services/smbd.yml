kind: daemon
name: smbd
display_name: "Samba SMB"
description: "Servidor de ficheros Windows - SMB"
service: smbd
apps: [smbd]

variables:
  port: 445
preflight:
  config: { type: command, command: ["/usr/bin/testparm","-s"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  smb: { type: smb, port: "${port}", timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
