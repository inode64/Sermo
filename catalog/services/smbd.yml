name: smbd
display_name: Samba SMB
category: storage
service: smbd
apps:
  - smbd
variables:
  port: 445
preflight:
  config:
    type: command
    command:
      - ${smbd_testparm}
      - -s
    timeout: 30s
    analyze:
      use:
        - common
      rules:
        - id: dir-artifact
          match: (?i)(lock|pid) directory .* does not exist
          severity: ok
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
  smb:
    type: smb
    port: ${port}
    timeout: 3s
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
