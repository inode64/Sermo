name: monit
display_name: Monit
category: observability
description: Monit process supervision and monitoring daemon.
service:
  systemd:
    - monit
  openrc:
    - monit
apps:
  - monit
variables:
  host: 127.0.0.1
  config: /etc/monitrc
  port: 2812
preflight:
  config:
    type: command
    command:
      - ${monit_binary}
      - -t
      - -c
      - ${config}
    timeout: 30s
reload:
  command:
    - ${monit_binary}
    - reload
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
restart_on_change:
  libraries:
    - glibc
    - openssl
    - zlib
config_files:
  - ${config}
  - /etc/monit/conf.d
  - /etc/monit.d
pidfile: /run/monit.pid
processes:
  main:
    exe: ${monit_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
