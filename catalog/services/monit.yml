kind: daemon
name: monit
display_name: Monit
category: observability
description: Monit process supervision and monitoring daemon.
service:
  systemd:
  - monit
  openrc:
  - monit
apps:
- monit
variables:
  host: 127.0.0.1
  config: /etc/monitrc
  port: 2812
preflight:
  config:
    type: command
    command:
    - ${monit_binary}
    - -t
    - -c
    - ${config}
    timeout: 30s
restart_on_change:
  libraries:
  - glibc
  - openssl
  - zlib
config_files:
- ${config}
- /etc/monit/conf.d
- /etc/monit.d
pidfile: /run/monit.pid
processes:
  main:
    exe: ${monit_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
