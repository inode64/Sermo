name: monit
display_name: Monit
category: observability
description: Monit process supervision and monitoring daemon.
service:
  systemd:
    - monit
  openrc:
    - monit
apps:
  - monit
variables:
  host: 127.0.0.1
  config: /etc/monitrc
  port: 2812
preflight:
  config:
    type: command
    command:
      - ${monit_binary}
      - -t
      - -c
      - ${config}
    timeout: 30s
reload:
  command:
    - ${monit_binary}
    - reload
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
restart_on_change:
  libraries:
    - glibc
    - openssl
    - zlib
  apps:
    - monit
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
    library: >-
      ${display_name} will restart after library change: ${change.library} (${change.path})
config_files:
  - ${config}
  - /etc/monit/conf.d
  - /etc/monit.d
pidfile: /run/monit.pid
processes:
  main:
    exe: ${monit_binary}
    user: root
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      # Monit's HTTP interface (2812) is opt-in; many hosts run monit without it,
      # so a closed port must not flip an otherwise-active service to failed.
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
      optional: true
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 13886260
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
  alert-if-io-high:
    check:
      type: metric
      scope: service
      name: io
      op: '>'
      value: 901
      optional: true
    for:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} IO usage stayed above ${check.threshold} (current ${check.value})
