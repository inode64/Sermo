name: xrdp
display_name: "xrdp"
category: remote
description: "Open-source RDP server for Linux remote desktop."
service:
  systemd: [xrdp]
  openrc: [xrdp]
apps: [xrdp]

variables:
  host: 127.0.0.1
  port: 3389

pidfile: /run/xrdp.pid

watches:
  service:
    check: { type: service, expect: active }
  restart-if-rdp-failed:
    check:
      type: rdp
      host: "${host}"
      port: "${port}"
      timeout: 5s

      verify: true
    for:
      cycles: 3
    then:
      action: restart
  restart-if-port-failed:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 3s
    for:
      cycles: 3
    then:
      action: restart
