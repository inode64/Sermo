kind: daemon
name: docker
display_name: Docker Engine
category: virtualization
description: Docker Engine container runtime.
service:
  systemd:
  - docker
  openrc:
  - docker
also_service:
  systemd:
  - docker.socket
apps:
- docker
variables:
  socket: /run/docker.sock
  config: /etc/docker/daemon.json
config_files:
- ${config}
preflight:
  config:
    type: command
    # Docker's config file is optional: validate it when present, but let a host
    # without /etc/docker/daemon.json start normally.
    command:
    - sh
    - -c
    - test ! -e "$1" || exec "$0" --validate --config-file="$1"
    - ${docker_daemon}
    - ${config}
    timeout: 30s
processes:
  main:
    exe: ${docker_daemon}
    user: root
  proxy:
    exe: ${docker_proxy_binary}
    user: root
checks:
  service:
    type: service
    expect: active
  engine:
    type: docker
    socket: ${socket}
    timeout: 3s
postflight:
  engine:
    type: docker
    socket: ${socket}
    timeout: 3s
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
reload_on_change:
  paths:
  - ${config}
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
    - restart
    - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
  alert-if-fds-high:
    type: alert
    if:
      metric:
        scope: service
        name: fds
        op: '>'
        value: 50000
    then:
      action: alert
      message: ${display_name} file descriptor usage is high
    within:
      cycles: 10
      min_matches: 3
