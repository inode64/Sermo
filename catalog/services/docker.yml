name: docker
display_name: Docker Engine
category: virtualization
description: Docker Engine container runtime.
service:
  systemd:
    - docker
  openrc:
    - docker
also_service:
  systemd:
    - docker.socket
apps:
  - docker
restart_on_change:
  apps:
    - docker
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  socket: /run/docker.sock
  config: /etc/docker/daemon.json
config_files:
  - ${config}
preflight:
  config:
    type: command
    # Docker's config file is optional: validate it when present, but let a host
    # without /etc/docker/daemon.json start normally.
    command:
      - sh
      - -c
      - test ! -e "$1" || exec "$0" --validate --config-file="$1"
      - ${docker_daemon}
      - ${config}
    timeout: 30s
processes:
  main:
    exe: ${docker_daemon}
    user: root
  proxy:
    exe: ${docker_proxy_binary}
    user: root
pidfile: /run/docker.pid
reload:
  signal: HUP
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
reload_on_change:
  paths:
    - ${config}
watches:
  service:
    check:
      type: service
      expect: active
  engine:
    check:
      type: docker
      socket: ${socket}
      timeout: 3s
      verify: true
  alert-if-fds-high:
    check:
      type: metric
      scope: service
      name: fds
      op: '>'
      value: 50000
      optional: true
    within:
      cycles: 10
      min_matches: 3
    clear:
      cycles: 10
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} file descriptor usage stayed above ${check.threshold} (current ${check.value})
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 78577664
      optional: true
    for:
      duration: 4m
    clear:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
  alert-if-cpu-thread-high:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 5m
    clear:
      duration: 5m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} single-thread CPU usage stayed above ${check.threshold} (current ${check.value})
