name: dnsmasq
display_name: dnsmasq
category: network
description: dnsmasq lightweight DNS forwarder and DHCP/TFTP server.
service:
  systemd:
    - dnsmasq
  openrc:
    - dnsmasq
apps:
  - dnsmasq
variables:
  host: 127.0.0.1
  port: 53
  config: /etc/dnsmasq.conf
  query: localhost
preflight:
  config:
    type: command
    command:
      - ${dnsmasq_binary}
      - --test
      - --conf-file=${config}
    timeout: 30s
policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h
  backoff:
    initial: 15m
    max: 1h
restart_on_change:
  libraries:
    - glibc
    - systemd-libs
    - nettle
    - libidn2
  apps:
    - dnsmasq
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
    library: >-
      ${display_name} will restart after library change: ${change.library} (${change.path})
config_files:
  - ${config}
  - /etc/dnsmasq.d
watches:
  service:
    check:
      type: service
      expect: active
  dns:
    check:
      type: dns
      host: ${host}
      port: ${port}
      query: ${query}
      timeout: 3s
