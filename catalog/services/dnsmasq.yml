kind: daemon
name: dnsmasq
display_name: dnsmasq
category: network
description: dnsmasq lightweight DNS forwarder and DHCP/TFTP server.
service:
  systemd:
  - dnsmasq
  openrc:
  - dnsmasq
apps:
- dnsmasq
variables:
  host: 127.0.0.1
  port: 53
  config: /etc/dnsmasq.conf
  query: localhost
preflight:
  config:
    type: command
    command:
    - ${dnsmasq_binary}
    - --test
    - --conf-file=${config}
    timeout: 30s
restart_on_change:
  libraries:
  - glibc
  - systemd-libs
  - nettle
  - libidn2
config_files:
- ${config}
- /etc/dnsmasq.d
checks:
  service:
    type: service
    expect: active
  dns:
    type: dns
    host: ${host}
    port: ${port}
    query: ${query}
    timeout: 3s
