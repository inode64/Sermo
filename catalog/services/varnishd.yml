name: varnishd
display_name: Varnish
category: web
description: Varnish
service: varnishd
apps:
  - varnishd
variables:
  port: 6082
preflight:
  config:
    type: command
    command:
      - ${varnishd_binary}
      - -C
      - -f
      - /etc/varnish/default.vcl
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
    optional: true
  varnish:
    type: varnish
    port: ${port}
    timeout: 3s
    optional: true
watches:
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
