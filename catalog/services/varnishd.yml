kind: daemon
name: varnishd
display_name: "Varnish"
category: web
description: "Varnish"
service: varnishd
apps: [varnishd]

variables:
  port: 6082
preflight:
  config: { type: command, command: ["${varnishd_binary}","-C","-f","/etc/varnish/default.vcl"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  # The Varnish CLI TCP listener is optional in common OpenRC setups. Keep it as
  # a warning so profiles still report whether varnishadm is reachable without
  # marking an otherwise active HTTP cache as failed.
  port: { type: tcp, port: "${port}", optional: true }
  varnish: { type: varnish, port: "${port}", timeout: 3s, optional: true }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
