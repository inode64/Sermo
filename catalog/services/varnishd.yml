name: varnishd
display_name: Varnish
category: web
description: Varnish
service: varnishd
apps:
  - varnishd
variables:
  port: 6082
preflight:
  config:
    type: command
    command:
      - ${varnishd_binary}
      - -C
      - -f
      - /etc/varnish/default.vcl
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      port: ${port}
      optional: true
  varnish:
    check:
      type: varnish
      port: ${port}
      timeout: 3s
      optional: true
  restart-if-worker-thread-hot:
    check:
      type: metric
      scope: service
      name: cpu_thread
      op: '>'
      value: 90%
      optional: true
    for:
      duration: 6m
    then:
      action: restart
