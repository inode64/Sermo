kind: daemon
name: varnishd
display_name: Varnish
category: web
description: Varnish
service: varnishd
apps:
  - varnishd
variables:
  port: 6082
preflight:
  config:
    type: command
    command:
      - ${varnishd_binary}
      - -C
      - -f
      - /etc/varnish/default.vcl
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    port: ${port}
    optional: true
  varnish:
    type: varnish
    port: ${port}
    timeout: 3s
    optional: true
rules:
  restart-if-worker-thread-hot:
    type: remediation
    if:
      metric:
        scope: service
        name: cpu_thread
        op: '>'
        value: 90%
    for:
      duration: 6m
    then:
      action: restart
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
