name: lm_sensors
display_name: LM Sensors
category: hardware
description: Hardware sensor initialization service.
service:
  systemd:
    - lm_sensors
    - lm-sensors
  openrc:
    - lm_sensors
    - lm-sensors
apps:
  - lm_sensors
restart_on_change:
  apps:
    - lm_sensors
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
processes: { }
watches:
  service:
    check:
      type: service
      expect: active
  sensors:
    check:
      type: command
      command:
        - ${lm_sensors_binary}
        - -A
      timeout: 10s
      optional: true
      verify: true
