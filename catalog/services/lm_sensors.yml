kind: daemon
name: lm_sensors
display_name: LM Sensors
category: hardware
description: Hardware sensor initialization service.
service:
  systemd:
  - lm_sensors
  - lm-sensors
  openrc:
  - lm_sensors
  - lm-sensors
apps:
- lm_sensors
processes: {}
checks:
  service:
    type: service
    expect: active
  sensors:
    type: command
    command:
    - ${lm_sensors_binary}
    - -A
    timeout: 10s
    optional: true
postflight:
  sensors:
    type: command
    command:
    - ${lm_sensors_binary}
    - -A
    timeout: 10s
    optional: true
