name: openvpn-client-%i
display_name: OpenVPN client ${instance}
category: vpn
apps:
  - openvpn
restart_on_change:
  apps:
    - openvpn
service:
  systemd:
    - openvpn-client@${instance}
variables:
  config: /etc/openvpn/client/${instance}.conf
  port:
    from_file: ${config}
    directive: port
    default: 1194
config_files:
  - ${config}
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: openvpn
      optional: true
      port: ${port}
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 11390157
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
