name: alloy
display_name: Grafana Alloy
category: observability
description: Grafana Alloy telemetry collector.
service:
  systemd:
    - alloy
  openrc:
    - alloy
apps:
  - alloy
restart_on_change:
  apps:
    - alloy
  messages:
    app: >-
      ${display_name} will restart after version change of ${change.app}: ${change.old_version} -> ${change.new_version}
variables:
  host: 127.0.0.1
  port: 12345
  config: /etc/alloy/config.alloy
  stability_level: generally-available
pidfile: /run/alloy.pid
preflight:
  config:
    type: command
    command:
      - ${alloy_binary}
      - validate
      - --stability.level=${stability_level}
      - ${config}
    timeout: 30s
watches:
  service:
    check:
      type: service
      expect: active
  port:
    check:
      type: tcp
      host: ${host}
      port: ${port}
      timeout: 2s
  ready:
    check:
      type: http
      url: http://${host}:${port}/-/ready
      expect_status: 200
      timeout: 5s
  metrics:
    check:
      type: http
      url: http://${host}:${port}/metrics
      expect_status: 200
      timeout: 5s
