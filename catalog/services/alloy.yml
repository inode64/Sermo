kind: daemon
name: alloy
display_name: Grafana Alloy
category: observability
description: Grafana Alloy telemetry collector.
service:
  systemd:
    - alloy
  openrc:
    - alloy
apps:
  - alloy
variables:
  host: 127.0.0.1
  port: 12345
  config: /etc/alloy/config.alloy
  stability_level: generally-available
pidfile: /run/alloy.pid
preflight:
  config:
    type: command
    command:
      - ${alloy_binary}
      - validate
      - --stability.level=${stability_level}
      - ${config}
    timeout: 30s
checks:
  service:
    type: service
    expect: active
  port:
    type: tcp
    host: ${host}
    port: ${port}
    timeout: 2s
  ready:
    type: http
    url: http://${host}:${port}/-/ready
    expect_status: 200
    timeout: 5s
  metrics:
    type: http
    url: http://${host}:${port}/metrics
    expect_status: 200
    timeout: 5s
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks:
      - restart
      - start
    if:
      failed:
        check: config
    then:
      action: block
      message: ${display_name} configuration is invalid
