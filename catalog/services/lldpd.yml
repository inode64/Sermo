name: lldpd
display_name: LLDP Daemon
category: network
description: Link Layer Discovery Protocol
service: lldpd
apps:
  - lldpd
variables:
  user: lldpd
pidfile: /run/lldpd.pid
socket: /run/lldpd.socket
processes:
  main:
    exe: ${lldpd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
      verify: true
  process:
    check:
      type: process
      exe: ${lldpd_binary}
      user: ${user}
      state: running
      optional: true
      requires:
        - service
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 60%
      optional: true
    for:
      duration: 10m
    then:
      action: alert
      message: ${display_name} memory usage is high
