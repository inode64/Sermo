name: lldpd
display_name: LLDP Daemon
category: network
description: Link Layer Discovery Protocol
service: lldpd
apps:
  - lldpd
restart_on_change:
  apps:
    - lldpd
variables:
  user: lldpd
pidfile: /run/lldpd.pid
socket: /run/lldpd.socket
processes:
  main:
    exe: ${lldpd_binary}
    user: ${user}
watches:
  service:
    check:
      type: service
      expect: active
      verify: true
  process:
    check:
      type: process
      exe: ${lldpd_binary}
      user: ${user}
      state: running
      optional: true
      requires:
        - service
  alert-if-memory-high:
    check:
      type: metric
      scope: service
      name: memory
      op: '>'
      value: 9024717
      optional: true
    for:
      duration: 4m
    then:
      action: alert
      message: >-
        During ${rule.duration}, ${display_name} memory usage stayed above ${check.threshold} (current ${check.value})
