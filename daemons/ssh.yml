kind: daemon
name: ssh
display_name: "OpenSSH"
service:
  systemd: [sshd, ssh]
  openrc: [sshd]
variables:
  port: 22
  binary: "/usr/bin/sshd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }
  config: { type: command, command: ["${binary}","-t"], timeout: 30s }

checks:
  port: { type: tcp, port: "${port}" }
