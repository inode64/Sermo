kind: daemon
name: catalina-sh-%v
display_name: "Apache Tomcat ${version}"
service: catalina-sh
variables:
  port: 8080
  binary: "/usr/share/tomcat-${version}/bin/catalina.sh"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","version"], timeout: 10s }

checks:
  port: { type: tcp, port: "${port}" }
