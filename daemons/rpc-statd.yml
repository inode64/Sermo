kind: daemon
name: rpc-statd
display_name: "NFS Status Monitor"
description: "RPC"
service: rpc-statd
variables:
  binary: "/usr/bin/rpc.statd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  statd: { type: statd, timeout: 3s }
