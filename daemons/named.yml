kind: daemon
name: named
display_name: "BIND (named)"
service: named
variables:
  port: 53
  binary: "/usr/sbin/named"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  config: { type: command, command: ["sh","-c","/etc/init.d/named checkconfig && /etc/init.d/named checkzones"], timeout: 30s }

checks:
  port: { type: dns, port: "${port}" }
