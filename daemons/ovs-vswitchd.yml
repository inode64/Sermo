kind: daemon
name: ovs-vswitchd
display_name: "Open vSwitch"
description: "OpenVsiwtch Server"
service: ovs-vswitchd
variables:
  binary: "/usr/bin/ovs-vswitchd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  openvswitch: { type: openvswitch, socket: /var/run/openvswitch/db.sock, timeout: 3s }
