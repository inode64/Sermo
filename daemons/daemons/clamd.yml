kind: daemon
name: clamd
display_name: "ClamAV Daemon"
service: clamd
variables:
  binary: "/usr/bin/clamd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  clamd: { type: clamd, socket: /run/clamav/clamd.sock, timeout: 3s }
