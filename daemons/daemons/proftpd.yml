kind: daemon
name: proftpd
display_name: "ProFTPD"
service: proftpd
variables:
  port: 21
  binary: "/usr/bin/proftpd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }
  config: { type: command, command: ["${binary}","--configtest"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  ftp: { type: ftp, port: "${port}", timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
