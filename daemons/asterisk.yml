kind: daemon
name: asterisk
display_name: "Asterisk PBX"
service: asterisk
variables:
  port: 5038
  binary: "/usr/sbin/asterisk"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }

checks:
  port: { type: tcp, port: "${port}" }
