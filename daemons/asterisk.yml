kind: daemon
name: asterisk
display_name: "Asterisk PBX"
service: asterisk
variables:
  port: 5038
  binary: "/usr/bin/asterisk"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  asterisk: { type: asterisk, port: "${port}", timeout: 3s }
