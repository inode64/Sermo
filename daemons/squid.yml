kind: daemon
name: squid
display_name: "Squid"
service: squid
variables:
  port: 3128
  binary: "/usr/sbin/squid"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  config: { type: command, command: ["${binary}","-k","check"], timeout: 30s }

checks:
  port: { type: tcp, port: "${port}" }
