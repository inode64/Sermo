kind: daemon
name: glusterd
display_name: "GlusterFS"
description: "GlusterFS"
service: glusterd
variables:
  port: 24007
  binary: "/usr/sbin/glusterd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }

checks:
  port: { type: tcp, port: "${port}" }
