kind: daemon
name: keydb-server
display_name: "KeyDB"
service: keydb-server
variables:
  host: 127.0.0.1
  port: 6379
  binary: "/usr/bin/keydb-server"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }

checks:
  port: { type: tcp, port: "${port}" }

  # KeyDB speaks the RESP protocol, so the native redis probe verifies liveness
  # (PING) and exposes role, replication, persistence and memory in its result
  # data. The expect asserts the last background save succeeded (reported "ok"
  # even when persistence is disabled, so it never false-alarms).
  health:
    type: redis
    host: "${host}"
    port: "${port}"
    timeout: 3s
    expect:
      rdb_last_bgsave_status: ok
