kind: daemon
name: spamassassin
display_name: "SpamAssassin"
description: "Antispam"
service: spamassassin
variables:
  port: 783
  binary: "/usr/bin/spamassassin"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
  config: { type: command, command: ["${binary}","--lint"], timeout: 30s }

checks:
  service: { type: service, expect: active }
  port: { type: tcp, port: "${port}" }
  spamd: { type: spamd, port: "${port}", timeout: 3s }
rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed: { check: config }
    then:
      action: block
      message: "${display_name} configuration is invalid"
