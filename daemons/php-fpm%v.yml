kind: daemon
name: php-fpm%v
display_name: "PHP-FPM ${version}"
type: appserver

service:
  systemd: ["php-fpm", "php${version}-fpm", "php-fpm${version}"]
  openrc: ["php-fpm", "php-fpm${version}"]

variables:
  binary: /usr/bin/php-fpm${version}
  user: www-data
  host: 127.0.0.1
  port: 9000
  pidfile: /run/php/php-fpm${version}.pid
  status_path: /status

commands:
  version:
    command: ["${binary}", "--version"]

preflight:
  binary:
    type: binary
    path: "${binary}"

  config:
    type: command
    command: ["${binary}", "--test"]
    timeout: 10s

  libraries:
    type: libraries
    binary: "${binary}"
    optional: true

processes:
  pidfile:
    type: pidfile
    path: "${pidfile}"

  master:
    type: command_match
    exe: "${binary}"
    user: root

  workers:
    type: command_match
    exe: "${binary}"
    user: "${user}"

checks:
  service:
    type: service
    expect: active

  tcp:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 3s

  # FastCGI /ping liveness plus pool metrics from the status page. Requires the
  # pool to enable `ping.path = /ping` and `pm.status_path = ${status_path}`; the
  # metrics (active/idle/total processes, listen queue, slow requests, …) land in
  # the result data, assertable via expect:.
  fpm:
    type: fpm
    host: "${host}"
    port: "${port}"
    status_path: "${status_path}"
    timeout: 3s

stop_policy:
  graceful_timeout: 30s
  term_timeout: 10s
  kill_timeout: 5s
  force_kill: true
  kill_only_if:
    users: ["${user}", root]
    exe_any:
      - "${binary}"

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed:
        check: config
    then:
      action: block
      message: "${display_name} configuration is invalid"

  restart-if-tcp-failed:
    type: remediation
    if:
      failed:
        check: tcp
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart
