kind: profile
name: mysql
display_name: "MySQL"
type: database

service:
  name: mysql
  backend: auto

aliases:
  systemd:
    - mysql.service
    - mysqld.service
  openrc:
    - mysql
    - mysqld

variables:
  binary: /usr/sbin/mysqld
  clientadmin: /usr/bin/mysqladmin
  user: mysql
  host: 127.0.0.1
  port: 3306
  pidfile: /run/mysqld/mysqld.pid

commands:
  version:
    command: ["${binary}", "--version"]

preflight:
  binary:
    type: binary
    path: "${binary}"

  config:
    type: command
    command: ["${binary}", "--validate-config"]
    timeout: 15s

  libraries:
    type: libraries
    binary: "${binary}"

processes:
  pidfile:
    type: pidfile
    path: "${pidfile}"

  mysqld:
    type: command_match
    exe: "${binary}"
    user: "${user}"

checks:
  service:
    type: service
    expect: active

  tcp:
    type: tcp
    host: "${host}"
    port: "${port}"
    timeout: 3s

  ping:
    type: command
    command: ["${clientadmin}", "ping"]
    timeout: 5s

  # Category-2 external lock check: a backup represented by a foreign process is
  # detected by its exe/user. Post-MVP, a backup wrapped in `sermoctl lock` is
  # blocked by the engine automatically and needs no check or guard here.
  mariabackup:
    type: process
    exe: /usr/bin/mariabackup
    user: "${user}"
    state: running

stop_policy:
  graceful_timeout: 120s
  term_timeout: 60s
  force_kill: false
  kill_only_if:
    users: ["${user}"]
    exe_any:
      - "${binary}"

policy:
  cooldown: 15m
  max_actions: 2
  max_actions_window: 1h

rules:
  block-restart-if-config-invalid:
    type: guard
    blocks: [restart, start]
    if:
      failed:
        check: config
    then:
      action: block
      message: "MySQL configuration is invalid"

  block-restart-during-backup:
    type: guard
    blocks: [restart, stop]
    if:
      active:
        check: mariabackup
    then:
      action: block
      message: "MySQL backup is running"

  restart-if-tcp-failed:
    type: remediation
    if:
      failed:
        check: tcp
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart

  restart-if-ping-failed:
    type: remediation
    if:
      failed:
        check: ping
    for:
      cycles: 3
      mode: consecutive
    then:
      action: restart

  restart-if-memory-high:
    type: remediation
    if:
      metric:
        scope: service
        name: memory
        op: ">"
        value: 40%
    within:
      cycles: 15
      min_matches: 5
    then:
      action: restart
