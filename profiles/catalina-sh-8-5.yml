kind: profile
name: catalina-sh-8-5
description: "Tomcat 8.5"
service: { name: "catalina-sh", backend: auto }
variables:
  binary: "/usr/share/tomcat-8.5/bin/catalina.sh"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","version"], timeout: 10s }
