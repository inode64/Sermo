kind: profile
name: syslog-ng
display_name: "syslog-ng"
description: "Syslog-ng"
service: { name: "syslog-ng", backend: auto }
variables:
  binary: "/usr/sbin/syslog-ng"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
