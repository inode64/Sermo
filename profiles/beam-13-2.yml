kind: profile
name: beam-13-2
display_name: "Erlang BEAM 13.2"
description: "Beam"
service: { name: "beam", backend: auto }
variables:
  binary: "/usr/lib64/erlang/erts-13.2/bin/beam"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }
