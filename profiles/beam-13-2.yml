kind: profile
name: beam-13-2
description: "Beam"
service: { name: "beam", backend: auto }
variables:
  binary: "/usr/lib64/erlang/erts-13.2/bin/beam"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["/usr/lib64/erlang/erts-13.2/bin/beam","-V"], timeout: 10s }
