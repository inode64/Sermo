kind: profile
name: certbot
display_name: "Certbot"
description: "Generador de certificados"
service: { name: "certbot", backend: auto }
variables:
  binary: "/usr/bin/certbot"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
