kind: profile
name: php-fpm-8-1
description: "PHP 8.1"
service: { name: "php-fpm", backend: auto }
variables:
  binary: "/usr/lib64/php8.1/bin/php-fpm"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  config: { type: command, command: ["/etc/init.d/php8.1","configtest"], timeout: 30s }
