kind: profile
name: smbd
display_name: "Samba SMB"
description: "Servidor de ficheros Windows - SMB"
service: { name: "smbd" }
variables:
  binary: "/usr/sbin/smbd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
  config: { type: command, command: ["/usr/bin/testparm","-s"], timeout: 30s }
