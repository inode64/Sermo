kind: profile
name: postgres-15
display_name: "PostgreSQL 15"
description: "PostgreSQL 15.0"
service: { name: "postgres", backend: auto }
variables:
  binary: "/usr/lib64/postgresql-15/bin/postgres"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
