kind: profile
name: megacli
description: "Raid Hardware"
service: { name: "megacli", backend: auto }
variables:
  binary: "/opt/bin/megacli"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["/opt/bin/megacli","-v"], timeout: 10s }
  config: { type: command, command: ["/opt/inode64/megaclisas-status"], timeout: 30s }
