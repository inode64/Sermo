kind: profile
name: db6-0sql
display_name: "Berkeley DB 6.0"
description: "Oracle Berkeley DB"
service: { name: "db6-0sql", backend: auto }
variables:
  binary: "/usr/bin/db6.0sql"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
