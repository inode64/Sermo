kind: profile
name: irqbalance
description: "Irqbalance"
service: { name: "irqbalance", backend: auto }
variables:
  binary: "/usr/sbin/irqbalance"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["/usr/sbin/irqbalance","--version"], expect_exit: 1, timeout: 10s }
