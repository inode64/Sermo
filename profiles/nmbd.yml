kind: profile
name: nmbd
display_name: "Samba NMB"
description: "Servidor de ficheros Windows - NMB"
service: { name: "nmbd" }
variables:
  binary: "/usr/sbin/nmbd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
