kind: profile
name: catalina-sh-7-0
description: "Tomcat 7.0"
service: { name: "catalina-sh", backend: auto }
variables:
  binary: "/usr/share/tomcat-7.0/bin/catalina.sh"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","version"], timeout: 10s }
