kind: profile
name: usbhid-ups
display_name: "USB HID UPS Driver"
description: "Usbhid-ups"
service: { name: "usbhid-ups", backend: auto }
variables:
  binary: "/lib/nut/usbhid-ups"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }
