kind: profile
name: avahi-daemon
display_name: "Avahi"
description: "Zero Configuration Networking"
service: { name: "avahi-daemon", backend: auto }
variables:
  binary: "/usr/sbin/avahi-daemon"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }
