kind: profile
name: bareos-fd
display_name: "Bareos File Daemon"
description: "Backup file Server"
service: { name: "bareos-fd" }
variables:
  binary: "/usr/sbin/bareos-fd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-?"], expect_exit: 1, timeout: 10s }
  config: { type: command, command: ["${binary}","-t"], timeout: 30s }
