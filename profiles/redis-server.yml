kind: profile
name: redis-server
display_name: "Redis"
description: "Redis-server"
service: { name: "redis-server", backend: auto }
variables:
  binary: "/usr/sbin/redis-server"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
