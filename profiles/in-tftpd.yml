kind: profile
name: in.tftpd
display_name: "TFTP Server"
description: "In.tftpd"
service: in-tftpd
variables:
  port: 69
  binary: "/usr/sbin/in.tftpd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }

checks:
  port: { type: tftp, port: "${port}" }
