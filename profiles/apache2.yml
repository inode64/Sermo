kind: profile
name: apache2
description: "Apache2"
service: { name: "apache2", backend: auto }
variables:
  binary: "/usr/sbin/apache2"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["/usr/sbin/apache2","-V"], timeout: 10s }
  config: { type: command, command: ["/etc/init.d/apache2","configtest"], timeout: 30s }
