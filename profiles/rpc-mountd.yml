kind: profile
name: rpc-mountd
display_name: "NFS Mount Daemon"
description: "RPC.mountd"
service: { name: "rpc-mountd", backend: auto }
variables:
  binary: "/usr/sbin/rpc.mountd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
