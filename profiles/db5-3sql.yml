kind: profile
name: db5-3sql
display_name: "Berkeley DB 5.3"
description: "Oracle Berkeley DB"
service: { name: "db5-3sql", backend: auto }
variables:
  binary: "/usr/bin/db5.3sql"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
