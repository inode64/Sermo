kind: profile
name: postgres-12
description: "PostgreSQL 12.0"
service: { name: "postgres", backend: auto }
variables:
  binary: "/usr/lib64/postgresql-12/bin/postgres"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["/usr/lib64/postgresql-12/bin/postgres","--version"], timeout: 10s }
