kind: profile
name: beam-%v
display_name: "Erlang BEAM ${version}"
service: { name: "beam", backend: auto }
variables:
  binary: "/usr/lib64/erlang/erts-${version}/bin/beam"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }
