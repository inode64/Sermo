kind: profile
name: ruby
display_name: "Ruby"
description: "An object-oriented scripting language"
service: { name: "ruby", backend: auto }
variables:
  binary: "/usr/bin/ruby"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
