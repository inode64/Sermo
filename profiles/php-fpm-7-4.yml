kind: profile
name: php-fpm-7-4
display_name: "PHP-FPM 7.4"
description: "PHP 7.4"
service: { name: "php-fpm", backend: auto }
variables:
  binary: "/usr/lib64/php7.4/bin/php-fpm"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  config: { type: command, command: ["/etc/init.d/php7.4","configtest"], timeout: 30s }
