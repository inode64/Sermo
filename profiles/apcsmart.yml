kind: profile
name: apcsmart
display_name: "APC Smart UPS Driver"
description: "Apcsmart"
service: { name: "apcsmart", backend: auto }
variables:
  binary: "/lib/nut/apcsmart"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }
