kind: profile
name: mysql-2
description: "MySQL"
service: { name: "mysql", backend: auto }
variables:
  binary: "/usr/bin/mysql"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
  config: { type: command, command: ["/etc/init.d/mysql","checkconfig"], timeout: 30s }
