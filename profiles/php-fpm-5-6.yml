kind: profile
name: php-fpm-5-6
display_name: "PHP-FPM 5.6"
description: "PHP 5.6"
service: { name: "php-fpm", backend: auto }
variables:
  binary: "/usr/lib64/php5.6/bin/php-fpm"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  config: { type: command, command: ["/etc/init.d/php5.6","configtest"], timeout: 30s }
