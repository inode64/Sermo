kind: profile
name: postgres-16
display_name: "PostgreSQL 16"
description: "PostgreSQL 16.0"
service: { name: "postgres", backend: auto }
variables:
  binary: "/usr/lib64/postgresql-16/bin/postgres"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
