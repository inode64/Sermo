kind: profile
name: spamassassin
description: "Antispam"
service: { name: "spamassassin", backend: auto }
variables:
  binary: "/usr/bin/spamassassin"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
  config: { type: command, command: ["${binary}","--lint"], timeout: 30s }
