kind: profile
name: cups-config
display_name: "CUPS"
description: "CUPSD"
service: { name: "cups-config", backend: auto }
variables:
  binary: "/usr/bin/cups-config"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
  config: { type: command, command: ["/usr/sbin/cupsd","-t"], timeout: 30s }
