kind: profile
name: db4-8sql
display_name: "Berkeley DB 4.8"
description: "Oracle Berkeley DB"
service: { name: "db4-8sql", backend: auto }
variables:
  binary: "/usr/bin/db4.8sql"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
