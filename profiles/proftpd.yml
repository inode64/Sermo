kind: profile
name: proftpd
display_name: "ProFTPD"
service: { name: "proftpd" }
variables:
  binary: "/usr/sbin/proftpd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-V"], timeout: 10s }
  config: { type: command, command: ["${binary}","--configtest"], timeout: 30s }
