kind: profile
name: postgres-9-2
display_name: "PostgreSQL 9.2"
description: "PostgreSQL 9.2"
service: { name: "postgres", backend: auto }
variables:
  binary: "/usr/lib64/postgresql-9.2/bin/postgres"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
