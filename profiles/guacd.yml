kind: profile
name: guacd
display_name: "Apache Guacamole"
description: "Guacamole daemon"
service: guacd
variables:
  port: 4822
  binary: "/usr/sbin/guacd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }

checks:
  port: { type: tcp, port: "${port}" }
