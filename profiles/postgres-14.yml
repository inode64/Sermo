kind: profile
name: postgres-14
display_name: "PostgreSQL 14"
description: "PostgreSQL 14.0"
service: { name: "postgres", backend: auto }
variables:
  binary: "/usr/lib64/postgresql-14/bin/postgres"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
