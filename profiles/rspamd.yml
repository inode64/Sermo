kind: profile
name: rspamd
display_name: "Rspamd"
service: { name: "rspamd", backend: auto }
variables:
  binary: "/usr/bin/rspamd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
  config: { type: command, command: ["/usr/bin/rspamadm","configtest"], timeout: 30s }
