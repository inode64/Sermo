kind: profile
name: fail2ban-server
display_name: "Fail2ban"
description: "Fail2ban-server"
service: { name: "fail2ban-server", backend: auto }
variables:
  binary: "/usr/bin/fail2ban-server"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
  config: { type: command, command: ["${binary}","-t"], timeout: 30s }
