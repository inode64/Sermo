kind: profile
name: storcli
description: "Raid StorCli Hardware"
service: { name: "storcli", backend: auto }
variables:
  binary: "/usr/sbin/storcli"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["/usr/sbin/storcli","-v"], timeout: 10s }
  config: { type: command, command: ["/opt/inode64/megaclisas-status"], timeout: 30s }
