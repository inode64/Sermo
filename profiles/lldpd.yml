kind: profile
name: lldpd
display_name: "LLDP Daemon"
description: "Link Layer Discovery Protocol"
service: { name: "lldpd", backend: auto }
variables:
  binary: "/usr/sbin/lldpd"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","-v"], timeout: 10s }
