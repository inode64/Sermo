kind: profile
name: catalina-sh-8-0
description: "Tomcat 8.0"
service: { name: "catalina-sh", backend: auto }
variables:
  binary: "/usr/share/tomcat-8.0/bin/catalina.sh"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["/usr/share/tomcat-8.0/bin/catalina.sh","version"], timeout: 10s }
