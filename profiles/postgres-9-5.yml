kind: profile
name: postgres-9-5
description: "PostgreSQL 9.5"
service: { name: "postgres", backend: auto }
variables:
  binary: "/usr/lib64/postgresql-9.5/bin/postgres"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["/usr/lib64/postgresql-9.5/bin/postgres","--version"], timeout: 10s }
