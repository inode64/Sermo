kind: profile
name: mailhog-bin
display_name: "MailHog"
description: "Mailhog"
service: { name: "mailhog-bin", backend: auto }
variables:
  binary: "/usr/bin/mailhog-bin"
preflight:
  binary: { type: binary, path: "${binary}" }
  version: { type: command, command: ["${binary}","--version"], timeout: 10s }
