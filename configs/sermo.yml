# Sermo minimal configuration.
#
# Engine-wide settings are not merged into individual services; only the
# per-service parts of `defaults` (stop_policy, policy, rule_window) are.

engine:
  backend: auto
  interval: 30s
  max_parallel_checks: 8
  # How many start/stop/restart operations may run at once across workers, the
  # web UI and sermoctl. Extra attempts wait for a slot under <runtime>/op-slots.
  max_parallel_operations: 2
  default_timeout: 10s
  # Outer deadline for safe start/stop/restart (raised per service when stop_policy
  # needs longer). sermoctl and the web UI use the same limit; the web server's
  # HTTP write timeout is derived from the longest resolved service deadline.
  operation_timeout: 90s
  # Grace period before the daemon starts its first check cycle. Gives the host
  # time to finish booting so services that are still coming up are not flagged
  # or remediated prematurely. 0 (the default) disables the wait.
  startup_delay: 0

paths:
  # Packaged catalog directory — the service/app/library definitions, installed by
  # `make install`. When running from the source tree, point this elsewhere without
  # editing the file via `sermod run --catalog ./catalog` (repeatable for multiple dirs).
  catalog:
    - /usr/share/sermo/catalog
    - /etc/sermo/catalog-available
  # Relative to this file's directory (configs/).
  includes:
    # - apps
    # - storage
    # - network
  # Volatile runtime data (locks, operation markers) on tmpfs; wiped on reboot.
  runtime: /run/sermo
  # Persistent state database (monitoring state, SLA history, measurements). Lives
  # under /var/lib so it survives reboots — required for `monitor: previous`.
  state: /var/lib/sermo

defaults:
  stop_policy:
    graceful_timeout: 30s
    term_timeout: 15s
    kill_timeout: 5s
    force_kill: false

  # Required and positive: every resolved service inherits a loop-prevention
  # cooldown unless it overrides this value.
  policy:
    cooldown: 5m

  # Fallback firing window for rules that declare neither `for` nor `within`.
  # The values below equal the built-in default (fire on the first true cycle),
  # so the block is documentation; raise `cycles` (e.g. 3) to require N
  # consecutive true cycles for every window-less rule, or use `mode: within`
  # with `min_matches` for a sliding window.
  # rule_window:
  #   cycles: 1
  #   mode: consecutive    # consecutive | within (min_matches optional, default 1)

logging:
  level: info
  format: text

# Web dashboard (view services; monitor/unmonitor and start/stop/restart; per-
# service detail with checks, SLA history and events). Binds to loopback by
# default.
#
# IMPORTANT: the web UI is NOT activated unless `port` is defined.
# - If the `web:` block is omitted, or
# - If `web:` exists but `port` is missing (e.g. only `address:` is set),
# then sermod will not start the HTTP server and will log a warning
# ("web ui disabled; no port will be opened").
#
# This shipped config enables it on loopback (9797, the recommended port);
# comment out or remove `port` to disable the dashboard.
# Set `password` for admin access; `guest`/`guest_password` give read-only access.
web:
  address: 127.0.0.1
  port: 9797
  # password: "change-me"        # admin: read + actions
  # guest_password: "read-only"  # optional read-only login
  # guest: false                 # set true to allow anonymous read-only access

# Named notification targets, referenced by name from a watch's then.notify.
# Pluggable by type (email, slack and teams are built in; new transports can be
# added). Used only when referenced; enabled defaults to true.
notifiers:
  ops-email:
    type: email
    dsn: "smtp://user:pass@smtp.example.com:587"   # smtp:// (STARTTLS) or smtps:// (implicit TLS)
    from: "Sermo <sermo@example.com>"
    to: [ops@example.com, oncall@example.com]
  team-slack:
    # enabled: false  # keep configured but skip delivery attempts
    type: slack
    webhook: "https://hooks.slack.com/services/T0000/B0000/XXXXXXXX"

# Default notification targets for watches/rules that omit notify. Uncomment to
# avoid repeating then.notify everywhere. Use per-watch notify: [none] to suppress.
# notify: [ops-email]

# Per-service (or defaults) remediation mode.
# shadow: true  evaluates every remediation rule + its for/within windows +
# guards + cooldown/policy exactly as normal and emits "shadow" events with
# precise "would restart (suppressed: cooldown)" style messages, but performs
# zero operations and does not advance any live timers. Use it to audit what
# Sermo would do before flipping to active (the default).
#   remediation:
#     shadow: true
# Services in shadow mode still run all their checks and host watches normally.

# Host watches: monitor host resources (storage, …) independently of services and,
# when a threshold is crossed, run a hook command and/or notify named targets.
# Paused by default: each watch is built and visible in the web UI, but it does
# not run until an admin monitors it or the YAML changes to `monitor: enabled`.
watches:
  ping-gw:
    monitor: disabled
    interval: 30s
    check: { type: icmp, host: 8.8.8.8, count: 3 }
    metrics:
      state:
        on: change
        then:
          hook:
            command: [/usr/local/bin/sermo-host-state.sh, "8.8.8.8"]
      latency:
        threshold: { op: ">", value: 100 }
        then:
          hook:
            command: [/usr/local/bin/sermo-host-latency.sh, "8.8.8.8"]
  # Watch system load average (per-core, so the thresholds are machine-agnostic).
  load:
    monitor: disabled
    interval: 30s
    check:
      type: load
      per_cpu: true
      load5: { op: ">", value: 1.5 }
      load15: { op: ">", value: 1.0 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-load-alert.sh]
  # Watch system RAM via the kernel's MemAvailable estimate (page cache and
  # reclaimable buffers never read as "used").
  memory:
    monitor: disabled
    interval: 30s
    check:
      type: memory
      used_pct: { op: ">=", value: "90%" }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-memory-alert.sh]
  # Watch kernel PSI: % of wall time tasks stalled waiting on memory. The
  # kernel's own pressure signal — catches thrashing load/memory can miss.
  mem-pressure:
    monitor: disabled
    interval: 30s
    check:
      type: pressure
      resource: memory
      some_avg60: { op: ">", value: 10 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-pressure-alert.sh]
  # Watch system file descriptors against the kernel fs.file-max limit.
  fds:
    monitor: disabled
    interval: 30s
    check:
      type: fds
      used_pct: { op: ">=", value: 85 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-fds-alert.sh]
  # Watch the kernel PID table (threads vs kernel.pid_max). A full table makes
  # every fork()/clone() fail host-wide — where a fork loop or zombie leak ends.
  pid-table:
    monitor: disabled
    interval: 30s
    check:
      type: pids
      used_pct: { op: ">=", value: 90 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-pids-alert.sh]
  # Watch for accumulating zombie processes (a parent not reaping its children).
  zombies:
    monitor: disabled
    interval: 1m
    check:
      type: zombies
      count: { op: ">", value: 20 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-zombies-alert.sh]
  # Watch the kernel entropy pool (low entropy stalls crypto / TLS).
  entropy:
    monitor: disabled
    interval: 1m
    check:
      type: entropy
      avail: { op: "<", value: 200 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-entropy-alert.sh]
  # Watch the netfilter conntrack table (drops new connections when full).
  conntrack:
    monitor: disabled
    interval: 30s
    check:
      type: conntrack
      used_pct: { op: ">=", value: 90 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-conntrack-alert.sh]
  oom:
    monitor: disabled
    interval: 30s
    check: { type: oom }          # no delta -> fires on any kill (> 0)
    then:
      hook:
        command: [/usr/local/bin/sermo-oom-alert.sh]
  # Watch system swap: usage filling up and/or heavy paging (thrashing).
  swap:
    monitor: disabled
    interval: 30s
    check: { type: swap }
    metrics:
      usage:
        used_pct: { op: ">=", value: 80 }
        then:
          hook:
            command: [/usr/local/bin/sermo-swap-usage.sh]
      io:
        delta: { op: ">", value: 1000 }   # pages swapped in+out per cycle
        then:
          hook:
            command: [/usr/local/bin/sermo-swap-io.sh]
