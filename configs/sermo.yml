# Sermo global configuration.
#
# Engine-wide settings are not merged into individual services; only the
# per-service parts of `defaults` (stop_policy, policy, rule_window) are.

engine:
  backend: auto
  interval: 30s
  max_parallel_checks: 8
  # How many start/stop/restart operations may run at once across workers, the
  # web UI and sermoctl. Extra attempts wait for a slot under <runtime>/op-slots.
  max_parallel_operations: 2
  default_timeout: 10s
  # Outer deadline for safe start/stop/restart (raised per service when stop_policy
  # needs longer). sermoctl and the web UI use the same limit; the web server's
  # HTTP write timeout is derived from the longest resolved service deadline.
  operation_timeout: 90s
  # Grace period before the daemon starts its first check cycle. Gives the host
  # time to finish booting so services that are still coming up are not flagged
  # or remediated prematurely. 0 (the default) disables the wait.
  startup_delay: 0

paths:
  # Packaged profile directory (installed by `make install`). When running from
  # the source tree, point this elsewhere without editing the file via
  # `sermod run --profiles ./profiles` (repeatable for multiple dirs).
  profiles:
    - /usr/share/sermo/profiles
  # Relative to this file's directory (configs/).
  enabled:
    - apps-enabled
  # Volatile runtime data (locks, operation markers) on tmpfs; wiped on reboot.
  runtime: /run/sermo
  # Persistent state database (monitoring state, future history/metrics). Lives
  # under /var/lib so it survives reboots — required for `monitor: previous`.
  state: /var/lib/sermo

defaults:
  stop_policy:
    graceful_timeout: 30s
    term_timeout: 15s
    kill_timeout: 5s
    force_kill: false

  # Required and positive: every resolved service inherits a loop-prevention
  # cooldown unless it overrides this value.
  policy:
    cooldown: 5m

logging:
  level: info
  format: text

# Web dashboard (view services; monitor/unmonitor and start/stop/restart; per-
# service detail with checks, SLA history and events). Binds to loopback by
# default.
#
# IMPORTANT: the web UI is NOT activated unless `port` is defined.
# - If the `web:` block is omitted, or
# - If `web:` exists but `port` is missing (e.g. only `address:` is set),
# then sermod will not start the HTTP server and will log a warning
# ("web ui disabled; no port will be opened").
#
# Uncomment `port` (9797 recommended) to activate the web UI.
# Set `password` for admin access; `guest`/`guest_password` give read-only access.
web:
  address: 127.0.0.1
  port: 9797
  # password: "change-me"        # admin: read + actions
  # guest_password: "read-only"  # optional read-only login
  # guest: false                 # set true to allow anonymous read-only access

# Named notification targets, referenced by name from a watch's then.notify.
# Pluggable by type (email now; slack/teams/… can be added). Disabled until used.
notifiers:
  ops-email:
    type: email
    dsn: "smtp://user:pass@smtp.example.com:587"   # smtp:// (STARTTLS) or smtps:// (implicit TLS)
    from: "Sermo <sermo@example.com>"
    to: [ops@example.com, oncall@example.com]
  team-slack:
    type: slack
    webhook: "https://hooks.slack.com/services/T0000/B0000/XXXXXXXX"

# Default notification targets for watches/rules that omit notify. Uncomment to
# avoid repeating then.notify everywhere. Use per-watch notify: [none] to suppress.
# notify: [ops-email]

# Host watches: monitor host resources (disk, …) independently of services and,
# when a threshold is crossed, run a hook command and/or notify named targets.
# Disabled by default.
watches:
  disk-root:
    enabled: false
    interval: 1m
    check:
      type: disk
      path: /
      used_pct: { op: ">=", value: "90%" }
      free_bytes: { op: "<", value: 10G }       # absolute threshold, requires K/M/G/T
      inodes_used_pct: { op: ">=", value: "90%" } # also catch inode exhaustion
    for: { cycles: 3 }
    then:
      notify: [ops-email, team-slack]            # email the on-call list and post to Slack
      hook:
        command: [/usr/local/bin/sermo-alert-disk.sh, "/"]
        timeout: 10s
  net-eth0:
    enabled: false
    interval: 30s
    check: { type: net, interface: eth0 }
    metrics:
      state:
        on: change
        then:
          hook:
            command: [/usr/local/bin/sermo-net-state.sh, eth0]
      speed:
        on: change
        then:
          hook:
            command: [/usr/local/bin/sermo-net-speed.sh, eth0]
      errors:
        counters: [rx_errors, tx_errors]
        delta: { op: ">", value: 100 }
        then:
          hook:
            command: [/usr/local/bin/sermo-net-errors.sh, eth0]
  ping-gw:
    enabled: false
    interval: 30s
    check: { type: icmp, host: 8.8.8.8, count: 3 }
    metrics:
      state:
        on: change
        then:
          hook:
            command: [/usr/local/bin/sermo-host-state.sh, "8.8.8.8"]
      latency:
        threshold: { op: ">", value: 100 }
        then:
          hook:
            command: [/usr/local/bin/sermo-host-latency.sh, "8.8.8.8"]
  # Watch system load average (per-core, so the thresholds are machine-agnostic).
  load:
    enabled: false
    interval: 30s
    check:
      type: load
      per_cpu: true
      load5: { op: ">", value: 1.5 }
      load15: { op: ">", value: 1.0 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-load-alert.sh]
  # Watch system file descriptors against the kernel fs.file-max limit.
  fds:
    enabled: false
    interval: 30s
    check:
      type: fds
      used_pct: { op: ">=", value: 85 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-fds-alert.sh]
  # Disk check with mount verification: alert if /data is not mounted (or not as
  # expected) and/or its space crosses a threshold — one entry, no duplicated path.
  data-fs:
    enabled: false
    interval: 30s
    check:
      type: disk
      path: /data
      mounted: true                 # also: fstype: ext4, options: [rw], device: /dev/sdb1
      free_bytes: { op: "<", value: 20G }
    then:
      notify: [ops-email]
  # Watch for accumulating zombie processes (a parent not reaping its children).
  zombies:
    enabled: false
    interval: 1m
    check:
      type: zombies
      count: { op: ">", value: 20 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-zombies-alert.sh]
  # Watch a TLS certificate: alert before expiry, on invalid chain, or on an
  # algorithm/issuer change.
  api-cert:
    enabled: false
    interval: 1h
    check:
      type: cert
      host: api.example.com
      expires_in_days: 14
      on_algorithm_change: true
      on_issuer_change: true
    then:
      notify: [ops-email]
  # Watch the kernel entropy pool (low entropy stalls crypto / TLS).
  entropy:
    enabled: false
    interval: 1m
    check:
      type: entropy
      avail: { op: "<", value: 200 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-entropy-alert.sh]
  # Watch the netfilter conntrack table (drops new connections when full).
  conntrack:
    enabled: false
    interval: 30s
    check:
      type: conntrack
      used_pct: { op: ">=", value: 90 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-conntrack-alert.sh]
  # Watch kernel OOM kills: fire whenever the out-of-memory killer reaps a process.
  oom:
    enabled: false
    interval: 30s
    check: { type: oom }          # no delta -> fires on any kill (> 0)
    then:
      hook:
        command: [/usr/local/bin/sermo-oom-alert.sh]
  # Watch system swap: usage filling up and/or heavy paging (thrashing).
  swap:
    enabled: false
    interval: 30s
    check: { type: swap }
    metrics:
      usage:
        used_pct: { op: ">=", value: 80 }
        then:
          hook:
            command: [/usr/local/bin/sermo-swap-usage.sh]
      io:
        delta: { op: ">", value: 1000 }   # pages swapped in+out per cycle
        then:
          hook:
            command: [/usr/local/bin/sermo-swap-io.sh]
  # Watch a file or directory tree for attribute changes (size, permissions,
  # owner, deletion). Fires the hook once per change; recursive walks the subtree.
  app-data:
    enabled: false
    interval: 30s
    check:
      type: file
      path: /var/lib/myapp
      recursive: true
      size: { op: ">", value: 1048576 }   # edge-triggered; or { on: change }
      permissions: { on: change }
      owner: { on: change }
      existence: { on: delete }
    then:
      hook:
        command: [/usr/local/bin/sermo-file-change.sh]
        timeout: 10s
  # Watch processes by name: fire a hook per matching PID that has been alive at
  # least `for` and/or crosses a CPU/memory/IO threshold (edge-triggered per PID).
  hot-workers:
    enabled: false
    interval: 30s
    check:
      type: process
      name: myworker
      user: www-data
      for: 5m
      cpu: { op: ">", value: 80 }
      memory: { op: ">", value: 524288000 }
      io: { op: ">", value: 10485760 }
      gone: true                          # also fire when a tracked PID disappears
    then:
      hook:
        command: [/usr/local/bin/sermo-proc-alert.sh]
        timeout: 10s
