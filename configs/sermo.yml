# Sermo global configuration.
#
# Engine-wide settings are not merged into individual services; only the
# per-service parts of `defaults` (stop_policy, policy, rule_window) are.

engine:
  backend: auto
  interval: 30s
  max_parallel_checks: 8
  default_timeout: 10s
  # Grace period before the daemon starts its first check cycle. Gives the host
  # time to finish booting so services that are still coming up are not flagged
  # or remediated prematurely. 0 (the default) disables the wait.
  startup_delay: 0

paths:
  profiles:
    - /usr/share/sermo/profiles
    - /etc/sermo/apps-available
  enabled:
    - /etc/sermo/apps-enabled
  # Volatile runtime data (locks, operation markers) on tmpfs; wiped on reboot.
  runtime: /run/sermo
  # Persistent state database (monitoring state, future history/metrics). Lives
  # under /var/lib so it survives reboots — required for `monitor: previous`.
  state: /var/lib/sermo

defaults:
  rule_window:
    cycles: 1
    mode: consecutive

  stop_policy:
    graceful_timeout: 30s
    term_timeout: 15s
    kill_timeout: 5s
    force_kill: false

  # Required and positive: every resolved service inherits a loop-prevention
  # cooldown unless it overrides this value.
  policy:
    cooldown: 5m

logging:
  level: info
  format: text

# Host watches: monitor host resources (disk, …) independently of services and
# run a hook command when a threshold is crossed. Disabled by default.
watches:
  disk-root:
    enabled: false
    interval: 1m
    check:
      type: disk
      path: /
      used_pct: { op: ">=", value: 90 }
    for: { cycles: 3 }
    then:
      hook:
        command: [/usr/local/bin/sermo-alert-disk.sh, "/"]
        timeout: 10s
  net-eth0:
    enabled: false
    interval: 30s
    check: { type: net, interface: eth0 }
    metrics:
      state:
        on: change
        then:
          hook:
            command: [/usr/local/bin/sermo-net-state.sh, eth0]
      speed:
        on: change
        then:
          hook:
            command: [/usr/local/bin/sermo-net-speed.sh, eth0]
      errors:
        counters: [rx_errors, tx_errors]
        delta: { op: ">", value: 100 }
        then:
          hook:
            command: [/usr/local/bin/sermo-net-errors.sh, eth0]
  ping-gw:
    enabled: false
    interval: 30s
    check: { type: icmp, host: 8.8.8.8, count: 3 }
    metrics:
      state:
        on: change
        then:
          hook:
            command: [/usr/local/bin/sermo-host-state.sh, "8.8.8.8"]
      latency:
        threshold: { op: ">", value: 100 }
        then:
          hook:
            command: [/usr/local/bin/sermo-host-latency.sh, "8.8.8.8"]
  # Watch a file or directory tree for attribute changes (size, permissions,
  # owner, deletion). Fires the hook once per change; recursive walks the subtree.
  app-data:
    enabled: false
    interval: 30s
    check:
      type: file
      path: /var/lib/myapp
      recursive: true
      size: { op: ">", value: 1048576 }   # edge-triggered; or { on: change }
      permissions: { on: change }
      owner: { on: change }
      existence: { on: delete }
    then:
      hook:
        command: [/usr/local/bin/sermo-file-change.sh]
        timeout: 10s
  # Watch processes by name: fire a hook per matching PID that has been alive at
  # least `for` and/or crosses a CPU/memory/IO threshold (edge-triggered per PID).
  hot-workers:
    enabled: false
    interval: 30s
    check:
      type: process
      name: myworker
      user: www-data
      for: 5m
      cpu: { op: ">", value: 80 }
      memory: { op: ">", value: 524288000 }
      io: { op: ">", value: 10485760 }
      gone: true                          # also fire when a tracked PID disappears
    then:
      hook:
        command: [/usr/local/bin/sermo-proc-alert.sh]
        timeout: 10s
