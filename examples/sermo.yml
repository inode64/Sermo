# Sermo minimal installed configuration.
#
# Engine-wide settings are not merged into individual targets. Only the
# target-safe parts of `defaults` are: dry_run for services and watches;
# stop_policy, policy, rule_window and restart_on_change flags for services.
# For source-tree development and local validation, build with SERMO_DATADIR=$PWD
# and use examples/sermo-dev.yml; this file intentionally points at installed
# /etc/sermo and /usr/share/sermo locations.

engine:
  backend: auto
  interval: 30s
  max_parallel_checks: 8
  # How many start/stop/restart/reload/resume operations may run at once across workers, the
  # web UI and sermoctl. Extra attempts wait for a slot under <runtime>/op-slots.
  max_parallel_operations: 2
  default_timeout: 10s
  # Outer deadline for safe start/stop/restart/reload/resume (raised per service when stop_policy
  # needs longer). sermoctl and the web UI use the same limit; the web server's
  # HTTP write timeout is derived from the longest resolved service deadline.
  operation_timeout: 90s
  # Cadence for inspecting catalog apps, libraries and service artifacts.
  artifact_interval: 5m
  # Grace period before the daemon starts its first check cycle. Gives the host
  # time to finish booting so services that are still coming up are not flagged
  # or remediated prematurely. 0 (the default) disables the wait.
  startup_delay: 0
  # User/group resolution for process selectors, kill_only_if and owner display.
  # auto: with CGO builds use libc/NSS through os/user; with static CGO=0 builds
  # use native passwd/group files and fall back to `getent` for LDAP/SSSD/NIS.
  # native: os/user only. getent: prefer getent. numeric: UID/GID only.
  user_lookup: auto
  # Timeout for each getent lookup. Results are cached in-process.
  user_lookup_timeout: 250ms
  # Optional append-only JSONL export logs (omit to disable):
  # access: /var/log/sermo/access.log
  # events: /var/log/sermo/event.log
  # diagnostics: /var/log/sermo/diagnostics.log
  # diagnostics_interval: 1h

paths:
  # Directory entries are non-recursive by default. Use
  # `{ path: /some/dir, recursive: true }` for nested *.yml files.
  services:
    - /etc/sermo/services
  apps:
    - /etc/sermo/apps  # host-specific app documents
  notifiers:
    - /etc/sermo/notifiers
  watches:
    - /etc/sermo/watches  # generic host watch documents
    - /etc/sermo/networks  # network/uplink watch documents
    - /etc/sermo/storages  # storage watch documents
    - /etc/sermo/mounts  # fstab-backed storage mount watch documents
  # The shipped examples under watches/, networks/, storages/ and mounts/ use
  # `monitor: disabled` so copying them cannot immediately run hooks or send
  # notifications. After adapting thresholds, hooks and notify targets for the
  # host, set each entry to `monitor: enabled` or `monitor: previous`.

  # Volatile runtime data (locks, operation markers) on tmpfs; wiped on reboot.
  runtime: /run/sermo
  # Persistent state database (monitoring/remediation/rule-window control state,
  # latest service/watch readings, SLA history, measurements, runtime metrics).
  # Lives under /var/lib so it survives reboots — required for
  # `monitor: previous`, for the dashboard to keep last real readings, and for automatic
  # remediation not to reset its cooldown/windows after a sermod restart.
  state: /var/lib/sermo
  # Notification templates. `make install` installs default-alert.yml here.
  templates: /etc/sermo/templates

defaults:
  stop_policy:
    graceful_timeout: 30s
    term_timeout: 15s
    kill_timeout: 5s
    force_kill: false

  # Required and positive: every resolved service inherits a loop-prevention
  # cooldown unless it overrides this value.
  policy:
    cooldown: 5m

  # Optional inherited permissions for generated restart_on_change rules. Sources
  # (paths, apps, libraries) stay in each catalog service or configured service.
  # restart_on_change:
  #   config: false   # block restart_on_change.paths by default
  #   version: true   # allow restart_on_change.apps/libraries by default

  # Fallback firing window for rules that declare neither `for` nor `within`.
  # The values below equal the built-in default (fire on the first true cycle),
  # so the block is documentation; raise `cycles` (e.g. 3) or use `duration`
  # (e.g. 6m) to require a sustained condition for every window-less rule, or
  # use `mode: within` with `min_matches` for a sliding window.
  # rule_window:
  #   cycles: 1
  #   # duration: 6m       # choose cycles or duration, not both
  #   mode: consecutive    # consecutive | within (min_matches optional, default 1)

# Automatic firing/alert events and notifications emit only when something
# changes by default. Rules and watches may override this with their own
# `emission:` block; services do not have a service-wide override.
# emission:
#   events: on_change      # on_change | every_cycle
#   notify: on_change      # on_change | every_cycle

# Web dashboard (view services; monitor/unmonitor and start/stop/restart/reload/resume;
# per-service detail with checks, SLA history and events). Binds to loopback by
# default.
#
# IMPORTANT: the web UI is NOT activated unless `port` is defined.
# - If the `web:` block is omitted, or
# - If `web:` exists but `port` is missing (e.g. only `address:` is set),
# then sermod will not start the HTTP server and will log a warning
# ("web ui disabled; no port will be opened").
#
# This shipped config enables it on loopback (9797, the recommended port);
# comment out or remove `port` to disable the dashboard.
# Set `password` for admin access; `guest`/`guest_password` give read-only access.
web:
  address: 127.0.0.1
  port: 9797
  # password: "change-me"        # admin: read + actions
  # guest_password: "read-only"  # optional read-only login
  # guest: false                 # set true to allow anonymous read-only access
