name: cloudflared
uses: cloudflared

# The packaged daemon assumes the unit is named "cloudflared", the binary is
# /usr/bin/cloudflared, the process runs as user "cloudflared", and the local
# metrics endpoint answers on 127.0.0.1:60123. Override these when your
# distribution or tunnel config differs, for example:
#
# variables:
#   binary: /usr/local/bin/cloudflared
#   user: root
#   host: 127.0.0.1
#   port: 60123
