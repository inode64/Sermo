name: mysql-wal-g-backup-guard
uses: mysql

# EXAMPLE - app-linked override for WAL-G MySQL/MariaDB backups.
#
# The base mysql and mariadb catalog services already include a conservative
# `backup` process check for common backup tools. Use this shape when you also
# want WAL-G represented as an app, or when a host needs a different binary/user
# than the built-in `backup` check. For a MariaDB service, use `uses: mariadb`
# and `apps: [mariadb, wal-g-mysql]`.
# Rename this service, or copy the apps/watches/rules blocks into the concrete
# database service you already enable, before using it on a host.

apps: [mysql, wal-g-mysql]

watches:
  wal-g-mysql:
    check:
      type: process
      optional: true
      exe: "${wal_g_mysql_binary}"
      user: "${user}"
      state: running

rules:
  block-restart-during-wal-g-mysql:
    type: guard
    blocks: [restart, stop]
    if:
      active:
        check: wal-g-mysql
    then:
      action: block
      message: "${display_name} WAL-G backup is running"
