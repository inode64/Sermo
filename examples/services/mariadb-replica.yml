name: mariadb-replica
uses: mariadb

# EXAMPLE — set a read-only monitor user/password, then keep it, or delete it.
#
# `sql` checks run a query and compare its scalar result, so they encode
# deployment-specific policy (which query, which threshold, which credentials)
# and belong on an instance, not the mariadb catalog service. Point them at a read-only
# user. The password is resolved from the environment via ${env:...}.

variables:
  monitor_user: monitor
  monitor_pass: "${env:SERMO_DB_MONITOR_PASS}"

checks:
  # A replica must stay read-only; if it flips writable, replication topology is
  # broken (e.g. a stray failover). Condition-style: OK while read_only == 1.
  read-only:
    type: sql
    engine: mariadb
    host: "${host}"
    port: "${port}"
    user: "${monitor_user}"
    password: "${monitor_pass}"
    query: "SELECT @@global.read_only"
    op: "=="
    value: "1"

  # Replication lag in seconds (from a monitoring view the DBA exposes to the
  # read-only user). Alert when it falls behind.
  replication-lag:
    type: sql
    engine: mariadb
    host: "${host}"
    port: "${port}"
    user: "${monitor_user}"
    password: "${monitor_pass}"
    query: "SELECT COALESCE(MAX(seconds_behind_master), 0) FROM sys.replication_status"
    op: "<"
    value: "30"
    interval: 30s
