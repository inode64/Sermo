name: mariadb-backup-guard
uses: mariadb

# EXAMPLE - app-linked override for mariadb-backup/mariadbbackup.
#
# The base mysql and mariadb catalog daemons already include a conservative
# `backup` process check for common backup tools. Use this shape when you also
# want the backup tool represented as an app, or when a host needs a different
# binary/user than the built-in `backup` check. For a MySQL service, use
# `uses: mysql` and `apps: [mysql, mariadb-backup]`.
# Rename this service, or copy the apps/checks/rules blocks into the concrete
# database service you already enable, before using it on a host.
#
# Gradual rollout: uncomment this block to evaluate the inherited MariaDB
# remediation rules and this backup guard without executing service operations.
# Sermo will emit shadow events that show what would have happened.
#
# remediation:
#   shadow: true

apps: [mariadb, mariadb-backup]

checks:
  mariadb-backup:
    type: process
    optional: true
    exe: "${mariadb_backup_binary}"
    user: "${user}"
    state: running

rules:
  block-restart-during-mariadb-backup:
    type: guard
    blocks: [restart, stop]
    if:
      active:
        check: mariadb-backup
    then:
      action: block
      message: "${display_name} backup is running"
