name: apache-main
uses: apache

# Check this service more often than the engine default (engine.interval). The
# for/within window below counts these faster cycles.
interval: 15s

variables:
  health_path: /health

checks:
  http:
    url: "http://${host}:${port}${health_path}"
    expect_status: 200

watches:
  restart-if-http-failed:
    check:
      ref: http
    for:
      cycles: 5
    then:
      action: restart
