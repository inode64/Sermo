name: smartd-disks
uses: smartd

# EXAMPLE — list YOUR drives, then keep it, or delete it.
#
# `smart` checks are per-device (which is why they live on an instance, not the
# smartd catalog service, which cannot know the host's drives). They read `smartctl -j`
# (needs smartmontools + root) and complement smartd's own mail alerts with
# failure-prediction predicates Sermo records and graphs over time.

checks:
  ssd-health:
    type: smart
    device: /dev/nvme0
    interval: 1h  # SMART rarely changes; poll hourly, not every cycle
    reallocated: { op: ">", value: 0 }  # any reallocated sector is suspicious
    wear: { op: ">", value: 90 }  # SSD/NVMe nearly worn out
    temperature: { op: ">", value: 70 }  # drive overheating

  hdd-health:
    type: smart
    device: /dev/sda
    interval: 1h
    # No predicate: alert on the overall SMART FAILED verdict.
