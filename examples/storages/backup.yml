name: mount-backup
display_name: Backup mount
category: storage
path: /mnt/backup
monitor: disabled
interval: 30s
capacity:
  mounted: true
  used_pct: { op: ">=", value: "90%" }
  for: { cycles: 3 }
mount:
  refcount: true
  umount:
    term_timeout: 12s
    kill_timeout: 5s
    allow_sigkill: false
    allow_lazy: false
