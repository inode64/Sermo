name: incoming-files-fresh
category: files
# Alert once per path when a file has not been modified within the expected age.
interval: 5m
check:
  type: file
  paths:
    - /srv/incoming/orders.csv
    - /srv/incoming/summary.csv
  older_than: 24h
  summary: "Incoming file age ${value}; limit ${older_than}; files ${number_files}"
then:
  notify: [none]
