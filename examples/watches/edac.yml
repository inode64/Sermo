watches:
  edac:
    # ECC memory error counters via the kernel EDAC subsystem (no device, no root).
    # Portable: enable as-is on hosts with ECC RAM. Uncorrectable errors (ue) are
    # always serious; correctable errors (ce) are tolerated up to a threshold.
    monitor: disabled
    interval: 1h
    check:
      type: edac
      ue: { op: ">", value: 0 }  # any uncorrectable ECC error
      ce: { op: ">", value: 100 }  # correctable errors above a noise floor
    then:
      hook:
        command: [/usr/local/bin/sermo-edac-alert.sh]
