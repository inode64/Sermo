# Sermo — complete annotated configuration example
# =================================================
#
# Every configuration surface in one place, as YAML documents separated by
# `---`. A document's kind is determined by where its file lives, so no document
# below carries a `kind:` field; a `# location: <dir>` marker stands in for the
# directory each bundled document would occupy in a real deployment, where each
# target lives in its own file:
#
#   document 1 (global)           -> /etc/sermo/sermo.yml  (no marker)
#   # location: catalog/services  -> packaged catalog service
#   # location: catalog/apps      -> packaged catalog app
#   # location: catalog/libs      -> packaged catalog lib
#   # location: catalog/patterns  -> packaged catalog pattern set
#   # location: services          -> a service under paths.services
#   # location: watches/networks/storages/mounts -> watch documents under paths.watches
#   each notifiers.<name> entry   -> one notifier fragment under paths.notifiers
#   each watches.<name> entry     -> one inline watch in the global document
#
# This file is validated by the test suite (internal/config), so it cannot
# drift from the real schema. The shipped operational config is
# examples/sermo.yml; the field-by-field reference is docs/configuration.md,
# docs/services.md and docs/rules.md.

# ---------------------------------------------------------------------------
# 1. Global configuration (sermo.yml)
# ---------------------------------------------------------------------------

engine:
  backend: auto  # auto | systemd | openrc
  interval: 30s  # default check cycle for services and watches
  max_parallel_checks: 8  # global probe pool, all workers together
  max_parallel_operations: 2  # global start/stop/restart/reload/resume slots
  default_timeout: 10s  # per-check timeout when a check sets none
  operation_timeout: 90s  # outer deadline for safe start/stop/restart/reload/resume
  artifact_interval: 5m  # app/library/service artifact inspection cadence; a catalog entry may override interval
  startup_delay: 0  # grace before the first cycle after boot
  user_lookup: auto  # auto | native | getent | numeric
  user_lookup_timeout: 250ms  # per-getent lookup timeout; cached in-process
  state_cache_size: 64M  # SQLite page cache for the state DB (K/M/G suffix)

paths:
  # Directory entries are non-recursive unless a list item uses
  # `{ path: ..., recursive: true }`. The packaged catalog is loaded from the
  # compiled install location. Omitted services/apps fall back to sibling
  # services/ and apps/. Optional include dirs (notifiers/watches) load only
  # when listed.
  services:
    - services  # preferred for service files generated by the service wizard
  apps:
    - apps  # host-specific app files
  notifiers:
    - notifiers  # one top-level notifiers.<name> entry per file
  watches:
    - watches  # generic host watch documents
    - networks  # network/uplink watch documents
    - storages  # storage watch documents
    - mounts  # fstab-backed storage mount watch documents
  runtime: /run/sermo  # volatile: locks, op slots (tmpfs)
  state: /var/lib/sermo  # persistent: monitor state, SLA, measurements, runtime metrics
  templates: /etc/sermo/templates  # notification templates, e.g. default-alert.yml
  # Do not add /var/run paths to Sermo-owned config. Use /run directly. Linux
  # still exposes /var/run for older init metadata and packaged configs, so
  # normalize any host-reported value to the canonical /run target.
  # paths.locks is intentionally unsupported: lock dirs derive from runtime.

defaults:  # shared defaults for services and watches where applicable
  dry_run: false  # simulate automatic actions; manual operations still run
  clear_window: { duration: 5m }  # recovery hysteresis fallback for alert rules/watches without their own clear

  variables:  # global custom vars; services may override them
    owner: ops
    region: local
    helper_bin: [/usr/local/bin/sermo-helper, /usr/bin/sermo-helper]
  stop_policy:
    graceful_timeout: 30s
    term_timeout: 15s
    kill_timeout: 5s
    force_kill: false  # SIGKILL never allowed by default
  policy:
    cooldown: 5m  # required and positive: loop prevention
    max_actions: 4
    max_actions_window: 1h
    backoff: { initial: 1m, factor: 2, max: 30m }
  rule_window:  # fallback for rules without for/within
    cycles: 1  # choose cycles or duration, not both
    # duration: 6m
    mode: consecutive  # consecutive | within
    # min_matches: 1           # only meaningful with mode: within

emission:  # automatic firing/alert event and notification cadence
  events: on_change  # on_change | every_cycle
  notify: on_change  # on_change | every_cycle

# Security invariants are hard-coded. Config keys such as
# security.allow_sigkill_by_default are rejected rather than honored.

# Web dashboard. NOT activated unless `port` is defined.
web:
  address: 127.0.0.1
  port: 9797
  password: "${env:SERMO_WEB_PASSWORD:-change-me}"  # admin: read + actions
  guest_password: "${env:SERMO_GUEST_PASSWORD:-read-only}"
  guest: false  # true allows anonymous read-only access

# Named notification targets. email, slack, teams, tty and wall are built in;
# `tty` and `wall` are also available as default internal notifiers even when
# they are not listed here.
notifiers:
  ops-email:
    enabled: true
    type: email
    # template: default-alert
    dsn: "${env:SERMO_SMTP_DSN:-smtp://user:pass@smtp.example.com:587}"
    from: "Sermo <sermo@example.com>"
    to: [ops@example.com]
  team-slack:
    type: slack
    webhook: "https://hooks.slack.com/services/T0000/B0000/XXXXXXXX"
  ops-teams:
    enabled: false  # keep configured but skip delivery
    type: teams
    webhook: "https://prod-01.westeurope.logic.azure.com:443/workflows/x"
  tty:
    type: tty
    users: [root]  # optional; omit to notify every active terminal
  wall:
    type: wall  # broadcast to every active terminal

# Default targets for watches/rules that omit notify; notify: [none] suppresses
# delivery per site (a watch whose only action is [none] is monitor-only).
notify: [ops-email]

# Host watches: one entry per concern. This reference groups several examples
# only to keep the schema readable; real config stores each watch as its own
# `name:` document under any directory listed in paths.watches. Storage checks
# use the same watch document shape.
# `enabled: false` omits the watch entirely, while `monitor: disabled` builds it
# paused. `monitor: previous` restores the persisted state from paths.state.
watches:
  # -- single-shot checks as host watches -----------------------------------
  webapp-health:
    monitor: disabled
    check:
      type: http
      url: "http://127.0.0.1:8080/health"
      expect_status: 2xx
      expect_latency: { op: "<", value: 250 }
    for: { cycles: 3 }
    clear: { cycles: 3 }  # recovery hysteresis: stay firing until 3 clear cycles
    then: { notify: [ops-email] }

  http3-health:
    monitor: disabled
    check:
      type: http
      url: "https://example.com/health"
      http3: true
      expect_status: 2xx
      cert_expires_in_days: 21
      cert_verify: true
    then: { notify: [none] }

  mail-version:
    monitor: disabled
    check:
      type: smtp
      host: mail.example.com
      on_version_change: true
      expect_latency: { op: "<", value: 500 }
    then: { notify: [ops-email] }

  api-websocket:
    monitor: disabled
    check:
      type: websocket
      url: "wss://example.com/ws"
      subprotocol: "chat"
      headers: { Authorization: "Bearer ${env:API_TOKEN:-demo}" }
    then: { notify: [ops-email] }

  clock-drift:
    monitor: disabled
    interval: 5m
    check:
      type: clock
      servers:
        - time.cloudflare.com
        - pool.ntp.org
      max_offset: 2s
      max_stratum: 4
      max_root_dispersion: 250ms
      timeout: 3s
    for: { cycles: 2 }
    then:
      notify: [ops-email]
      notify_interval: 30m
      hook:
        command: [/usr/local/sbin/sermo-sync-clock.sh]
        timeout: 2m
        expect_exit: 0

  audit-log-growth:
    monitor: disabled
    check: { type: size, path: /var/log/audit/audit.log, grow_by: 500M, within: 1h }
    then: { notify: [ops-email] }

  file-count:
    monitor: disabled
    check:
      type: count
      path: /var/spool/demo
      of: file  # any | file | dir | symlink
      recursive: true
      count: { op: ">", value: 1000 }
    then: { notify: [ops-email] }

  file-count-growth:
    monitor: disabled
    check:
      type: count
      path: /var/spool/demo
      of: file
      delta: { op: ">", value: 200 }
      within: 2m
    then: { notify: [ops-email] }

  sqlite-health:
    monitor: disabled
    check: { type: sqlite, path: /var/lib/demo/demo.db, quick: true }
    then: { notify: [ops-email] }

  firewall-loaded:
    monitor: disabled
    check: { type: firewall_rules, backend: auto, min_rules: 1 }
    then: { notify: [ops-email] }

  decommissioned-check:
    enabled: false  # omitted entirely from the running config (vs monitor: disabled)
    check: { type: file, path: /var/lib/decommissioned, existence: { on: delete } }
    then: { notify: [none] }

  # -- multi-metric icmp: per-metric conditions, each with its own then -----
  ping-gw:
    monitor: disabled
    check: { type: icmp, host: 8.8.8.8, count: 3 }
    metrics:
      state:
        on: change  # or expect: up|down
        then: { notify: [ops-email] }
      latency:
        threshold: { op: ">", value: 100 }  # ms; or change: { delta: N }
        within: { cycles: 5, min_matches: 2 }
        then:
          hook:
            command: [/usr/local/bin/latency-alert.sh, "8.8.8.8"]
            timeout: 10s
            expect_exit: 0
            expect_stdout: { op: "contains", value: ok }

  # -- multi-metric net: link state, errors, speed, addresses ---------------
  uplink:
    monitor: disabled
    check: { type: net, interface: ppp0 }
    metrics:
      state: { expect: down, then: { notify: [ops-email] } }
      errors:
        delta: { op: ">", value: 100 }
        counters: [rx_errors, tx_errors]
        then: { notify: [ops-email] }
      speed: { on: change, then: { notify: [none] } }  # monitor-only metric
      address:  # renumbering -> dynamic-DNS hook
        on: change  # or expect: present|absent
        then:
          hook: { command: [/usr/local/bin/ddns-update.sh] }

  # -- default route pinned to an egress interface --------------------------
  uplink-route:
    monitor: disabled
    check: { type: route, family: ipv4, interface: ppp0 }
    then: { notify: [ops-email] }

  # -- DNS resolution through the system resolver ---------------------------
  uplink-dns:
    monitor: disabled
    check:
      type: dns
      resolvconf: true  # first /etc/resolv.conf server
      query: example.com
      expect: { rcode: NOERROR, answers: { op: ">", value: 0 } }
      timeout: 5s
    for: { cycles: 3 }
    then: { notify: [ops-email] }

  # -- host levels: one compact example per family --------------------------
  load:
    monitor: previous  # restore the persisted monitor state from paths.state
    check: { type: load, per_cpu: true, load5: { op: ">", value: 1.5 } }
    for: { cycles: 3 }
    then: { notify: [ops-email] }
  memory:
    monitor: disabled
    check: { type: memory, used_pct: { op: ">=", value: "90%" } }
    for: { cycles: 3 }
    then: { notify: [ops-email] }
  pressure:
    monitor: disabled
    check: { type: pressure, resource: memory, some_avg60: { op: ">", value: 20 } }
    then: { notify: [ops-email] }
  fds:
    monitor: disabled
    check: { type: fds, used_pct: { op: ">=", value: "80%" } }
    then: { notify: [ops-email] }
  diskio:
    monitor: disabled
    check: { type: diskio, device: nvme0n1, util_pct: { op: ">=", value: "80%" } }
    then: { notify: [ops-email] }
  pids:
    monitor: disabled
    check: { type: pids, used_pct: { op: ">=", value: "80%" } }
    then: { notify: [ops-email] }
  conntrack:
    monitor: disabled
    check: { type: conntrack, used_pct: { op: ">=", value: "80%" } }
    then: { notify: [ops-email] }
  entropy:
    monitor: disabled
    check: { type: entropy, avail: { op: "<", value: 256 } }
    then: { notify: [ops-email] }
  zombies:
    monitor: disabled
    check: { type: zombies, count: { op: ">", value: 0 } }
    then: { notify: [ops-email] }
  oom:
    monitor: disabled
    check: { type: oom, delta: { op: ">", value: 0 } }
    then: { notify: [ops-email] }

  # -- multi-metric swap: usage level + paging rate -------------------------
  swap:
    monitor: disabled
    check: { type: swap }
    metrics:
      usage:
        free_pct: { op: "<", value: 10 }
        then: { notify: [ops-email] }
      io:
        delta: { op: ">", value: 1000 }
        then: { notify: [ops-email] }

  # -- file watch: one event per changed path -------------------------------
  app-data:
    monitor: disabled
    dry_run: true  # emit dry-run events; skip hook until removed
    check:
      type: file
      path: /var/lib/myapp
      recursive: true
      include_hidden: false  # default: skip hidden descendants during recursive scans
      size: { op: ">", value: 1048576 }  # or size: { on: change }
      permissions: { on: change }
      owner: { on: change }
      existence: { on: delete }
    then:
      hook: { command: [/usr/local/bin/file-change.sh], timeout: 10s }

  # -- process watch: per-PID thresholds, edge-triggered ---------------------
  hot-workers:
    monitor: disabled
    check:
      type: process
      name: myworker
      user: www-data
      for: 5m  # PID alive at least this long
      cpu: { op: ">", value: 80 }
      memory: { op: ">", value: 524288000 }
      io: { op: ">", value: 10485760 }
      gone: true  # also fire when a PID disappears
    then:
      hook: { command: [/usr/local/bin/proc-alert.sh] }

---
# ---------------------------------------------------------------------------
# 2. catalog service — a reusable base definition (catalog)
# ---------------------------------------------------------------------------
# location: catalog/services
name: demo
aliases: [demo-server]  # alternate catalog names accepted by uses:
display_name: "Demo HTTP Server"
description: "Reference catalog service showing every service/catalog section."
category: web
type: webserver

# A catalog service name may also be a template:
#   demo-%v      -> ${version}, discovered from a linked app
#   demo%n       -> ${n}, numeric only
#   demo-%i      -> ${instance}, named init instances
service:  # scalar or per-backend map
  systemd: [demo, demo-server]
  openrc: [demo]

# A service may replace its init `service:` block with a non-init `control:`
# target — a libvirt/QEMU VM or a Docker container driven through the safe
# engine. See the demo-vm and demo-container service documents below for live
# examples.

also_service:  # auxiliary init units of this same service
  systemd: [demo.socket]
  openrc: [demo-socket]

apps: [demo-app]  # injects app preflight and exposes ${demo_app_binary}

variables:  # flat strings or first-existing path lists
  binary: ${bindir}/demo  # ${bindir} = /usr/bin, /usr/sbin, /usr/local/bin, /usr/local/sbin (first existing)
  user: demo
  group: demo
  host: 127.0.0.1
  port: 8080
  socket: /run/demo.sock
  health_path: /health
  data_dir: /var/lib/demo
  plugin_dir: /usr/lib/demo/${arch}  # ${arch} (uname -m): x86_64, aarch64, …
  os_profile: /etc/demo/profiles/${os}  # ${os} (os-release ID): debian, gentoo, …

# OS-conditional overrides: the branch for the detected os-release ID (or
# `default`) is merged in at load. Works at any depth (here it adds a variable).
os:
  debian: { variables: { libexec_dir: /usr/lib/demo } }
  gentoo: { variables: { libexec_dir: /usr/libexec/demo } }
  default: { variables: { libexec_dir: /usr/lib/demo } }

commands:  # informational or reserved names such as version
  health:
    command: ["${binary}", "--health"]
    timeout: 5s
    expect_exit: 0
  version:
    command: ["${binary}", "--version"]
    timeout: 5s
    expect_exit: 0
    expect_stdout: { op: "=~", value: "Demo [0-9.]+" }
  version_short:
    command: ["${binary}", "--version-short"]
    timeout: 5s
  status:
    command: ["${binary}", "status"]
    timeout: 5s

# pidfile auto-wires internal process-tree monitoring and a requires:[service]
# health check unless the service already declares an equivalent check. Use a
# list when a catalog service has several distro-specific pidfile candidates;
# use optional when a backend legitimately runs without a pidfile.
pidfile: { path: [/run/demo.pid, /run/demo/demo.pid], optional: true }
# For several required process roles with separate pidfiles, use `pidfiles:`
# instead of `pidfile:` and mirror each role under `processes:`:
# pidfiles:
#   workers: /run/demo-workers.pid

# socket auto-wires a requires:[service] health check. It may reference a
# variable and may be optional for socket-activated or distro-specific services.
socket: { path: "${socket}", optional: true }
# lockfile is the same idea for a regular lock artifact created by the service;
# it is not a Sermo operation lock and does not block actions by itself.
lockfile: { path: /run/lock/demo.lock, optional: true }

config_files: [/etc/demo/demo.conf, /etc/demo/conf.d]

preflight:  # gate start/restart/reload/resume
  binary: { type: binary, path: "${binary}" }
  config:
    type: command
    user: "${user}"
    command: ["${binary}", "--test-config"]
    timeout: 10s
    expect_exit: 0
    skip_when_changed: /etc/demo/demo.conf
  libraries:
    type: libraries
    binary: "${binary}"
    optional: true  # best-effort: warns, never blocks

processes:  # discovery selectors (used by metrics/reaper)
  workers:
    exe: "${binary}"  # exact resolved /proc/<pid>/exe
    user: "${user}"
    group: "${group}"
  java-worker:
    cmd: "java .*demo-worker"  # Go/RE2 regex over cmdline
    user: "${user}"

reload:  # native reload: signal OR command, not both
  command: ["${binary}", "reload"]
  when: auto  # auto | always
  # signal: HUP

restart_on_change:  # desugars to remediation restart rules
  config: true
  version: true
  paths: [/etc/demo/demo.conf]
  libraries: [demo-lib]
  apps:
    demo-app:
      level: minor

reload_on_change:  # desugars to remediation reload rules
  paths: [/etc/demo/demo.conf, /etc/demo/conf.d]

version:
  on_change: { notify: [ops-email] }  # reuses commands.version
config:
  on_change: { notify: [ops-email] }  # reuses preflight.config/config_files

# Per-service watches: no `then` means a normal service check (desugared to
# checks.<name> for health/SLA/verify); a compact then.action desugars to
# checks:+rules:; hook/notification entries stay scoped to THIS service.
# process_count counts only the service PID tree; metric reads that tree from a
# dedicated collector. Runtime watch entries are reported as "demo:<name>" and
# pausable via `sermoctl watch unmonitor`.
watches:
  # Check-level common fields: enabled, optional, interval, timeout, requires and
  # skip_when_changed. Disable inherited entries with enabled:false; delete:true
  # removes an inherited map entry during merge.
  service:
    check: { type: service, expect: active }
  tcp:
    check:
      type: tcp
      host: "${host}"
      port: "${port}"
      timeout: 3s
      interface: [eth0, 192.168.1.10]  # bind the probe to an egress NIC: name | IP | MAC
      interface_match: any  # any | all (shared by tcp/http/ports/icmp)
  ports:
    check:
      type: ports
      host: "${host}"
      ports: "80,443,8000-8010"
      expect: open  # open | closed | any
      match: any  # any | all | none
      connect_timeout: 500ms
      on_change: true
  http:
    check:
      type: http
      verify: true  # also run after start/restart/reload/resume to confirm health (replaces the old postflight: section)
      url: "http://${host}:${port}${health_path}"
      proxy: "http://127.0.0.1:3128"  # route the probe via http/https/socks5/socks5h proxy
      body: "ping"  # raw request body (string; alternative to json:)
      expect_status: 2xx
      expect_body: { op: "=~", value: "ok|ready" }
      expect_latency: { op: "<", value: 250 }
      timeout: 5s
  http-json:
    check:
      type: http
      method: POST
      url: "http://${host}:${port}/api/health"
      headers: { X-Token: demo }
      json: { probe: true }
      expect_status: { op: "==", value: 200 }
      expect_json:
        status: ok
        uptime: { op: ">", value: 0 }
  http-cert:
    check:
      type: http
      url: "https://example.com/health"
      expect_status: 2xx
      cert_expires_in_days: 21
      cert_verify: true
      cert_on_change: true
      cert_on_issuer_change: true
      cert_on_algorithm_change: true
  command-output:
    check:
      type: command
      command: ["${binary}", "doctor"]
      timeout: 20s
      expect_exit: 0
      expect_stdout: { op: "contains", value: ok }
      expect_stderr: ""
      on_change: false
      analyze:
        use: [demo-patterns]
        silence: [degraded]
        rules:
          - { id: benign, match: '(?i)known benign warning', severity: ok, stream: both }
  file-present:
    check: { type: file_exists, path: /etc/demo/demo.conf }
  binary:
    check: { type: binary, path: "${binary}" }
  lockfile-probe:
    check: { type: lockfile, path: /run/lock/demo.lock, requires: [service] }
  pidfile-probe:
    check: { type: pidfile, path: /run/demo.pid, requires: [service] }
  process:
    check: { type: process, exe: "${binary}", user: "${user}", state: running }
  service-memory:
    check:
      type: metric
      scope: service
      name: memory  # service: memory/swap/cpu/cpu_thread/process_count/io/io_read/io_write/fds/threads
      op: ">"
      value: 40%
  system-load:
    check:
      type: metric
      scope: system  # system metrics may only drive alert rules
      name: load5  # system: total_memory/total_cpu/load1/load5/load15
      op: ">"
      value: 4
      optional: true
  libraries:
    check: { type: libraries, binary: "${binary}", optional: true }
  count:
    check:
      type: count
      path: /var/spool/demo
      of: any  # any | file | dir | symlink
      recursive: true
      count: { op: ">", value: 1000 }
  storage:
    check:
      type: storage
      path: "${data_dir}"
      mounted: true
      free_pct: { op: "<", value: "10%" }
      inodes_free: { op: "<", value: 1000 }
  storage-bytes:
    check:
      type: storage
      path: /var/log
      used_bytes: { op: ">", value: 10G }
  autofs:
    check:
      type: autofs
      count: { op: ">=", value: 1 }
      optional: true
  load:
    check: { type: load, per_cpu: true, load1: { op: ">", value: 2 } }
  hdparm:
    check: { type: hdparm, device: /dev/sda, read: { op: "<", value: 100 }, cached: { op: "<", value: 5000 } }
  sensors:
    check:
      type: sensors
      chip: coretemp
      label: Package
      temp: { op: ">", value: 80 }
      fan: { op: "<", value: 500 }  # RPM
      voltage: { op: "<", value: 11.4 }  # volts
  smart:
    check:
      type: smart
      device: /dev/sda
      temperature: { op: ">", value: 50 }
      reallocated: { op: ">", value: 0 }  # reallocated sectors
      wear: { op: ">", value: 90 }  # SSD wear-level %
      power_on_hours: { op: ">", value: 50000 }
  raid:
    check:
      type: raid
      degraded: { op: ">", value: 0 }
      recovering: { op: ">", value: 0 }
      arrays: { op: "<", value: 1 }
  edac:
    check: { type: edac, ue: { op: ">", value: 0 }, ce: { op: ">", value: 100 } }
  config-watch:
    check:
      type: config
      user: "${user}"
      command: ["${binary}", "--test-config"]
      path: [/etc/demo/demo.conf, /etc/demo/conf.d]
      on_change: true
  fds:
    check: { type: fds, used_pct: { op: ">", value: "80%" } }
  memory:
    check: { type: memory, available_pct: { op: "<", value: "10%" } }
  pressure:
    check: { type: pressure, resource: io, some_avg60: { op: ">", value: 20 } }
  pids:
    check: { type: pids, used_pct: { op: ">", value: "80%" } }
  diskio:
    check: { type: diskio, device: nvme0n1, util_pct: { op: ">", value: "80%" } }
  conntrack:
    check: { type: conntrack, used_pct: { op: ">", value: "80%" } }
  entropy:
    check: { type: entropy, avail: { op: "<", value: 256 } }
  zombies:
    check: { type: zombies, count: { op: ">", value: 0 } }
  oom:
    check: { type: oom, delta: { op: ">", value: 0 } }
  cert-file:
    check:
      type: cert
      path: /etc/ssl/certs/demo.pem
      expires_in_days: 21
      on_change: true
  cert-host:
    check:
      type: cert
      host: example.com
      port: 443
      server_name: example.com
      cert_verify: true  # false skips chain verification (self-signed certs)
      on_algorithm_change: true
      on_issuer_change: true
  sqlite:
    check: { type: sqlite, path: /var/lib/demo/demo.db, quick: true }
  sqlite3:
    check: { type: sqlite3, path: /var/lib/demo/demo.db }
  sql-sqlite:
    check:
      type: sql
      engine: sqlite
      path: /var/lib/demo/demo.db
      query: "select count(*) from sqlite_master"
      op: ">="
      value: 0
  sql-mysql:
    check:
      type: sql
      engine: mysql  # mysql|mariadb|postgres|postgresql|sqlite|sqlite3
      host: 127.0.0.1
      port: 3306
      user: monitor
      password: "${env:DEMO_DB_PASSWORD:-secret}"
      database: demo
      tls: false
      query: "select 1"
      op: "=="
      value: 1
  mongo-command:
    check:
      type: mongodb-query
      host: 127.0.0.1
      database: admin
      command: '{ "ping": 1 }'
      result: ok
      op: "=="
      value: 1
  mongo-count:
    check:
      type: mongodb-query
      host: 127.0.0.1
      database: demo
      collection: jobs
      filter: '{ "state": "queued" }'
      op: "<"
      value: 1000
  mongo-aggregate:
    check:
      type: mongodb-query
      host: 127.0.0.1
      database: demo
      collection: jobs
      pipeline: '[{ "$group":{ "_id":null, "n":{ "$sum":1 } } }]'
      result: "0.n"
      op: "<"
      value: 1000
  influxql:
    check:
      type: influxdb-query
      host: 127.0.0.1
      database: demo
      query: "select last(value) from health"
      op: "=="
      value: 1
  flux:
    check:
      type: influxdb-query
      host: 127.0.0.1
      language: flux
      org: demo
      token: "${env:INFLUX_TOKEN:-token}"
      query: 'from(bucket:"demo") |> range(start:-5m) |> count()'
      op: ">="
      value: 0
  size:
    check: { type: size, path: /var/log/demo/demo.log, grow_by: 500M, within: 1h }
  websocket:
    check:
      type: websocket
      url: "ws://127.0.0.1:8080/ws"
      origin: "https://example.com"
      subprotocol: "chat"
      headers: { X-Probe: sermo }
  net-state:
    check: { type: net, interface: eth0, metric: state, expect: up }
  net-speed:
    check: { type: net, interface: eth0, metric: speed, on: change }
  net-errors:
    check:
      type: net
      interface: eth0
      metric: errors
      delta: { op: ">", value: 100 }
      counters: [rx_errors, tx_errors]
  net-address:
    check: { type: net, interface: eth0, metric: address, on: change }
  icmp-state:
    check: { type: icmp, host: 1.1.1.1, count: 3, metric: state, expect: up }
  icmp-latency:
    check:
      type: icmp
      host: 1.1.1.1
      metric: latency
      threshold: { op: "<", value: 100 }
  swap-usage:
    check: { type: swap, metric: usage, used_pct: { op: ">", value: 80 } }
  swap-io:
    check: { type: swap, metric: io, delta: { op: ">", value: 1000 } }
  route:
    check: { type: route, family: ipv4, interface: eth0 }
  firewall:
    check: { type: firewall_rules, backend: auto, min_rules: 1 }
  mysql:
    check:
      type: mysql
      host: 127.0.0.1
      port: 3306
      user: monitor
      password: "${env:DEMO_DB_PASSWORD:-secret}"
      database: demo
      tls: false
      expect: { version: { op: "=~", value: "^[0-9]" } }
      expect_latency: { op: "<", value: 50 }
      on_version_change: true
  redis:
    check:
      type: redis
      host: 127.0.0.1
      password: "${env:REDIS_PASS:-}"
      on_version_change: true
  docker:
    check:
      type: docker
      socket: /run/docker.sock
      container: demo
      on_change: true
  dns:
    check:
      type: dns
      host: 1.1.1.1
      query: example.com
      expect: { rcode: NOERROR, answers: { op: ">", value: 0 } }
      # Other registered connection-protocol check types:
      # acpid, ajp, amqp/rabbitmq, asterisk/ami, avahi, ceph/ceph-mon, clamd/clamav,
      # cloudflared/cloudflare-tunnel, dbus, dhclient/dhcp-client, dhcp, docker,
      # fail2ban, fpm/php-fpm, ftp, glusterfs/glusterd/gluster, guacd/guacamole,
      # imap, influxdb/influx, ipp/cups, kafka, ldap, libvirt/libvirtd, lvmpolld,
      # memcached/memcache, mongodb/mongo, mountd/rpc.mountd/nfs-mountd, mqtt,
      # nebula/nebula-vpn, nfs/nfs-server/nfsd, nntp/nntps, ntp, nut/ups/upsd,
      # openvpn/ovpn, openvswitch/ovs/ovsdb/ovsdb-server, pop/pop3, postgres/postgresql,
      # prometheus/prom, rdp/ms-wbt-server, redis/valkey, rpcbind/portmap/portmapper,
      # rsync/rsyncd, rspamd, sieve/managesieve, smb/samba/cifs, smtp, snmp,
      # spamd/spamassassin, ssh, statd/rpc.statd/nsm/nfs-statd, syncthing, tftp,
      # unifi/unifi-controller/unifi-network, varnish/varnishadm.

  worker-runaway:
    check: { type: process_count, count: { op: ">", value: 40 } }
    for: { cycles: 5 }
    then: { notify: [ops-email] }
  thread-hot:
    interval: 30s
    check: { type: metric, scope: service, name: cpu_thread, op: ">", value: "90%" }
    for: { duration: 6m }
    then: { notify: [ops-email] }
  # A watch may instead carry a `then.action` (restart/start/stop/reload/resume,
  # block, alert), folding a check + its remediation/guard/alert into one entry
  # that desugars to checks:+rules: (the safe operation-engine path). The check is
  # embedded; use explicit checks:+rules: when a remediation must reuse a shared
  # check without a second probe.
  restart-if-tcp-down:
    check: { type: tcp, host: "${host}", port: "${port}", timeout: 3s }
    for: { cycles: 3 }
    then: { action: restart }

stop_policy:
  graceful_timeout: 30s
  term_timeout: 10s
  kill_timeout: 5s
  force_kill: true  # requires the restrictive selector below
  kill_only_if:
    users: ["${user}", root]
    exe_any: ["${binary}"]
  pidfile_absent: true
  files_absent: [/run/demo/*.sock, /run/demo/*.lock]
  clean_after_stop: false  # true enables deletion after a clean stop
  clean_on_stop:
    - /run/demo/tmpfile
    - /run/demo/*.tmp
    - { path: /var/cache/demo/runtime, recursive: true, }

policy:  # overrides defaults.policy for this catalog service
  cooldown: 10m
  max_actions: 5
  max_actions_window: 1h
  backoff: { initial: 1m, factor: 2, max: 30m }

dry_run: true  # observe automatic remediation without executing operations

rule_window:
  cycles: 3
  mode: within
  min_matches: 2

rules:
  block-if-config-invalid:
    type: guard
    blocks: [restart, start, reload]
    if: { failed: { check: config } }
    then: { action: block, message: "demo config is invalid" }
  restart-if-http-failed:
    type: remediation
    emission: { events: on_change, notify: on_change }
    if:
      and:
        - failed: { check: http }
        - not: { service: { state: inactive } }
    for: { duration: 6m }  # consecutive wall-clock time; cycles: 3 is also valid
    then:
      actions:
        - { type: alert, message: "demo HTTP health failed" }
        - { type: restart }
  reload-if-inline-tcp-active:
    type: remediation
    if:
      active:
        tcp: { host: "${host}", port: "${port}" }
    within: { cycles: 5, min_matches: 2 }
    then: { action: reload }
  stop-if-process-gone:
    type: remediation
    if: { process: { exe: "${binary}", user: "${user}", state: absent } }
    then: { action: stop }
  alert-host-pressure:
    type: alert  # system metrics may only alert
    notify: [team-slack]
    if: { metric: { scope: system, name: total_memory, op: ">", value: 90% } }
    clear: { duration: 4m }  # recovery hysteresis: one episode per sustained incident
    then: { action: alert, message: "host memory high" }
  alert-file-missing:
    type: alert
    if:
      or:
        - file: { path: /etc/demo/demo.conf, exists: false }
        - command: { command: ["${binary}", "status"], timeout: 5s }
    then: { action: alert, message: "demo config/status needs attention" }
  restart-if-library-changed:
    type: remediation
    if: { changed: { library: demo-lib } }  # library resolves to its binary path
    then: { action: restart }
  reload-on-secret-change:
    type: remediation
    if: { changed: { path: /etc/demo/secrets.env } }  # direct path form (library: desugars to this)
    then: { action: reload }
  resume-after-maintenance:
    type: remediation
    if: { file: { path: /run/demo/maintenance.flag, exists: false } }
    then: { action: resume }  # un-pause a service the engine paused

---
# ---------------------------------------------------------------------------
# 3. app — a tool/runtime with binary and version preflight (catalog)
# ---------------------------------------------------------------------------
# location: catalog/apps
name: demo-app
display_name: "Demo Server"
description: "Runtime/tool dependency injected into services that list apps: [demo-app]."
category: app
variables:
  binary: /usr/bin/demo
preflight:
  binary: { type: binary, path: "${binary}" }
  health: { type: command, command: ["${binary}", "--help"], timeout: 10s, expect_exit: 0 }
  version: { type: command, command: ["${binary}", "--version"], timeout: 10s }
  api:
    type: command
    command: ["${binary}", "api-version"]
    optional: true
    export:
      api: { regex: "API ([0-9]+)", default: "" }
commands:
  version_short: { command: ["${binary}", "--version-short"], timeout: 10s }

---
# location: catalog/apps
name: demo-helper
display_name: "Demo Helper"
description: "Sibling binary from the same package; it reuses demo-app's version probe."
category: app
variables:
  binary: /usr/bin/demo-helper
preflight:
  binary: { type: binary, path: "${binary}" }
version_from: demo-app

---
# ---------------------------------------------------------------------------
# 4. lib — a shared library tracked for restart_on_change (catalog)
# ---------------------------------------------------------------------------
# location: catalog/libs
name: demo-lib
display_name: "Demo Library"
description: "Shared object whose file changes can restart linked services."
category: library
variables:
  binary: /usr/lib/libdemo.so.1
preflight:
  file: { type: file, path: "${binary}" }
  version: { type: command, command: ["/usr/bin/strings", "${binary}"], timeout: 10s, optional: true }

---
# ---------------------------------------------------------------------------
# 5. patterns — output-analysis rule set for command checks (catalog)
# ---------------------------------------------------------------------------
# location: catalog/patterns
name: demo-patterns
display_name: "Demo output signals"
description: "Reusable line classifiers for command checks."
rules:
  - { id: corrupt, match: '(?i)corruption detected', severity: error, stream: both }
  - { id: degraded, match: '(?i)\bdegraded\b', severity: warning, stream: stdout, }

---
# ---------------------------------------------------------------------------
# 6. service — a concrete monitored instance (paths.services)
# ---------------------------------------------------------------------------
# location: services
name: demo-main
aliases: [demo-primary]  # alternate names accepted by sermoctl commands
uses: demo  # inherit the catalog service, then override below
interval: 15s  # check more often than engine.interval
monitor: previous  # enabled | disabled | previous
enabled: true  # false keeps it configured but no worker is built
also_apply: [demo-sidecar]  # cascade start/stop/restart to other services

service: demo-main  # scalar unit override

variables:
  health_path: /status  # changes every ${health_path} use at once
  port: 8080

version:
  on_change: { notify: [none] }
config:
  on_change: { notify: [ops-email] }

watches:
  cert-host: { enabled: false }  # disable one inherited check
  redis: { delete: true }  # remove one inherited map entry during merge
  http:
    check:
      expect_status: [200, 204]  # override one field of an inherited check

rules:
  restart-if-http-failed:  # override one inherited rule field
    for: { duration: 10m }
  stop-if-process-gone: { enabled: false }  # disable an inherited rule

---
# ---------------------------------------------------------------------------
# 7. service — target used by also_apply
# ---------------------------------------------------------------------------
# location: services
name: demo-sidecar
uses: demo
service: demo-sidecar
monitor: disabled
variables:
  port: 8082
  health_path: /sidecar-health
watches:
  http:
    check:
      url: "http://${host}:${port}${health_path}"

---
# ---------------------------------------------------------------------------
# 8. service clone — copy another service pre-expansion and tweak it
# ---------------------------------------------------------------------------
# location: services
name: demo-second
clone: demo-main  # copies demo-main BEFORE variable expansion...
service: demo-second
also_apply: [demo-sidecar]
variables:
  port: 8081  # ...so this override reaches every ${port}

---
# ---------------------------------------------------------------------------
# 9. service with control: libvirt — a VM driven through the safe engine
# ---------------------------------------------------------------------------
# location: services
name: demo-vm
display_name: "Demo VM"
description: "VM target controlled through libvirt instead of an init unit."
control:
  type: libvirt
  uri: qemu:///system
  domain: demo-vm
  socket: /run/libvirt/virtqemud-sock  # modular libvirt/QEMU daemon socket
  # uuid: 2b3f3d26-bb45-4b25-b65a-1e3ef86fc1a4

---
# ---------------------------------------------------------------------------
# 10. service with control: docker — a container driven through the engine
# ---------------------------------------------------------------------------
# location: services
name: demo-container
display_name: "Demo container"
description: "Container target controlled through the Docker API instead of an init unit."
control:
  type: docker
  container: demo
  socket: /run/docker.sock
  tls: false  # true | false | required | skip-verify

---
# ---------------------------------------------------------------------------
# 11. mount watch — storage check with fstab-backed mount operations
# ---------------------------------------------------------------------------
# location: mounts
name: mount-backup
display_name: Backup mount
category: storage
monitor: previous
interval: 30s
variables:  # mount-scoped custom variables
  owner: backup
check:
  type: storage
  path: /mnt/backup  # must exist in /etc/fstab; no source/fstype/options here
  mounted: true
  used_pct: { op: ">=", value: "90%" }
for: { cycles: 3 }
then:
  notify: [ops-email]
mount:
  refcount: true  # default: only unmount when all Sermo users released it
  umount:
    term_timeout: 12s  # wait after SIGTERM when signalling is enabled
    kill_timeout: 5s  # wait after SIGKILL when signalling is enabled
  stop_policy:
    kill_only_if:  # restrict which processes a SIGKILL may target
      users: [root]
      exe_any: [/usr/bin/rsync]

---
# ---------------------------------------------------------------------------
# 12. storage watch — capacity monitor with auto-expand (LVM)
# ---------------------------------------------------------------------------
# location: storages
name: data-space
display_name: Data volume
category: storage
monitor: disabled
interval: 1m
emission: { events: on_change, notify: on_change }
check:
  type: storage
  path: /var/lib/data
  mounted: true
  free_pct: { op: "<", value: "10%" }  # *_bytes need a K/M/G/T suffix
for: { cycles: 3 }  # debounce: N consecutive cycles
then:
  notify: [team-slack]
  notify_interval: 2h  # re-send a reminder while it stays firing
  expand: { by: 5G }  # grow by up to 5G, capped to VG free
policy:  # pace the expand action (full policy extras)
  cooldown: 30m
  max_actions: 3
  max_actions_window: 24h
  backoff: { initial: 1h, factor: 2, max: 12h }
