---
extends: default

rules:
  document-start: disable
  line-length:
    max: 220
    allow-non-breakable-inline-mappings: true
  truthy:
    check-keys: false
  comments-indentation: disable
  comments:
    min-spaces-from-content: 2
  braces:
    min-spaces-inside: 1
    max-spaces-inside: 1
  commas:
    max-spaces-before: 0
    min-spaces-after: 1
  indentation:
    spaces: 2
    indent-sequences: consistent
