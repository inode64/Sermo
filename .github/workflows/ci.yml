name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make build
      - run: make vet
      - run: make fmt-check
      - run: make test

  lint:
    name: static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install analyzers
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/mgechev/revive@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: staticcheck ./...
      - run: revive -config revive.toml ./...
      - run: govulncheck ./...
      # gosec runs through golangci-lint (see .golangci.yml). Pinned to a v1
      # release for config compatibility; bump it when moving to a newer Go.
      - name: gosec (via golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
