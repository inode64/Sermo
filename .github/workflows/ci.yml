name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: build & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install analyzers
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          go install github.com/mgechev/revive@v1.15.0
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          go install github.com/google/yamlfmt/cmd/yamlfmt@v0.17.0
          npm ci
          pip install yamllint ruff
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Install browser test runtime
        run: npx playwright install --with-deps chromium
      - run: make build
      - run: make check
      # Advisory: unreachable-function report. Reflection and build tags cause
      # false positives, so this never fails the build — triage by hand.
      - name: deadcode (advisory)
        continue-on-error: true
        run: |
          go install golang.org/x/tools/cmd/deadcode@v0.48.0
          deadcode -test ./...
