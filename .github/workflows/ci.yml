name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make build
      - run: make vet
      - run: make fmt-check
      - run: make test

  lint:
    name: static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install analyzers
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/mgechev/revive@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: staticcheck ./...
      - run: revive -config revive.toml ./...
      - run: govulncheck ./...
      # gosec runs through golangci-lint (see .golangci.yml). Uses golangci-lint
      # v2: the official v1 release binaries are built with Go 1.24 and refuse a
      # config whose targeted Go (from go.mod) is newer, so v1 cannot lint this
      # module. The action's v8 line installs v2 (matching the v2 .golangci.yml).
      - name: gosec (via golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
