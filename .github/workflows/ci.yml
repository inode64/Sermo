name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install analyzers
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/mgechev/revive@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/google/yamlfmt/cmd/yamlfmt@v0.17.0
          pip install yamllint
      - run: make build
      - run: make check

  lint:
    name: static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install analyzers
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/mgechev/revive@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make fmt-check
      - run: staticcheck ./...
      - run: revive -config revive.toml ./...
      - run: govulncheck ./...
      # gosec and focused bug analyzers run through golangci-lint v2 (see
      # .golangci.yml, version: "2").
      # install-mode: goinstall builds golangci-lint from source with the Go
      # toolchain selected above, so the lint never breaks when go.mod targets a
      # Go newer than the prebuilt release binaries. v2's stricter gosec findings
      # (G101/G602/G703/G118) are triaged: test-fixture rules live in
      # .golangci.yml, by-design sites carry inline //nolint:gosec justifications.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-mode: goinstall
