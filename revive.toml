# revive configuration for Sermo.
#
# This mirrors revive's default rule set. `unused-parameter` is enabled for
# production code but excluded from tests (`TEST` = **/*_test.go): fakes and
# table-driven helpers often implement interfaces with ignored ctx/parameters;
# production implementations should rename unused params to `_`.

[rule.blank-imports]
[rule.context-as-argument]
[rule.context-keys-type]
[rule.dot-imports]
[rule.empty-block]
[rule.error-naming]
[rule.error-return]
[rule.error-strings]
[rule.errorf]
[rule.exported]
[rule.if-return]
[rule.increment-decrement]
[rule.indent-error-flow]
[rule.package-comments]
[rule.range]
[rule.receiver-naming]
[rule.redefines-builtin-id]
[rule.superfluous-else]
[rule.time-naming]
[rule.unexported-return]
[rule.unreachable-code]
[rule.var-declaration]
[rule.var-naming]
[rule.unused-parameter]
exclude = ["TEST"]
[rule.struct-tag]
[rule.import-shadowing]
exclude = ["TEST"]
[rule.modifies-value-receiver]
