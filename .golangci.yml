# golangci-lint v2 configuration for Sermo.
#
# Its purpose is to run gosec plus a small set of focused bug analyzers that are
# not covered by the standalone tools. The other standards are covered by
# dedicated tools (gofmt, staticcheck, revive via revive.toml, govulncheck).
#
# Run with:  golangci-lint run        (requires golangci-lint v2)
version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - asasalint  # []any accidentally passed to a variadic any
    - asciicheck  # non-ASCII identifiers
    - bidichk  # dangerous bidi unicode in source
    - bodyclose
    - contextcheck  # context must flow into blocking I/O (not net/http dial — see noctx)
    - copyloopvar
    - dupword  # duplicated words (typos); off in *_test.go (protocol/script fixtures)
    - durationcheck  # suspicious time.Duration multiplications
    - errcheck  # unchecked errors (defer Rollback/Release, I/O, …)
    - errchkjson  # json.Marshal/Encode error dropped while the value can fail to encode
    - errname  # sentinel Err* and *Error type naming
    - errorlint  # error wrapping (%w) and errors.Is/As correctness
    - exhaustive  # enum switches missing cases (check/watch/backend type dispatch)
    - fatcontext  # context accumulated inside loops
    - gocheckcompilerdirectives  # malformed //go: directives (typos that silently no-op)
    - gocritic  # appendAssign + unlambda only (see settings)
    - goprintffuncname  # printf-like helpers must end in f
    - gosec
    - interfacebloat  # interfaces with too many methods (web.Backend excluded below)
    - iface  # unused / duplicated interface declarations
    - modernize  # Go 1.22+ idioms (range int, slices.*, min/max, …)
    - ineffassign
    - intrange  # for i := 0; i < n; i++ → for i := range n (Go 1.22+)
    - mirror  # bytes.Index vs bytes.IndexByte, …
    - misspell
    - nilerr
    - nilnesserr  # err checked nil but a different err value returned
    - noctx  # blocking I/O must use *Context APIs; conn/ and *_test.go excluded
    - nolintlint  # //nolint: directives must name a linter and stay justified
    - reassign  # writes to other packages' package-level vars
    - recvcheck  # mixed value/pointer receivers on one type
    - rowserrcheck  # database/sql Rows.Err() left unchecked
    - sloglint  # consistent log/slog usage
    - thelper  # t.Helper() in table-driven check callbacks and fakes
    - usestdlibvars  # prefer stdlib constants (http.StatusOK, ...)
    - wastedassign
  settings:
    exhaustive:
      # A default: arm is an explicit statement that the remaining cases are
      # handled; only flag switches with neither all cases nor a default.
      default-signifies-exhaustive: true
    gocritic:
      disable-all: true
      enabled-checks:
        - appendAssign
        - unlambda
    misspell:
      # Eclipse Mosquitto — real MQTT broker name in catalog/tests.
      ignore-rules:
        - mosquitto
  # Considered and deliberately NOT enabled:
  #   makezero  — false positives on the conn/ packet builders, where a
  #               fixed-header make([]byte, N) followed by append(body) is intended.
  #   nilnil    — the (nil, nil) "nothing to build" returns in watch_build are
  #               deliberate signals, not a sentinel-error case.
  #   sqlclosecheck — its one hit is a loop-scoped rows.Close() that is correct
  #               (a defer would leak handles across iterations); rowserrcheck
  #               already covers the Rows.Err() case.
  #   unconvert — flags arch-dependent syscall.Stat_t/Statfs_t conversions that
  #               are needed on non-amd64 Linux; removing them would break ports.
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test helpers switch over third-party enums (x/net/html atom.Atom) where
      # exhaustiveness is meaningless noise.
      - linters: [exhaustive]
        path: _test\.go
      # Test fixtures repeat protocol tokens (NUT UPS), YAML keys and scripted
      # wizard answers — not prose typos.
      - linters: [dupword]
        path: _test\.go
      # Dashboard API surface; splitting would fragment the web backend contract.
      - linters: [interfacebloat]
        path: internal/web/server\.go
      # Protocol probes dial with per-probe deadlines, not context-aware transports.
      - linters: [noctx]
        path: internal/conn/
      # Test fixtures spin up loopback listeners and httptest requests without ctx.
      - linters: [noctx]
        path: _test\.go
      # Store binds ctx at OpenContext; *Context SQL reads it via Store.sqlCtx().
      # contextcheck does not trace embedded store context through method receivers.
      - linters: [contextcheck]
        path: internal/state/
      - linters: [contextcheck]
        path: internal/cli/(monitor|panic|sla|state|watch)\.go
      # Test fixtures are written to throwaway temp dirs with 0644; not a concern.
      - linters: [gosec]
        path: _test\.go
        text: G306
      # Test fixtures use fake DSNs ("smtp://user:pass@…") to exercise URL
      # parsing; there are no real credentials in the tree.
      - linters: [gosec]
        path: _test\.go
        text: G101
      # Tests build paths from t.TempDir() and repo-controlled names; the
      # taint-analysis traversal warning cannot apply.
      - linters: [gosec]
        path: _test\.go
        text: G703
      # G115 (integer-overflow conversions) is noisy and false-positive-prone in
      # this codebase: every flagged site converts an already-bounded value (a
      # port 0-65535, a /proc-reported count, a range-validated config field).
      # Accepted project-wide. By-design exec (G204) and intentional 0644 writes
      # (pidfile, generated YAML) are suppressed inline with //nolint:gosec +
      # justification.
      - linters: [gosec]
        text: G115

issues:
  # Report every finding (golangci-lint otherwise caps repeated issues at 3).
  max-issues-per-linter: 0
  max-same-issues: 0
