# golangci-lint v2 configuration for Sermo.
#
# Its purpose is to run gosec plus a small set of focused bug analyzers that are
# not covered by the standalone tools. The other standards are covered by
# dedicated tools (gofmt, staticcheck, revive via revive.toml, govulncheck).
#
# Run with:  golangci-lint run        (requires golangci-lint v2)
version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - asasalint  # []any accidentally passed to a variadic any
    - asciicheck  # non-ASCII identifiers
    - bidichk  # dangerous bidi unicode in source
    - bodyclose
    - canonicalheader  # HTTP header spelling must use net/http's canonical form
    - contextcheck  # context must flow into blocking I/O (not net/http dial — see noctx)
    - copyloopvar
    - depguard  # architecture import boundaries (see settings.depguard.rules)
    - dupword  # duplicated words (typos); off in *_test.go (protocol/script fixtures)
    - durationcheck  # suspicious time.Duration multiplications
    - dupl  # duplicate code fragments
    - errcheck  # unchecked errors (defer Rollback/Release, I/O, …)
    - errchkjson  # json.Marshal/Encode error dropped while the value can fail to encode
    - errname  # sentinel Err* and *Error type naming
    - errorlint  # error wrapping (%w) and errors.Is/As correctness
    - exhaustive  # enum switches missing cases (check/watch/backend type dispatch)
    - fatcontext  # context accumulated inside loops
    - forcetypeassert  # prevent panics when values with static type any are asserted
    - gocheckcompilerdirectives  # malformed //go: directives (typos that silently no-op)
    - gochecknoinits  # package initialization is forbidden outside static protocol registration
    - gochecksumtype  # exhaustive switches over documented sum types
    - gocognit  # cognitive complexity; documented exceptions preserve ordered contracts
    - gocyclo  # reject functions above the established cyclomatic complexity budget
    - gocritic  # focused stable bug and duplication checks (see settings)
    - godoclint  # exported APIs must retain actionable Go documentation
    - goprintffuncname  # printf-like helpers must end in f
    - gosec
    - gomoddirectives  # reject unexpected replace/exclude/retract directives
    - interfacebloat  # interfaces with too many methods (web.Backend excluded below)
    - iface  # unused / duplicated interface declarations
    - ireturn  # return-concrete; factories/registries excluded below
    - iotamixing  # reject mixed iota and explicit constant declarations
    - modernize  # Go 1.22+ idioms (range int, slices.*, min/max, …)
    - musttag  # serialized fields must carry explicit tags
    - ineffassign
    - intrange  # for i := 0; i < n; i++ → for i := range n (Go 1.22+)
    - inamedparam  # interface parameters must name their domain role
    - maintidx  # minimum maintainability index per function
    - mirror  # bytes.Index vs bytes.IndexByte, …
    - misspell
    - mnd  # require names for domain numbers (timeouts, units, protocol fields, exit codes)
    - nilerr
    - nilnil  # nil values paired with nil errors must be explicitly justified
    - nilnesserr  # err checked nil but a different err value returned
    - noctx  # blocking I/O must use *Context APIs; conn/ and *_test.go excluded
    - nosprintfhostport  # host:port construction must preserve IPv6 correctness
    - nolintlint  # //nolint: directives must name a linter and stay justified
    - perfsprint  # avoid needless fmt allocations (errors.New, strconv, concatenation)
    - prealloc  # reserve known output capacity in production hot paths
    - predeclared  # avoid shadowing Go predeclared identifiers
    - reassign  # writes to other packages' package-level vars
    - recvcheck  # mixed value/pointer receivers on one type
    - rowserrcheck  # database/sql Rows.Err() left unchecked
    - sloglint  # consistent log/slog usage
    - loggercheck  # log key/value pairs must match the logger API
    - makezero  # prevent append from discarding an already allocated slice length
    - sqlclosecheck  # SQL cursors/statements must be closed on every path
    - testableexamples  # examples must provide verifiable output
    - thelper  # t.Helper() in table-driven check callbacks and fakes
    - tparallel  # detect unsafe uses of t.Parallel
    - unconvert  # redundant conversions hide the source type and add noise
    - unparam  # unused function parameters and always-nil results
    - usestdlibvars  # prefer stdlib constants (http.StatusOK, ...)
    - unqueryvet  # prohibit SELECT * in production SQL queries
    - usetesting  # prefer testing.T cleanup-aware helpers
    - wastedassign
    - wrapcheck  # pilot: operation/ + app/ + cli/ + state/ + process/ + web/ + servicemgr/ + rules/ + config/ (see exclusions)
  settings:
    depguard:
      rules:
        # Baseline: stdlib + module imports unless a scoped deny rule matches.
        default:
          list-mode: lax
          files:
            - $all
          allow:
            - $gostd
            - sermo
        # Safety invariants: read-only layers must not import the operation engine.
        checks-no-operation:
          list-mode: lax
          files:
            - internal/checks/**
          deny:
            - pkg: sermo/internal/operation$
              desc: checks are read-only predicates; service control goes through app/operation
        conn-no-operation:
          list-mode: lax
          files:
            - internal/conn/**
          deny:
            - pkg: sermo/internal/operation$
              desc: protocol probes must not dispatch service operations
        rules-no-operation:
          list-mode: lax
          files:
            - internal/rules/**
          deny:
            - pkg: sermo/internal/operation$
              desc: rule conditions are predicates; remediation dispatches through app/worker
        config-no-operation:
          list-mode: lax
          files:
            - internal/config/**
          deny:
            - pkg: sermo/internal/operation$
              desc: config parsing/validation must not execute service control
        # Rule evaluation must stay pure; command execution belongs in checks/actions.
        rules-no-execx:
          list-mode: lax
          files:
            - internal/rules/**
            - "!**/*_test.go"
          deny:
            - pkg: sermo/internal/execx$
              desc: rule conditions must not run commands; use checks or rule actions
    exhaustive:
      # A default: arm is an explicit statement that the remaining cases are
      # handled; only flag switches with neither all cases nor a default.
      default-signifies-exhaustive: true
    gocritic:
      disable-all: true
      enabled-checks:
        - appendAssign
        - appendCombine
        - argOrder
        - badCall
        - badCond
        - badRegexp
        - boolExprSimplify
        - caseOrder
        - dupArg
        - dupBranchBody
        - dupCase
        - dupSubExpr
        - deferInLoop
        - exitAfterDefer
        - flagDeref
        - httpNoBody
        - ifElseChain
        - importShadow
        - mapKey
        - newDeref
        - nilValReturn
        - offBy1
        - rangeAppendAll
        - regexpMust
        - rangeExprCopy
        - regexpPattern
        - sloppyLen
        - sqlQuery
        - sloppyReassign
        - sloppyTypeAssert
        - singleCaseSwitch
        - stringXbytes
        - truncateCmp
        - typeAssertChain
        - typeSwitchVar
        - underef
        - unlabelStmt
        - unlambda
        - unnecessaryBlock
        - unnecessaryDefer
        - unslice
        - weakCond
        - whyNoLint
    misspell:
      # Eclipse Mosquitto — real MQTT broker name in catalog/tests.
      ignore-rules:
        - mosquitto
  # Considered and deliberately NOT enabled (wrapcheck pilot covers operation/ through config/; see exclusions):
  #   containedctx — daemon-lifetime contexts are intentionally held by monitor,
  #                  loader, state and web server owners.
  #   embeddedstructfieldcheck — 69 field-ordering/whitespace findings; the
  #                  existing compact embedded check types are intentionally uniform.
  #   err113 — operator-facing configuration errors need their concrete context,
  #             not a sentinel type for every message.
  #   gochecknoglobals — registries, host detection and test injection are owned
  #                  package state, not mutable ambient application state.
  #   wrapcheck (rest of tree) — later phases; hundreds of interface-boundary returns.
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test helpers switch over third-party enums (x/net/html atom.Atom) where
      # exhaustiveness is meaningless noise.
      - linters: [exhaustive]
        path: _test\.go
      # Tests intentionally assert their own fixtures and concrete builders;
      # production values crossing an any boundary must still be checked.
      - linters: [forcetypeassert]
        path: _test\.go
      # Test fixtures repeat protocol tokens (NUT UPS), YAML keys and scripted
      # wizard answers — not prose typos.
      - linters: [dupword]
        path: _test\.go
      # Test request fixtures deliberately use nil for an absent body; production
      # requests use http.NoBody so the request metadata stays explicit.
      - linters: [gocritic]
        path: _test\.go
        text: httpNoBody
      # Fixtures favor direct byte-slice construction; allocation tuning belongs
      # to the production paths that execute in the daemon or CLI.
      - linters: [prealloc]
        path: _test\.go
      # Protocols register static builders during package initialization; all
      # other packages must keep initialization explicit and injectable.
      - linters: [gochecknoinits]
        path: internal/conn/
      # syscall field widths vary between Linux architectures, so these
      # conversions preserve the portable storage type despite amd64 redundancy.
      - linters: [unconvert]
        path: internal/app/filewatch\.go
      - linters: [unconvert]
        path: internal/checks/storage\.go
      # Dashboard API surface; splitting would fragment the web backend contract.
      - linters: [interfacebloat]
        path: internal/web/server\.go
      # Protocol probes dial with per-probe deadlines, not context-aware transports.
      - linters: [noctx]
        path: internal/conn/
      # Test fixtures spin up loopback listeners and httptest requests without ctx.
      - linters: [noctx]
        path: _test\.go
      # Store binds ctx at OpenContext; *Context SQL reads it via Store.sqlCtx().
      # contextcheck does not trace embedded store context through method receivers.
      - linters: [contextcheck]
        path: internal/state/
      - linters: [contextcheck]
        path: internal/cli/(monitor|panic|sla|state|watch)\.go
      # wrapcheck pilot: operation/ + app/ + cli/ + state/ + process/ + web/ + servicemgr/ + rules/ + config/ + notify/ + execx/ + utmp/ + logfile/ + volume/ + metrics/ + control/ + virt/ + dockerctl/ + locks/.
      - linters: [wrapcheck]
        path: _test\.go
      - linters: [wrapcheck]
        path: cmd/
      - linters: [wrapcheck]
        path: internal/(appinspect|assist|buildinfo|cfgval|checks|conn|diag|emission|httpx|mountctl|mounts|netutil|output|procnet|units)/
      # ireturn: central builders and registries intentionally return interface types.
      - linters: [ireturn]
        path: _test\.go
      - linters: [ireturn]
        path: internal/checks/
      - linters: [ireturn]
        path: internal/notify/
      - linters: [ireturn]
        path: internal/conn/conn\.go
      - linters: [ireturn]
        path: internal/app/(hook|watch_build|procwatch|serviceruntime)\.go
      - linters: [ireturn]
        path: internal/assist/assist\.go
      - linters: [ireturn]
        path: internal/cli/wizard\.go
      - linters: [ireturn]
        path: internal/(servicemgr/manager|dockerctl/manager|virt/manager|mountctl/mountctl|locks/(named|scanner)|process/discover)\.go
      # Test fixtures are written to throwaway temp dirs with 0644; not a concern.
      - linters: [gosec]
        path: _test\.go
        text: G306
      # Test fixtures use fake DSNs ("smtp://user:pass@…") to exercise URL
      # parsing; there are no real credentials in the tree.
      - linters: [gosec]
        path: _test\.go
        text: G101
      # Tests build paths from t.TempDir() and repo-controlled names; the
      # taint-analysis traversal warning cannot apply.
      - linters: [gosec]
        path: _test\.go
        text: G703
      # G115 (integer-overflow conversions) is noisy and false-positive-prone in
      # this codebase: every flagged site converts an already-bounded value (a
      # port 0-65535, a /proc-reported count, a range-validated config field).
      # Accepted project-wide. By-design exec (G204) and intentional 0644 writes
      # (pidfile, generated YAML) are suppressed inline with //nolint:gosec +
      # justification.
      - linters: [gosec]
        text: G115

issues:
  # Report every finding (golangci-lint otherwise caps repeated issues at 3).
  max-issues-per-linter: 0
  max-same-issues: 0
